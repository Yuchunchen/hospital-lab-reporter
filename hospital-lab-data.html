<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗腎室檢驗資料管理</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'PingFang TC', 'Segoe UI', Arial, sans-serif;
  background: #f0f4f8; color: #2c3e50; line-height: 1.5; font-size: 14px;
}

/* ─── Header ───────────────────────────────────────────────────────────────── */
.app-header {
  background: linear-gradient(135deg, #1a5276, #2980b9);
  color: #fff; padding: 12px 24px; display: flex; align-items: center;
  justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.app-header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* ─── Buttons ──────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-family: inherit; transition: all .15s;
}
.btn:hover { filter: brightness(1.1); }
.btn-primary   { background: #2980b9; color: #fff; }
.btn-success   { background: #27ae60; color: #fff; }
.btn-warning   { background: #e67e22; color: #fff; }
.btn-danger    { background: #c0392b; color: #fff; }
.btn-secondary { background: #95a5a6; color: #fff; }
.btn-outline   { background: transparent; border: 1px solid #bdc3c7; color: #2c3e50; }
.btn-outline:hover { background: #ecf0f1; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px 8px; font-size: 16px; background: transparent; color: #fff; border: none; cursor: pointer; }
.btn-icon:hover { background: rgba(255,255,255,.15); border-radius: 4px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ─── Layout ───────────────────────────────────────────────────────────────── */
.container { max-width: 1400px; margin: 0 auto; padding: 16px 24px; }
.card {
  background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px; overflow: hidden;
}
.card-header {
  background: #f8f9fa; padding: 10px 16px; border-bottom: 1px solid #e9ecef;
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; font-size: 15px;
}
.card-body { padding: 16px; }

/* ─── Tabs ─────────────────────────────────────────────────────────────────── */
.tabs { display: flex; border-bottom: 2px solid #e9ecef; margin-bottom: 16px; }
.tab-btn {
  padding: 8px 20px; border: none; background: transparent; cursor: pointer;
  font-size: 14px; font-family: inherit; color: #7f8c8d;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s;
}
.tab-btn.active { color: #1a5276; border-bottom-color: #1a5276; font-weight: 600; }
.tab-btn:hover:not(.active) { color: #2c3e50; background: #f8f9fa; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── Patient Table ────────────────────────────────────────────────────────── */
.patient-table { width: 100%; border-collapse: collapse; }
.patient-table th {
  background: #1a5276; color: #fff; padding: 8px 12px; text-align: left;
  font-weight: 500; font-size: 13px; white-space: nowrap;
}
.patient-table td {
  padding: 8px 12px; border-bottom: 1px solid #e9ecef; font-size: 13px;
}
.patient-table tr:hover td { background: #eaf2f8; }
.patient-table .actions { white-space: nowrap; }
.patient-table th.sortable { cursor: pointer; user-select: none; }
.patient-table th.sortable:hover { background: #154360; }
.patient-table th .sort-ind { font-size: 11px; opacity: .85; margin-left: 4px; }
.patient-table tr.filter-row th {
  background: #ecf0f1; padding: 4px 6px; font-weight: 400;
}
.patient-table tr.filter-row input,
.patient-table tr.filter-row select {
  width: 100%; padding: 3px 6px; font-size: 12px; font-family: inherit;
  border: 1px solid #bdc3c7; border-radius: 3px; background: #fff; color: #2c3e50;
}
.patient-table .row-actions { display: inline-flex; gap: 4px; }
.patient-table .row-actions .btn { padding: 3px 8px; font-size: 12px; line-height: 1; }
.patient-table .row-actions .btn:disabled { opacity: .5; cursor: wait; }

/* ─── Lab Data Table ───────────────────────────────────────────────────────── */
.lab-wrapper { overflow-x: auto; }
.lab-table { border-collapse: collapse; min-width: 100%; font-size: 12px; }
.lab-table th, .lab-table td {
  padding: 4px 8px; border: 1px solid #ddd; white-space: nowrap;
}
.lab-table thead th {
  background: #1a5276; color: #fff; position: sticky; top: 0; z-index: 2;
  font-weight: 500;
}
.lab-table .row-category {
  background: #2c3e50; color: #fff; font-weight: 600; text-align: left;
}
.lab-table .row-item td:first-child {
  background: #f8f9fa; font-weight: 500; position: sticky; left: 0; z-index: 1;
  min-width: 120px; border-right: 2px solid #bdc3c7;
}
.lab-table .row-item td:nth-child(2) {
  background: #f8f9fa; position: sticky; left: 120px; z-index: 1;
  min-width: 90px; border-right: 2px solid #bdc3c7; color: #7f8c8d; font-size: 11px;
}
.val-hi { color: #c0392b; font-weight: 700; }
.val-lo { color: #2471a3; font-weight: 700; }
.val-q-pos { color: #c0392b; font-weight: 700; }
.val-q-neg { color: #27ae60; }
.latest-col { background: rgba(255,235,59,.1); }

/* ─── Modal ────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex;
  align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #fff; border-radius: 8px; width: 420px; max-width: 95vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal-header {
  padding: 14px 20px; border-bottom: 1px solid #e9ecef;
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 600; font-size: 16px;
}
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #7f8c8d; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; gap: 8px; }

/* ─── Form ─────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #34495e; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 10px; border: 1px solid #ced4da; border-radius: 4px;
  font-size: 13px; font-family: inherit;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 2px rgba(41,128,185,.2); }

/* ─── Status bar ───────────────────────────────────────────────────────────── */
.status-bar {
  padding: 8px 16px; font-size: 12px; color: #7f8c8d;
  border-top: 1px solid #e9ecef; background: #f8f9fa;
}
.status-bar .spinner { display: inline-block; width: 12px; height: 12px;
  border: 2px solid #bdc3c7; border-top-color: #2980b9; border-radius: 50%;
  animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Settings panel ──────────────────────────────────────────────────────── */
.settings-panel { max-width: 500px; }

/* ─── Misc ─────────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.badge-am { background: #fdebd0; color: #e67e22; }
.badge-pm { background: #d5f5e3; color: #27ae60; }
.badge-135 { background: #d6eaf8; color: #2980b9; }
.badge-246 { background: #fadbd8; color: #c0392b; }
.text-muted { color: #95a5a6; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mb-8 { margin-bottom: 8px; }
.gap-8 { gap: 8px; }
.flex { display: flex; }
.items-center { align-items: center; }

/* ─── Patient detail header ────────────────────────────────────────────────── */
.patient-detail-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
  padding-bottom: 12px; border-bottom: 2px solid #e9ecef;
}
.patient-detail-header h2 { font-size: 18px; }
.patient-detail-header .meta { font-size: 13px; color: #7f8c8d; }

/* ─── KtV / URR computed row ───────────────────────────────────────────────── */
.computed-row { background: #fffde7; }

/* ─── Toast ────────────────────────────────────────────────────────────────── */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 6px; color: #fff; font-size: 13px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toastIn .3s ease;
  max-width: 360px;
}
.toast-success { background: #27ae60; }
.toast-error { background: #c0392b; }
.toast-info { background: #2980b9; }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- ═══ Header ════════════════════════════════════════════════════════════════ -->
<header class="app-header">
  <h1>洗腎室檢驗資料管理</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="switchTab('patients')" title="病患清單">&#128100;</button>
    <button class="btn-icon" onclick="switchTab('settings')" title="設定">&#9881;</button>
  </div>
</header>

<!-- ═══ Toast Container ══════════════════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ Main Container ════════════════════════════════════════════════════════ -->
<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="patients" onclick="switchTab('patients')">病患清單</button>
    <button class="tab-btn" data-tab="labview" onclick="switchTab('labview')">檢驗資料</button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">設定</button>
  </div>

  <!-- ═══ Tab: Patient List ════════════════════════════════════════════════── -->
  <div class="tab-panel active" id="tab-patients">
    <div class="card">
      <div class="card-header">
        <span>病患清單</span>
      </div>
      <div class="card-body">
        <div class="form-group" style="margin-bottom:8px">
          <label>病歷號清單（一行一個，或以逗號 / 分號 / 空白分隔）</label>
          <textarea id="chartnoInput" rows="3"
            style="width:100%; padding:8px 10px; border:1px solid #ced4da; border-radius:4px; font-family:inherit; font-size:13px; resize:vertical;"
            placeholder="000105069H&#10;000810385G"></textarea>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap">
          <div style="display:flex; gap:8px">
            <button class="btn btn-success btn-sm" id="btnAddToList" onclick="addAndUpdateFromInput()">新增清單</button>
          </div>
          <div style="display:flex; gap:8px; align-items:center">
            <button class="btn btn-primary btn-sm" id="btnRefreshList" onclick="refreshExistingPatients()">更新資料</button>
            <button class="btn btn-warning" id="btnExportCSV" onclick="exportCombinedCSV()"
              style="padding:12px 32px; font-size:1.15em; font-weight:600; box-shadow:0 2px 6px rgba(230,126,34,0.35);">匯出 CSV</button>
          </div>
        </div>
      </div>
      <div class="card-body" style="padding:0;border-top:1px solid #e9ecef">
        <table class="patient-table">
          <thead id="patientHead"></thead>
          <tbody id="patientBody"></tbody>
        </table>
      </div>
      <div class="status-bar" id="statusBar">就緒</div>
    </div>
  </div>

  <!-- ═══ Tab: Lab View ════════════════════════════════════════════════════── -->
  <div class="tab-panel" id="tab-labview">
    <div class="card">
      <div class="card-header">
        <div class="patient-detail-header" id="labPatientHeader" style="border:none;margin:0;padding:0">
          <h2 id="labPatientName">請選擇病患</h2>
          <span class="meta" id="labPatientMeta"></span>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-outline btn-sm" onclick="switchTab('patients')">返回清單</button>
        </div>
      </div>
      <div class="card-body">
        <div class="lab-wrapper" id="labTableWrapper">
          <p class="text-center text-muted">請從病患清單點選病患以查看檢驗資料</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Tab: Settings ════════════════════════════════════════════════════── -->
  <div class="tab-panel" id="tab-settings">
    <div class="card settings-panel">
      <div class="card-header"><span>系統設定</span></div>
      <div class="card-body">
        <div class="form-group">
          <label>API Base URL</label>
          <input type="text" id="settingBaseUrl" placeholder="http://ernode.vghb12.vhtt.gov.tw:8000">
        </div>
        <div class="form-group">
          <label>操作人員代號 (OPSID)</label>
          <input type="text" id="settingOpsid" placeholder="A123456789">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══ Confirm Modal ═════════════════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal" style="width:340px">
    <div class="modal-header">
      <span>確認刪除</span>
      <button class="modal-close" onclick="closeConfirm()">&times;</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg">確定要刪除此病患嗎？</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn">確定刪除</button>
    </div>
  </div>
</div>

<script>
'use strict';

// __HOSPITAL_LAB_PATTERNS_BEGIN__
// ════════════════════════════════════════════════════════════════════════════
// AUTO-GENERATED BLOCK — DO NOT EDIT BETWEEN THE __PATTERNS__ MARKERS
//
// Source of truth: hospital-lab-patterns repo (catalog.js + reporter.js)
//   https://github.com/Yuchunchen/hospital-lab-patterns
//
// To update:
//   1. Edit ../hospital-lab-patterns/patterns/{catalog,reporter}.js
//   2. git commit + git push
//   3. cd hospital-lab-reporter && node sync-patterns.js
//   4. Reload hospital-lab-data.html in your browser
//
// Synced at: 2026-05-05T21:22:54.365Z
// ════════════════════════════════════════════════════════════════════════════
'use strict';

/**
 * catalog.js — Master human-readable catalog of every lab/imaging entry
 * we know how to detect from the ernode API.
 *
 * Goals:
 *   1. Single source of truth: every test pattern lives here ONCE.
 *   2. Human-readable: organised by clinical category with comments.
 *   3. Universal fields only — NO app-specific layout (page/col/section/cat).
 *      Each consuming app (viewer / reporter) has its own manifest that
 *      picks ids from this catalog and adds layout / overrides.
 *
 * "Track-only" patterns (detect but don't render anywhere) just live here
 * and aren't referenced by any manifest.
 *
 * See ../docs/pattern-spec.md for field definitions, ../docs/learning-workflow.md
 * for the Claude-driven recipe to add new entries.
 */

const CATALOG = [

  // ═══════════════════════════════════════════════════════════════════════
  // HEMATOLOGY (CBC)
  // ═══════════════════════════════════════════════════════════════════════

  { id:'WBC',
    pattern: /WBC:\s*([\d.]+)(?!\s*[-–]\s*\d)/,
    displayName:'白血球 (WBC)', shortLabel:'WBC',
    unit:'×10³/µL', category:'血液',
    ref:'4.0–11.0 ×10³/µL',
    refLo:4.0, refHi:11.0, hi:11, lo:4,
    normalize: 'wbcCount',
    notes:'Negative lookahead in pattern rejects urine routine "WBC: 0-5". Normalize handles /µL (e.g. 6700) → ×10³/µL (6.7).' },

  { id:'RBC',
    pattern: /\bRBC:\s*([\d.]+)/,
    displayName:'紅血球 (RBC)', shortLabel:'RBC',
    unit:'×10⁶/µL', category:'血液',
    ref:'男 4.2–6.2，女 3.7–5.5 ×10⁶/µL',
    refLo:3.7, refHi:6.2,
    loM:4.2, hiM:6.2, loF:3.7, hiF:5.5,
    lo:3.7, hi:6.2 },

  { id:'Hb',
    pattern: /(?:Hb|HGB):\s*([\d.]+)/,
    displayName:'血色素 (Hemoglobin)', shortLabel:'Hb',
    unit:'g/dL', category:'血液',
    ref:'男 14–18，女 12–16 g/dL',
    refLo:12, refHi:18,
    loM:14, hiM:18, loF:12, hiF:16,
    lo:12, hi:18,
    notes:'Pattern matches both "Hb:" and "HGB:" labels.' },

  { id:'HCT',
    pattern: /HCT:\s*([\d.]+)/,
    displayName:'血比容 (HCT)', shortLabel:'HCT',
    unit:'%', category:'血液',
    ref:'男 39–53，女 33–47 %',
    refLo:33, refHi:53,
    loM:39, hiM:53, loF:33, hiF:47,
    lo:33, hi:53 },

  { id:'MCV',
    pattern: /MCV:\s*([\d.]+)/,
    displayName:'平均紅血球容積 (MCV)', shortLabel:'MCV',
    unit:'fL', category:'血液',
    ref:'79–99 fL',
    refLo:79, refHi:99, hi:99, lo:79 },

  { id:'Platelet',
    pattern: /Platelet:\s*([\d.]+)/,
    displayName:'血小板 (Platelet)', shortLabel:'PLT',
    unit:'×10³/µL', category:'血液',
    ref:'150–400 ×10³/µL',
    refLo:150, refHi:400, hi:400, lo:150,
    normalize: 'plateletCount',
    notes:'Normalize handles /µL (e.g. 250000) → ×10³/µL (250).' },

  // ═══════════════════════════════════════════════════════════════════════
  // PROTEINS
  // ═══════════════════════════════════════════════════════════════════════

  { id:'TP',
    pattern: /Total protein\(serum\):\s*([\d.]+)/i,
    displayName:'總蛋白 (Total Protein)', shortLabel:'TP',
    unit:'g/dL', category:'蛋白質',
    ref:'6.0–8.3 g/dL',
    refLo:6.0, refHi:8.3, hi:8.3, lo:6.0 },

  { id:'Albumin',
    pattern: /(?:^|[\s;])Albumin(?:\([^)]*\))?:\s*([\d.]+)/i,
    displayName:'白蛋白 (Albumin)', shortLabel:'Alb',
    unit:'g/dL', category:'蛋白質',
    ref:'3.5–5.0 g/dL',
    refLo:3.5, refHi:5.0, hi:5.0, lo:3.5,
    meaning:'營養狀態指標',
    notes:'Boundary requirement (^ or whitespace/semicolon) prevents matching "U-Albumin:" or "Microalbumin:".' },

  // ═══════════════════════════════════════════════════════════════════════
  // LIVER FUNCTION
  // ═══════════════════════════════════════════════════════════════════════

  { id:'GOT',
    pattern: /GOT:\s*([\d.]+)/,
    displayName:'天門冬胺酸轉氨酶 (GOT / AST)', shortLabel:'GOT/AST',
    unit:'U/L', category:'肝功能',
    ref:'5–34 U/L',
    refLo:5, refHi:34, hi:34, lo:null },

  { id:'GPT',
    pattern: /GPT:\s*([\d.]+)/,
    displayName:'丙胺酸轉氨酶 (GPT / ALT)', shortLabel:'GPT/ALT',
    unit:'U/L', category:'肝功能',
    ref:'男<45，女<34 U/L',
    refLo:7, refHi:45,
    hiM:45, hiF:34,
    hi:45, lo:null },

  { id:'RGT',
    pattern: /(?:r-?GT|R-?GT|γ-?GT|GGT|RGT):\s*([\d.]+)/i,
    displayName:'γ-麩胺醯轉移酶 (r-GT / GGT)', shortLabel:'r-GT',
    unit:'U/L', category:'肝功能',
    ref:'男 < 55，女 < 38 U/L',
    refLo:0, refHi:55,
    hiM:55, hiF:38,
    hi:55, lo:null,
    notes:'Pattern matches r-GT, R-GT, γ-GT, GGT, RGT — hospitals use various labels.' },

  { id:'ALP',
    pattern: /(?:Alk[\s.\-]*P|ALP|Alkaline\s*Phosphatase):\s*([\d.]+)/i,
    displayName:'鹼性磷酸酶 (Alk-P / ALP)', shortLabel:'Alk-P',
    unit:'U/L', category:'肝功能',
    ref:'40–130 U/L',
    refLo:34, refHi:130, hi:130, lo:34 },

  { id:'TBIL',
    pattern: /T-BIL:\s*([\d.]+)/,
    displayName:'總膽紅素 (T-BIL)', shortLabel:'T-BIL',
    unit:'mg/dL', category:'肝功能',
    ref:'0.3–1.0 mg/dL',
    refLo:0.3, refHi:1.0, hi:1.0, lo:null },

  { id:'DBIL',
    pattern: /D-BIL:\s*([\d.]+)/,
    displayName:'直接膽紅素 (D-BIL)', shortLabel:'D-BIL',
    unit:'mg/dL', category:'肝功能',
    ref:'0.03–0.18 mg/dL',
    refLo:0.03, refHi:0.18, hi:0.18, lo:null },

  // ═══════════════════════════════════════════════════════════════════════
  // LIPIDS
  // ═══════════════════════════════════════════════════════════════════════

  { id:'CHOL',
    pattern: /CHOL:\s*([\d.]+)/,
    displayName:'總膽固醇 (Cholesterol)', shortLabel:'CHOL',
    unit:'mg/dL', category:'血脂',
    ref:'< 200 mg/dL',
    refLo:null, refHi:200, hi:200, lo:null },

  { id:'HDLC',

        || (bucket.byTestId.BUN     && bucket.byTestId.BUN[0])
        || null;
      // BUN post: cross-cluster lookup by date (post lives in its own cluster).
      const post = bunIdx.post[drawDateIso] || null;

      // Collect non-BUN labs (one entry per testId — they share the cluster
      // key, so any duplicate is a parser-side dedupe miss).
      const labs = {};
      for (const id in bucket.byTestId) {
        if (this._bunIds.indexOf(id) >= 0) continue;
        labs[id] = bucket.byTestId[id][0];
      }
      if (pre)  labs.BUN_pre  = pre;
      if (post) labs.BUN_post = post;

      // URR
      const computed = {};
      const pv = pre  ? Number(pre.value)  : NaN;
      const sv = post ? Number(post.value) : NaN;
      if (Number.isFinite(pv) && Number.isFinite(sv) && pv > 0) {
        computed.URR = +((1 - sv / pv) * 100).toFixed(1);
      }

      const yyyymm = drawDateIso ? drawDateIso.slice(0, 4) + drawDateIso.slice(5, 7) : '';

      draws.push({
        effectiveTime: bucket.effectiveTime,
        drawDate: drawDateIso,
        yyyymm,
        labs,
        computed,
      });
    }
    draws.sort((a, b) => {
      const ka = a.effectiveTime || a.drawDate || '';
      const kb = b.effectiveTime || b.drawDate || '';
      return ka < kb ? -1 : ka > kb ? 1 : 0;
    });
    return draws;
  },

  // Group monthly draws by YYYYMM, take the one with smallest effectiveTime
  // per month. Returns { 'YYYYMM': draw }.
  pickEarliestPerMonth(monthlyDraws) {
    const out = {};
    for (const d of (monthlyDraws || [])) {
      if (!d.yyyymm) continue;
      const cur = out[d.yyyymm];
      if (!cur) { out[d.yyyymm] = d; continue; }
      const ka = cur.effectiveTime || cur.drawDate || '';
      const kb = d.effectiveTime   || d.drawDate   || '';
      if (kb < ka) out[d.yyyymm] = d;
    }
    return out;
  },

  // Lab-table BUN cluster map for the labview tab.
  // Revision 1 hotfix: built directly from the cleaned BUN_pre[] / BUN_post[]
  // arrays (one canonical entry per date) so pre/post pair correctly even
  // when 洗前 and 洗後 sit in separate effectiveTime clusters.
  resolveBunClustersFromStored(labDataForPatient) {
    const out = {};
    if (!labDataForPatient) return out;
    const { pre: preIdx, post: postIdx } = this._indexBunByDate(labDataForPatient);
    const allDates = new Set([...Object.keys(preIdx), ...Object.keys(postIdx)]);
    for (const date of allDates) {
      const pre  = preIdx[date]  || null;
      const post = postIdx[date] || null;
      const slot = {
        pre, post,
        preDate:  pre  ? pre.date  : null,
        postDate: post ? post.date : null,
        urr: null,
        effectiveTime: (pre && pre.effectiveTime) || (post && post.effectiveTime) || null,
      };
      const pv = pre  ? Number(pre.value)  : NaN;
      const sv = post ? Number(post.value) : NaN;
      if (Number.isFinite(pv) && Number.isFinite(sv) && pv > 0) {
        slot.urr = +((1 - sv / pv) * 100).toFixed(1);
      }
      out[date] = slot;
    }
    return out;
  },

  // ─── CSV exporter — combined long format ────────────────────────────────
  // One row per (chartNo × YYYYMM). 4 cols per test (value/unit/lower/higher),
  // URR appended at the end. Empty cells stay empty (no carry-forward).
  exporter: {
    interval: 'monthly',

    filename(today) {
      const t = today instanceof Date ? today : new Date();
      const yyyymmdd = `${t.getFullYear()}${String(t.getMonth() + 1).padStart(2, '0')}${String(t.getDate()).padStart(2, '0')}`;
      return `dialysis_export_${yyyymmdd}.csv`;
    },

    formatAll(patients, allLabData, opts) {
      opts = opts || {};
      const catalog         = opts.catalog         || (typeof CATALOG          !== 'undefined' ? CATALOG          : []);
      const computedCatalog = opts.computedCatalog || (typeof REPORTER_COMPUTED !== 'undefined' ? REPORTER_COMPUTED : []);
      const catById  = new Map(catalog.map(e => [e.id, e]));
      const compById = new Map(computedCatalog.map(e => [e.id, e]));
      const manifest = DIALYSIS_GROUP.labManifest.map(resolveManifestEntry);
      const computedIds = DIALYSIS_GROUP.computed;

      const labelOf = entry => entry.displayLabel
        || (catById.get(entry.id) && (catById.get(entry.id).shortLabel || catById.get(entry.id).displayName))
        || entry.id;
      const unitOf = id => {
        const c = catById.get(id) || compById.get(id);
        return c && c.unit ? c.unit : '';
      };
      const hiOf = id => {
        const c = catById.get(id) || compById.get(id);
        if (!c) return '';
        if (c.hi != null) return c.hi;
        if (c.refHi != null) return c.refHi;
        return '';
      };
      const loOf = id => {
        const c = catById.get(id) || compById.get(id);
        if (!c) return '';
        if (c.lo != null) return c.lo;
        if (c.refLo != null) return c.refLo;
        return '';
      };
      const csvCell = v => {
        if (v == null) return '';
        const s = String(v);
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      };

      // Header — id, YYYYMM, then 4 cols per test, then 4 cols per computed.
      const header = ['id', 'YYYYMM'];
      for (const entry of manifest) {
        const lbl = labelOf(entry);
        header.push(`${lbl} value`, `${lbl} unit`, `${lbl} lower`, `${lbl} higher`);
      }
      for (const id of computedIds) {
        const lbl = (compById.get(id) && compById.get(id).label) || id;
        header.push(`${lbl} value`, `${lbl} unit`, `${lbl} lower`, `${lbl} higher`);
      }
      const lines = [header.map(csvCell).join(',')];

      // Rows: sort patients by chartNo, then per-patient sort YYYYMM ascending.
      const patientList = [...(patients || [])].sort((a, b) => {
        const ca = String(a.chartno || a.chartNo || '');
        const cb = String(b.chartno || b.chartNo || '');
        return ca.localeCompare(cb);
      });

      for (const p of patientList) {
        const cn = p.chartno || p.chartNo || '';
        if (!cn) continue;
        const labData = (allLabData && allLabData[cn]) || null;
        if (!labData) continue;
        const draws  = DIALYSIS_GROUP.detectMonthlyDrawsFromStored(labData);
        const byMonth = DIALYSIS_GROUP.pickEarliestPerMonth(draws);
        const months = Object.keys(byMonth).sort();
        for (const yyyymm of months) {
          const draw = byMonth[yyyymm];
          const row = [cn, yyyymm];
          for (const entry of manifest) {
            const cell = draw.labs && draw.labs[entry.id];
            const val  = cell && cell.value != null ? cell.value : '';
            const unit = (cell && cell.unit) || unitOf(entry.id);
            row.push(val, unit, loOf(entry.id), hiOf(entry.id));
          }
          for (const id of computedIds) {
            const val = draw.computed && draw.computed[id] != null ? draw.computed[id] : '';
            row.push(val, unitOf(id), loOf(id), hiOf(id));
          }
          lines.push(row.map(csvCell).join(','));
        }
      }
      return lines.join('\n');
    },
  },
};

// ─── helpers ─────────────────────────────────────────────────────────────────

// Cached set of testIds that count as "monthly required" for the overlap
// test. Manifest is fixed at module load — safe to memo.
let _monthlyReqIdsCache = null;
function monthlyRequiredIds(group) {
  if (!_monthlyReqIdsCache) {
    _monthlyReqIdsCache = new Set(
      group.labManifest
        .map(resolveManifestEntry)
        .filter(e => e.periodicity === 'monthly')
        .map(e => e.id)
    );
  }
  return _monthlyReqIdsCache;
}

// Legacy fallback for resolveBUN — only used when every BUN entry in a
// cluster is missing signOffTime (i.e. records written before revision 1).
function resolveBUNByLegacyOrderName(entries) {
  let pre = null, post = null;
  for (const e of entries) {
    const name = (e.orderName || '').trim();
    if (!post && name === 'BUN') post = e;
    else if (!pre && name.includes(',')) pre = e;
  }
  if (!pre) pre = entries.find(e => e !== post) || null;
  return { pre, post };
}

}
if (typeof module !== 'undefined' && module.exports) {

}

// CHART NUMBER FORMATTING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Normalize chart number to 9-digit + 1-letter format (e.g. "810385G" -> "000810385G").
 */
function formatChartNo(raw) {
  const s = raw.trim();
  if (!s) throw new Error('請輸入病歷號');
  const last = s[s.length - 1];
  if (!/[a-zA-Z]/.test(last)) throw new Error('病歷號須以英文字母結尾 (如 810385G)');
  const letter = last.toUpperCase();
  const digitStr = s.slice(0, -1).replace(/\D/g, '');
  if (!digitStr) throw new Error('病歷號中未找到數字');
  if (digitStr.length > 9) throw new Error('數字部分最多 9 碼');
  return digitStr.padStart(9, '0') + letter;
}


// ═══════════════════════════════════════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Parse RESDTTM: "20260414203800" -> Date (with HH:MM:SS retained when present).
 * Step 2 needs the time-of-day suffix to sort BUN_pre vs BUN_post by report time.
 */
function parseDateResdttm(str) {
  if (!str || str.length < 8) return null;
  const y  = +str.slice(0, 4),
        m  = +str.slice(4, 6) - 1,
        d  = +str.slice(6, 8),
        hh = str.length >= 10 ? +str.slice(8, 10) : 0,
        mm = str.length >= 12 ? +str.slice(10, 12) : 0,
        ss = str.length >= 14 ? +str.slice(12, 14) : 0;
  return new Date(y, m, d, hh, mm, ss);
}

/**
 * Parse Taiwan calendar date: "115/04/14 19:36" -> Date (with HH:MM[:SS] retained).
 * Step 2 needs the time-of-day suffix when RESDTTM is missing.
 */
function parseDateTaiwan(str) {
  if (!str) return null;
  const match = str.match(/^(\d+)\/(\d+)\/(\d+)(?:\s+(\d+):(\d+)(?::(\d+))?)?/);
  if (!match) return null;
  return new Date(
    +match[1] + 1911,
    +match[2] - 1,
    +match[3],
    +(match[4] || 0),
    +(match[5] || 0),
    +(match[6] || 0)
  );
}

/** Format Date to Taiwan calendar string: "115/04/14" */
function toTaiwanDate(d) {
  if (!d) return '';
  const y = d.getFullYear() - 1911;
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}

/** Format Date to short display: "04/14" */
function toShortDate(d) {
  if (!d) return '';
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

/** Format Date as YYYY-MM-DD for sorting */
function toSortableDate(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}


// ═══════════════════════════════════════════════════════════════════════════════
// API FETCHING & HTML PARSING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Parse patient info from the ernode HTML header.
 * Header text example: "全部醫囑 000123456A 王小明 M 51 歲"
 */
function parsePatientInfo(doc, chartno) {
  const headerText = doc.querySelector('table.Header')?.textContent || '';
  const rest = chartno ? headerText.split(chartno)[1] || '' : headerText;
  const m = rest.match(/\s+(.+?)\s+([MF])\s+(\d+)\s*歲/);
  if (!m) return null;
  return {
    chartno,
    name:   m[1].trim(),
    gender: m[2] === 'M' ? '男' : '女',
    genderCode: m[2],
    age:    m[3],
  };
}

/**
 * Parse a single page of order results from the ernode API HTML.
 * Returns { orders[], nextUrl, total, patientInfo }.
 */
function parseOrdersPage(html, chartno, baseUrl) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const grid = doc.querySelector('table.Grid');
  if (!grid) return { orders: [], nextUrl: null, total: 0, patientInfo: null };

  const patientInfo = parsePatientInfo(doc, chartno);
  const orders = [];

  grid.querySelectorAll('tr.Row').forEach(row => {
    if (row.cells.length < 6) return;
    const h = name => row.querySelector(`input[name="${name}"]`)?.value?.trim() || '';
    const orderDateRaw   = row.cells[4]?.textContent.trim() || '';   // 生效時間
    const receiveDateRaw = row.cells[5]?.textContent.trim() || '';   // 簽收時間
    const effectiveDt = parseDateTaiwan(orderDateRaw);
    const signOffDt   = parseDateTaiwan(receiveDateRaw);
    orders.push({
      ordseq:     h('ORDSEQ'),
      comKey:     h('COM_KEY'),
      ordapno:    h('ORDAPNO'),
      resdttm:    h('RESDTTM'),
      pfcode:     h('PFCODE'),
      ordType:    h('ORDTYPE'),
      orderName:  row.cells[0]?.textContent.trim() || '',
      status:     row.cells[1]?.textContent.trim() || '',
      reportText: row.cells[2]?.textContent.trim() || '',
      dept:       row.cells[3]?.textContent.trim() || '',
      orderDate:  orderDateRaw,
      receiveDate: receiveDateRaw,
      // Revision 1: explicit named fields per the lab-orders page columns.
      // effectiveTime = 生效時間 (cluster anchor for monthly draws);
      // signOffTime  = 簽收時間 (BUN pre/post sort key — pre signs off
      // mid-morning, post signs off afternoon/evening).
      effectiveTime: effectiveDt ? effectiveDt.toISOString() : null,
      signOffTime:   signOffDt   ? signOffDt.toISOString()   : null,
    });
  });

  // Pagination: find ">>" link
  let nextUrl = null;
  doc.querySelectorAll('a').forEach(a => {
    if (a.textContent.trim() === '>>' && !nextUrl) {
      const href = a.getAttribute('href');
      nextUrl = href ? baseUrl + href : null;
    }
  });

  const footerText = doc.querySelector('tr.Footer')?.textContent || '';
  const totalMatch = footerText.match(/總筆數：(\d+)/);
  const total = totalMatch ? +totalMatch[1] : 0;

  return { orders, nextUrl, total, patientInfo };
}

/**
 * Fetch all pages of lab orders for a given chart number.
 * @param {string} chartno - Formatted chart number (e.g. "000810385G")
 * @param {Function} onProgress - Callback(fetched, total)
 * @returns {Promise<{orders: Array, patientInfo: Object}>}
 */
async function fetchAllOrders(chartno, onProgress) {
  const settings = loadSettings();
  const baseUrl = settings.baseUrl;
  let url = `${baseUrl}/order/get_lab_orders?chartno=${chartno}&opsid=${settings.opsid}`;
  const all = [];
  let page = 0, total = 0, patientInfo = null;

  while (url) {
    page++;
    if (page > 50) break; // safety limit

    const resp = await fetch(url, { credentials: 'omit' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const html = await resp.text();

    const result = parseOrdersPage(html, chartno, baseUrl);
    if (page === 1) {
      if (result.total) total = result.total;
      if (result.patientInfo) patientInfo = result.patientInfo;
    }
    all.push(...result.orders);

    if (onProgress) onProgress(all.length, total || '?');
    if (!result.nextUrl || (total && all.length >= total)) break;
    url = result.nextUrl;
  }

  return { orders: all, patientInfo };
}


// ═══════════════════════════════════════════════════════════════════════════════
// LAB VALUE EXTRACTION
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Extract lab values from fetched orders.
 * Returns { testId: [{date, value, dateObj, reportDateTime, orderName}, ...], ... }
 *
 * Step 2: BUN pre/post is no longer pre-classified at the parser layer. Both
 * BUN_pre and BUN_post testIds match every BUN occurrence; the dialysis
 * group's resolveBUN() re-derives pre/post from reportDateTime per cluster.
 * The legacy `composite` / `standalone_bun` filter strings (which never
 * matched the catalog's actual orderNameFilter regex anyway) have been
 * removed.
 */
function extractLabValues(orders) {
  const results = {};
  LAB_TESTS.forEach(t => { results[t.id] = []; });

  // Filter to LAB orders within last 12 months (except hepatitis/HIV/RPR: all-time)
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 12);
  cutoff.setHours(0, 0, 0, 0);

  const ALL_TIME_IDS = new Set(['HBsAg', 'AntiHBs', 'AntiHCV', 'HIV', 'RPR']);

  for (const order of orders) {
    if (order.ordType && order.ordType !== 'LAB') continue;
    if (!order.reportText) continue;

    const dateObj = parseDateResdttm(order.resdttm) || parseDateTaiwan(order.orderDate);
    if (!dateObj) continue;

    const text = order.reportText;
    const dateStr = toSortableDate(dateObj);
    const reportDateTime = dateObj.toISOString(); // full timestamp persisted for resolveBUN (legacy)
    const orderName     = order.orderName    || '';
    // Revision 1: persist explicit cluster anchor + BUN-sort key per entry.
    // effectiveTime = 生效時間 (monthly cluster key); signOffTime = 簽收時間 (BUN pre/post sort).
    const effectiveTime = order.effectiveTime || null;
    const signOffTime   = order.signOffTime   || null;

    for (const test of LAB_TESTS) {
      // Date filter: all-time for hepatitis/HIV/RPR, 12 months for everything else
      if (!ALL_TIME_IDS.has(test.id) && dateObj < cutoff) continue;

      const match = text.match(test.pattern);
      if (!match) continue;

      let value = match[1];
      if (!test.qualitative) {
        value = parseFloat(value);
        if (isNaN(value)) continue;
        if (test.normalize) {
          // catalog references normalizers by string name (so it stays
          // JSON-serialisable); look up the function from the bundled
          // NORMALIZERS table. Tolerate function references too for
          // forward/backward compat.
          const fn = typeof test.normalize === 'function'
            ? test.normalize
            : (typeof NORMALIZERS !== 'undefined' && NORMALIZERS[test.normalize]);
          if (typeof fn === 'function') value = fn(value);
        }
      }

      // Dedupe: prefer signOffTime as the discriminator (it's the most
      // unique per-draw timestamp), then reportDateTime, finally fall back
      // to date+value when neither timestamp is present.
      const existing = results[test.id];
      const dup = existing.find(e =>
        e.value === value &&
        ((e.signOffTime   && e.signOffTime   === signOffTime)   ||
         (e.reportDateTime && e.reportDateTime === reportDateTime) ||
         (!e.signOffTime && !e.reportDateTime && e.date === dateStr))
      );
      if (!dup) {
        existing.push({
          date: dateStr,
          value,
          dateObj,
          reportDateTime,
          effectiveTime,
          signOffTime,
          orderName,
        });
      }
    }
  }

  // Sort each test's results by date (newest first)
  for (const id in results) {
    results[id].sort((a, b) => b.date.localeCompare(a.date));
  }

  // Revision 1 hotfix (2026-05-05): rebuild BUN_pre[] / BUN_post[].
  // Both regexes match every BUN occurrence, so each entry was being stored
  // in BOTH arrays — leaving BUN(AD) effectively empty downstream.
  classifyBUNPrePost(results);

  return results;
}

/**
 * Post-processing pass for BUN_pre / BUN_post (revision 1 hotfix).
 *
 * Both BUN_pre and BUN_post share the same /BUN:\s*([\d.]+)/ regex, so every
 * BUN draw lands in BOTH arrays. This pass rebuilds the two arrays so each
 * physical draw appears exactly once in the correct bucket.
 *
 * Method A (primary, cross-hospital safe): sort same-date entries by
 * signOffTime / dateObj — earliest = pre (洗前), latest = post (洗後).
 * Method B (fallback): when A is ambiguous (missing timestamps or ties),
 * match orderName for 洗前 / 洗後 markers.
 */
function classifyBUNPrePost(results) {
  const pre  = results.BUN_pre  || [];
  const post = results.BUN_post || [];
  const all  = [...pre, ...post];
  if (all.length === 0) return results;

  // Dedupe: same physical draw in BUN_pre[] and BUN_post[].
  const seen = new Set();
  const dedup = [];
  for (const e of all) {
    const tsKey = e.signOffTime
      || (e.dateObj instanceof Date ? e.dateObj.toISOString() : '')
      || e.reportDateTime
      || e.date
      || '';
    const key = String(e.value) + '|' + tsKey + '|' + (e.orderName || '');
    if (seen.has(key)) continue;
    seen.add(key);
    dedup.push(e);
  }

  // Group by date (YYYY-MM-DD)
  const byDate = {};
  for (const e of dedup) {
    if (!e.date) continue;
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  }

  const newPre = [];
  const newPost = [];
  for (const date in byDate) {
    const { pre: p, post: q } = classifyBUNForDate(byDate[date], date);
    if (p) newPre.push(p);
    if (q) newPost.push(q);
  }

  newPre.sort((a, b) => b.date.localeCompare(a.date));
  newPost.sort((a, b) => b.date.localeCompare(a.date));
  results.BUN_pre  = newPre;
  results.BUN_post = newPost;
  return results;
}

function _bunEntryTime(e) {
  if (e.signOffTime) {
    const t = new Date(e.signOffTime).getTime();
    if (Number.isFinite(t)) return t;
  }
  if (e.dateObj instanceof Date) {
    const t = e.dateObj.getTime();
    if (Number.isFinite(t)) return t;
  }
  if (e.reportDateTime) {
    const t = new Date(e.reportDateTime).getTime();
    if (Number.isFinite(t)) return t;
  }
  return null;
}

function classifyBUNForDate(entries, date) {
  if (entries.length === 1) return { pre: entries[0], post: null };

  const times = entries.map(_bunEntryTime);
  const hasMissing = times.some(t => t == null);
  const present    = times.filter(t => t != null);
  const hasTie     = present.length !== new Set(present).size;

  // Method A — sort by timestamp; earliest = pre, latest = post.
  if (!hasMissing && !hasTie) {
    const sorted = [...entries].sort((a, b) => _bunEntryTime(a) - _bunEntryTime(b));
    if (sorted.length > 2) {
      try { console.warn(`[BUN] 3+ entries on date ${date} — taking earliest as pre, latest as post`, entries); } catch (_) {}
    }
    return { pre: sorted[0], post: sorted[sorted.length - 1] };
  }

  // Method B — fallback by orderName text.
  try { console.warn(`[BUN] classification fell back to orderName for date ${date}`, entries); } catch (_) {}
  let pre = null, post = null;
  const unmarked = [];
  for (const e of entries) {
    const name = e.orderName || '';
    if (name.includes('洗後')) {
      if (!post) post = e;
    } else if (name.includes('洗前')) {
      if (!pre) pre = e;
    } else {
      unmarked.push(e);
    }
  }
  if (!pre  && unmarked.length > 0) pre  = unmarked.shift();
  if (!post && unmarked.length > 0) post = unmarked.shift();
  if (unmarked.length > 0) {
    try { console.warn(`[BUN] ambiguous on date ${date} — extra unmarked entries dropped`, entries); } catch (_) {}
  }
  return { pre, post };
}

/**
 * Compute derived values (URR, Ca*P) from extracted lab data.
 * Adds entries to the results object under computed test IDs.
 */
function computeDerivedValues(results) {
  for (const ct of COMPUTED_TESTS) {
    results[ct.id] = [];

    if (ct.id === 'URR') {
      // Pair BUN_pre and BUN_post by same date
      const preMap = {};
      for (const e of (results['BUN_pre'] || [])) {
        if (!preMap[e.date]) preMap[e.date] = e.value;
      }
      for (const e of (results['BUN_post'] || [])) {
        const pre = preMap[e.date];
        if (pre != null) {
          const v = ct.compute(pre, e.value);
          if (v != null) {
            results[ct.id].push({ date: e.date, value: v, dateObj: e.dateObj });
          }
        }
      }
    } else if (ct.id === 'CaxP') {
      // Pair Ca and P by same date
      const caMap = {};
      for (const e of (results['Ca'] || [])) {
        if (!caMap[e.date]) caMap[e.date] = e.value;
      }
      for (const e of (results['P'] || [])) {
        const ca = caMap[e.date];
        if (ca != null) {
          const v = ct.compute(ca, e.value);
          if (v != null) {
            results[ct.id].push({ date: e.date, value: v, dateObj: e.dateObj });
          }
        }
      }
    }

    results[ct.id].sort((a, b) => b.date.localeCompare(a.date));
  }
  return results;
}

// UI - PATIENT LIST  (hotfix v2: sortable + filterable, per-row actions)
// ═══════════════════════════════════════════════════════════════════════════════

// Column config drives header rendering, sort, and filter widgets.
// Built once per render so dynamic patientFields (dialysisDays/shift) stay
// in sync with whatever the active group declares.
function buildPatientColumns() {
  const cols = [
    { key: 'chartno',     label: '病歷號',   filter: 'text', sort: 'localeZh' },
    { key: 'name',        label: '姓名',     filter: 'text', sort: 'localeZh' },
    { key: 'sex',         label: '性別',     filter: 'enum', enumOptions: ['M', 'F'], sort: 'string' },
    { key: 'age',         label: '年齡',     filter: 'text', sort: 'numeric' },
  ];
  for (const f of (GROUP.patientFields || [])) {
    cols.push({
      key: f.key, label: f.label,
      filter: 'enum',
      enumOptions: (f.options || []).slice(),
      sort: 'enumUnsetLast',
    });
  }
  cols.push({ key: '_lastUpdate', label: '最後更新', filter: null, sort: 'numeric' });
  cols.push({ key: '_actions',    label: '動作',     filter: null, sort: null });
  return cols;
}

function loadSortState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.patientSort)) || null; }
  catch { return null; }
}
function saveSortState(s) {
  if (s) localStorage.setItem(STORAGE_KEYS.patientSort, JSON.stringify(s));
  else   localStorage.removeItem(STORAGE_KEYS.patientSort);
}
function loadFilterState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.patientFilters)) || {}; }
  catch { return {}; }
}
function saveFilterState(f) {
  localStorage.setItem(STORAGE_KEYS.patientFilters, JSON.stringify(f || {}));
}

// Read the value used for sort/filter (handles synthetic _lastUpdate +
// sex fallback for legacy genderCode-only records).
function patientCellValue(p, key, labData) {
  if (key === '_lastUpdate') return labData[p.chartno]?._lastUpdate || 0;
  if (key === 'sex')         return p.sex || p.genderCode || '';
  return p[key] != null ? p[key] : '';
}

function compareForColumn(va, vb, sortType, dir) {
  const sign = dir === 'desc' ? -1 : 1;
  if (sortType === 'numeric') {
    const na = Number(va), nb = Number(vb);
    const aNan = !Number.isFinite(na), bNan = !Number.isFinite(nb);
    if (aNan && bNan) return 0;
    if (aNan) return 1;          // missing values always last
    if (bNan) return -1;
    return (na - nb) * sign;
  }
  if (sortType === 'enumUnsetLast') {
    const aUnset = !va || va === '未設定';
    const bUnset = !vb || vb === '未設定';
    if (aUnset && !bUnset) return 1;   // 未設定 always at the bottom
    if (!aUnset && bUnset) return -1;
    return String(va).localeCompare(String(vb), 'zh-TW') * sign;
  }
  if (sortType === 'localeZh') {
    return String(va || '').localeCompare(String(vb || ''), 'zh-TW') * sign;
  }
  return String(va || '').localeCompare(String(vb || '')) * sign;
}

function applyPatientFilters(list, filters, labData, cols) {
  const colByKey = new Map(cols.map(c => [c.key, c]));
  const active = Object.entries(filters).filter(([, v]) => v != null && String(v).trim() !== '' && v !== '(全部)');
  if (active.length === 0) return list;
  return list.filter(p => active.every(([key, val]) => {
    const col = colByKey.get(key);
    if (!col) return true;
    const cell = patientCellValue(p, key, labData);
    if (col.filter === 'enum') return String(cell) === String(val);
    return String(cell).toLowerCase().includes(String(val).toLowerCase());
  }));
}

function applyPatientSort(list, sort, labData) {
  if (!sort || !sort.column) return list;
  const cols = buildPatientColumns();
  const col = cols.find(c => c.key === sort.column);
  if (!col || !col.sort) return list;
  return [...list].sort((a, b) => compareForColumn(
    patientCellValue(a, sort.column, labData),
    patientCellValue(b, sort.column, labData),
    col.sort, sort.dir
  ));
}

function renderPatientHead(cols, sort, filters) {
  const head = document.getElementById('patientHead');
  if (!head) return;
  const sortInd = (key) => {
    if (!sort || sort.column !== key) return '';
    return `<span class="sort-ind">${sort.dir === 'asc' ? '▲' : '▼'}</span>`;
  };
  const headerCells = cols.map(c => {
    const sortable = !!c.sort;
    const cls = sortable ? 'sortable' : '';
    const onClick = sortable ? ` onclick="cyclePatientSort('${c.key}')"` : '';
    return `<th class="${cls}"${onClick}>${escHtml(c.label)}${sortInd(c.key)}</th>`;
  }).join('');
  const filterCells = cols.map(c => {
    if (!c.filter) return '<th></th>';
    const cur = filters[c.key] != null ? filters[c.key] : '';
    if (c.filter === 'enum') {
      const opts = ['(全部)', ...(c.enumOptions || [])].map(o => {
        const val = o === '(全部)' ? '' : o;
        return `<option value="${escAttr(val)}"${String(cur) === String(val) ? ' selected' : ''}>${escHtml(o)}</option>`;
      }).join('');
      return `<th><select data-col="${escAttr(c.key)}" onchange="setPatientFilter('${c.key}', this.value)">${opts}</select></th>`;
    }
    return `<th><input type="text" data-col="${escAttr(c.key)}" value="${escAttr(cur)}" placeholder="篩選..." oninput="setPatientFilter('${c.key}', this.value)"></th>`;
  }).join('');
  head.innerHTML = `<tr>${headerCells}</tr><tr class="filter-row">${filterCells}</tr>`;
}

function renderPatientBody(visible, cols, labData, totalCount) {
  const tbody = document.getElementById('patientBody');
  if (!tbody) return;
  const colspan = cols.length;
  if (totalCount === 0) {
    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted" style="padding:24px">尚未追蹤任何病患。請在上方輸入病歷號後按「新增清單」。</td></tr>`;
    return;
  }
  if (visible.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted" style="padding:24px">沒有符合目前篩選條件的病患。</td></tr>`;
    return;
  }
  const fields = (GROUP.patientFields || []);
  const fieldKeys = new Set(fields.map(f => f.key));

  tbody.innerHTML = visible.map(p => {
    const cells = cols.map(c => {
      if (c.key === 'chartno') {
        return `<td><a href="#" onclick="viewPatientLab('${p.chartno}'); return false;" style="color:#2980b9;font-weight:600">${escHtml(p.chartno)}</a></td>`;
      }
      if (c.key === 'name') return `<td>${escHtml(p.name || '')}</td>`;
      if (c.key === 'sex')  return `<td>${escHtml(p.sex || p.genderCode || '')}</td>`;
      if (c.key === 'age')  return `<td>${escHtml(p.age != null ? String(p.age) : '')}</td>`;
      if (fieldKeys.has(c.key)) {
        const f = fields.find(x => x.key === c.key);
        const cur = p[c.key] != null && p[c.key] !== '' ? p[c.key] : (f.default || '');
        const opts = (f.options || []).map(o =>
          `<option value="${escAttr(o)}"${o === cur ? ' selected' : ''}>${escHtml(o)}</option>`
        ).join('');
        return `<td><select onchange="updatePatientField('${p.chartno}','${f.key}',this.value)" style="padding:4px 6px;font-size:12px">${opts}</select></td>`;
      }
      if (c.key === '_lastUpdate') {
        const ts = labData[p.chartno]?._lastUpdate;
        const text = ts ? new Date(ts).toLocaleString('zh-TW') : '<span class="text-muted">未更新</span>';
        return `<td style="font-size:11px">${text}</td>`;
      }
      if (c.key === '_actions') {
        return `<td class="actions"><span class="row-actions">
          <button class="btn btn-primary" title="重新抓取此病患資料" data-row-refresh="${escAttr(p.chartno)}" onclick="refreshOnePatient('${p.chartno}', this)">↻</button>
          <button class="btn btn-danger" title="移除此病患" onclick="confirmRemovePatient('${p.chartno}')">✕</button>
        </span></td>`;
      }
      return '<td></td>';
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
}

function renderPatientList() {
  const cols     = buildPatientColumns();
  const patients = loadPatients();
  const labData  = loadLabData();
  const sort     = loadSortState();
  const filters  = loadFilterState();
  const filtered = applyPatientFilters(patients, filters, labData, cols);
  const sorted   = applyPatientSort(filtered, sort, labData);
  renderPatientHead(cols, sort, filters);
  renderPatientBody(sorted, cols, labData, patients.length);
}

// Header click handler — cycles unsorted → asc → desc → unsorted.
function cyclePatientSort(column) {
  const cur = loadSortState();
  let next;
  if (!cur || cur.column !== column)      next = { column, dir: 'asc' };
  else if (cur.dir === 'asc')             next = { column, dir: 'desc' };
  else                                    next = null;
  saveSortState(next);
  renderPatientList();
}

// Filter input handler — text inputs call this on every keystroke. With
// ≤ ~50 patients the re-render cost is negligible, so no debounce needed.
// Re-rendering the whole table would steal focus from the input being
// typed into; we restore focus + caret position after the rebuild.
function setPatientFilter(column, value) {
  const filters = loadFilterState();
  if (value == null || String(value).trim() === '') delete filters[column];
  else                                              filters[column] = value;
  saveFilterState(filters);

  const active  = document.activeElement;
  const wasInput = active && active.tagName === 'INPUT' && active.dataset.col === column;
  const caret   = wasInput ? active.selectionStart : null;

  renderPatientList();

  if (wasInput) {
    const next = document.querySelector(`#patientHead input[data-col="${CSS.escape(column)}"]`);
    if (next) {
      next.focus();
      if (caret != null) try { next.setSelectionRange(caret, caret); } catch (_) {}
    }
  }
}

/**
 * Per-row refresh handler (hotfix v2). Re-fetches labs + demographics for
 * a single chartNo using the same pipeline as the top-level 更新資料.
 * The clicked button is disabled with a spinner glyph during the fetch.
 */
async function refreshOnePatient(chartno, btn) {
  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }
  const originalText = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = '⟳'; }
  setStatus(`更新 ${chartno} 中...`, true);
  try {
    await fetchAndStore(chartno);
    renderPatientList();
    setStatus(`已更新: ${chartno}`);
    showToast(`已更新 ${chartno}`, 'success');
  } catch (err) {
    console.warn(`Failed to refresh ${chartno}:`, err);
    if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
    setStatus(`更新失敗: ${chartno}`);
    showToast(`更新 ${chartno} 失敗`, 'error');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}
function escAttr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** Persist a user-editable field on a patient (dialysisDays / shift selects). */
function updatePatientField(chartno, key, value) {
  const patients = loadPatients();
  const idx = patients.findIndex(p => p.chartno === chartno);
  if (idx < 0) return;
  patients[idx][key] = value;
  savePatients(patients);
}

// UI - REMOVE PATIENT FROM TRACKED LIST

function confirmRemovePatient(chartno) {
  const p = loadPatients().find(x => x.chartno === chartno);
  if (!p) return;
  document.getElementById('confirmMsg').textContent =
    `確定要從追蹤清單移除 ${p.name || ''} (${chartno}) 嗎？此病患的檢驗資料也會一併刪除。`;
  document.getElementById('confirmOkBtn').onclick = () => {
    const patients = loadPatients().filter(x => x.chartno !== chartno);
    savePatients(patients);
    const labData = loadLabData();
    delete labData[chartno];
    saveLabData(labData);
    closeConfirm();
    renderPatientList();
    showToast('已移除', 'info');
  };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.add('hidden');
}


// ═══════════════════════════════════════════════════════════════════════════════
// DATA FETCHING — ID-LIST INPUT + BATCH UPDATE
// ═══════════════════════════════════════════════════════════════════════════════

function setStatus(msg, loading = false) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = (loading ? '<span class="spinner"></span>' : '') + escHtml(msg);
}

/**
 * Split a textarea blob into normalized chartNos.
 * Accepts newlines, commas, semicolons, pipes, or whitespace as separators.
 * Returns { chartnos: [...unique, normalized], errors: [...rejected raw tokens with reason] }.
 */
function parseChartNoList(text) {
  const result = { chartnos: [], errors: [] };
  if (!text) return result;
  const tokens = text.split(/[,;|\s]+/).map(s => s.trim()).filter(Boolean);
  const seen = new Set();
  for (const t of tokens) {
    try {
      const cn = formatChartNo(t);
      if (seen.has(cn)) continue;
      seen.add(cn);
      result.chartnos.push(cn);
    } catch (err) {
      result.errors.push(`${t}: ${err.message}`);
    }
  }
  return result;
}

/**
 * Fetch one chartNo end-to-end: hit the API, extract labs, persist to
 * localStorage, refresh demographics. Throws on network / parse error.
 */
async function fetchAndStore(chartno) {
  const { orders, patientInfo } = await fetchAllOrders(chartno, (n, t) => {
    setStatus(`${chartno}: 已擷取 ${n} / ${t} 筆`, true);
  });
  let labValues = extractLabValues(orders);
  labValues = computeDerivedValues(labValues);
  const allLabData = loadLabData();
  allLabData[chartno] = { ...labValues, _lastUpdate: Date.now() };
  saveLabData(allLabData);

  // Demographics refresh on every fetch (revision 1: not user-editable).
  if (patientInfo) {
    const patients = loadPatients();
    const idx = patients.findIndex(p => p.chartno === chartno);
    if (idx >= 0) {
      if (patientInfo.name)       patients[idx].name = patientInfo.name;
      if (patientInfo.genderCode) patients[idx].sex  = patientInfo.genderCode;
      if (patientInfo.age)        patients[idx].age  = patientInfo.age;
      savePatients(patients);
    }
  }
}

/**
 * Handler for the 新增清單 button: parses the textarea, adds any new chartNos
 * to the tracked list (with default field values), then batch-fetches each.
 * On completion the textarea is cleared (per revision 1 hotfix).
 */
async function addAndUpdateFromInput() {
  const ta  = document.getElementById('chartnoInput');
  const raw = ta ? ta.value : '';
  const { chartnos, errors } = parseChartNoList(raw);

  if (errors.length) {
    const head = errors.slice(0, 3).join('； ');
    showToast(`${errors.length} 筆無效病歷號已忽略：${head}${errors.length > 3 ? '…' : ''}`, 'error', 5000);
  }
  if (chartnos.length === 0) {
    if (!errors.length) showToast('請輸入至少一筆病歷號', 'error');
    return;
  }

  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }

  // Add any new chartNos to the tracked list with default field values.
  const patients = loadPatients();
  const fields = (GROUP.patientFields || []);
  let added = 0;
  for (const cn of chartnos) {
    if (!patients.find(p => p.chartno === cn)) {
      const fresh = { chartno: cn };
      for (const f of fields) fresh[f.key] = f.default || '';
      patients.push(fresh);
      added++;
    }
  }
  if (added > 0) {
    savePatients(patients);
    renderPatientList();
  }

  const btnAdd = document.getElementById('btnAddToList');
  const btnRef = document.getElementById('btnRefreshList');
  if (btnAdd) btnAdd.disabled = true;
  if (btnRef) btnRef.disabled = true;
  let success = 0, fail = 0;
  for (let i = 0; i < chartnos.length; i++) {
    const cn = chartnos[i];
    setStatus(`新增清單中 (${i + 1}/${chartnos.length}): ${cn}...`, true);
    try {
      await fetchAndStore(cn);
      success++;
    } catch (err) {
      fail++;
      console.warn(`Failed to fetch ${cn}:`, err);
    }
  }
  renderPatientList();
  if (btnAdd) btnAdd.disabled = false;
  if (btnRef) btnRef.disabled = false;
  if (ta && success > 0 && fail === 0) ta.value = '';
  setStatus(`新增完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`);
  showToast(`新增完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`, fail ? 'error' : 'success');
}

/**
 * Handler for the 更新資料 button: re-fetch labs + demographics for every
 * chartNo currently in the patient list (ignores the textarea contents).
 */
async function refreshExistingPatients() {
  const patients = loadPatients();
  if (patients.length === 0) {
    showToast('清單為空，請先用「新增清單」加入病人', 'error');
    return;
  }
  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }

  const btnAdd = document.getElementById('btnAddToList');
  const btnRef = document.getElementById('btnRefreshList');
  if (btnAdd) btnAdd.disabled = true;
  if (btnRef) btnRef.disabled = true;

  const total = patients.length;
  let success = 0, fail = 0;
  for (let i = 0; i < total; i++) {
    const cn = patients[i].chartno;
    setStatus(`更新中... ${i + 1} / ${total} (${cn})`, true);
    try {
      await fetchAndStore(cn);
      success++;
    } catch (err) {
      fail++;
      console.warn(`Failed to refresh ${cn}:`, err);
    }
  }
  renderPatientList();
  if (btnAdd) btnAdd.disabled = false;
  if (btnRef) btnRef.disabled = false;
  setStatus(`更新完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`);
  showToast(`更新完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`, fail ? 'error' : 'success');
}


// ═══════════════════════════════════════════════════════════════════════════════
// LAB DATA TABLE RENDERING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * View lab data for a specific patient.
 * Switches to the labview tab and renders the full history table.
 */
function viewPatientLab(chartno) {
  const patients = loadPatients();
  const patient = patients.find(p => p.chartno === chartno);
  const labData = loadLabData()[chartno];

  // Update header — sex/age come from auto-filled demographics; revision 1
  // dropped the schedule/frequency text in favor of the patient-row selects.
  document.getElementById('labPatientName').textContent = patient
    ? `${patient.name || ''} (${chartno})`
    : chartno;
  const sex = patient ? (patient.sex || patient.genderCode || '') : '';
  const age = patient && patient.age != null ? patient.age + '歲' : '';
  const dd  = patient ? (patient.dialysisDays || '') : '';
  const sh  = patient ? (patient.shift || '') : '';
  document.getElementById('labPatientMeta').textContent =
    [sex, age, dd, sh].filter(Boolean).join(' ｜ ');

  const wrapper = document.getElementById('labTableWrapper');

  if (!labData) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">尚無檢驗資料，請先點選「新增清單」或「更新資料」按鈕擷取資料</p>';
    switchTab('labview');
    return;
  }

  // Restrict the table to the active group's manifest so dialysis-specific
  // form items render in form order; pick up any displayLabel overrides.
  const manifestEntries = (GROUP.labManifest || []).map(resolveManifestEntry);
  const manifestIds     = new Set(manifestEntries.map(e => e.id));
  const labelOverride   = new Map(
    manifestEntries.filter(e => e.displayLabel).map(e => [e.id, e.displayLabel])
  );
  const computedIds = new Set(GROUP.computed || []);
  const allTests = [
    ...LAB_TESTS.filter(t => manifestIds.has(t.id)),
    ...COMPUTED_TESTS.filter(t => computedIds.has(t.id)),
  ];

  // Step 2: BUN_pre / BUN_post / URR are now resolved per cluster via the
  // dialysis group's resolveBunClustersFromStored() — same source of truth
  // as the CSV exporter. The stored BUN_pre / BUN_post arrays now contain
  // every BUN occurrence twice (one per testId), so per-date dateMap reads
  // are no longer meaningful for those rows; we override them below.
  const bunSlots = (typeof GROUP.resolveBunClustersFromStored === 'function')
    ? GROUP.resolveBunClustersFromStored(labData) : {};
  const bunPreByDate  = {};
  const bunPostByDate = {};
  const urrByDate     = {};
  for (const startDate in bunSlots) {
    const slot = bunSlots[startDate];
    if (slot.pre  && slot.preDate)  bunPreByDate[slot.preDate]   = slot.pre.value;
    if (slot.post && slot.postDate) bunPostByDate[slot.postDate] = slot.post.value;
    if (slot.urr != null)           urrByDate[startDate]         = slot.urr;
  }
  const overrideMap = {
    BUN_pre:  bunPreByDate,
    BUN_post: bunPostByDate,
    URR:      urrByDate,
  };

  const dateSet = new Set();
  for (const test of allTests) {
    const entries = labData[test.id];
    if (!entries) continue;
    for (const e of entries) {
      dateSet.add(e.date);
    }
  }
  // Make sure every cluster start / pre date / post date appears as a column,
  // even if no other test was drawn on that exact date.
  for (const startDate in bunSlots) {
    dateSet.add(startDate);
    const slot = bunSlots[startDate];
    if (slot.preDate)  dateSet.add(slot.preDate);
    if (slot.postDate) dateSet.add(slot.postDate);
  }

  const dates = Array.from(dateSet).sort((a, b) => b.localeCompare(a)); // newest first

  if (dates.length === 0) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">未找到任何檢驗數據</p>';
    switchTab('labview');
    return;
  }

  // Convert dates to Taiwan calendar for header display
  const dateHeaders = dates.map(d => {
    const parts = d.split('-');
    const twYear = +parts[0] - 1911;
    return `${twYear}/${parts[1]}/${parts[2]}`;
  });

  // Build table HTML
  let html = '<table class="lab-table">';

  // Header row with dates
  html += '<thead><tr>';
  html += '<th style="min-width:120px;position:sticky;left:0;z-index:3;background:#1a5276">檢驗項目</th>';
  html += '<th style="min-width:90px;position:sticky;left:120px;z-index:3;background:#1a5276">參考值</th>';
  dates.forEach((d, i) => {
    const cls = i === 0 ? ' class="latest-col"' : '';
    html += `<th${cls}>${dateHeaders[i]}</th>`;
  });
  html += '</tr></thead>';

  html += '<tbody>';

  const hasAny = id => {
    if (overrideMap[id] && Object.keys(overrideMap[id]).length > 0) return true;
    return labData[id] && labData[id].length > 0;
  };

  // Group tests by category — restricted to allTests (already manifest-filtered)
  for (const cat of LAB_CATEGORIES) {
    const testsInCat = allTests.filter(t => t.cat === cat.id);
    if (testsInCat.length === 0) continue;
    // Check if category has any data (includes Step 2 BUN/URR overrides)
    const hasData = testsInCat.some(t => hasAny(t.id));
    if (!hasData) continue;

    // Category header row
    html += `<tr class="row-category"><td colspan="${dates.length + 2}">${cat.label}</td></tr>`;

    for (const test of testsInCat) {
      if (!hasAny(test.id)) continue;
      const entries = labData[test.id] || [];

      // Build a date -> value map. For BUN_pre / BUN_post / URR (Step 2),
      // the override map IS the source of truth (resolveBUN per cluster);
      // ignore raw stored entries which now contain duplicates.
      const dateMap = overrideMap[test.id]
        ? Object.assign({}, overrideMap[test.id])
        : (() => {
            const m = {};
            for (const e of entries) {
              if (!(e.date in m)) m[e.date] = e.value; // first wins (newest if pre-sorted)
            }
            return m;
          })();

      const lbl = labelOverride.get(test.id) || test.label;
      html += '<tr class="row-item">';
      html += `<td>${lbl}</td>`;
      html += `<td>${test.ref || ''} ${test.unit ? '(' + test.unit + ')' : ''}</td>`;

      dates.forEach((d, i) => {
        const val = dateMap[d];
        const cls = i === 0 ? ' latest-col' : '';

        if (val == null) {
          html += `<td class="${cls}"></td>`;
          return;
        }

        // Determine color class
        let valCls = '';
        if (test.qualitative) {
          // Qualitative: Reactive/positive = red, Non-Reactive/negative = green
          const lower = String(val).toLowerCase();
          if (lower.includes('reactive') && !lower.includes('non')) {
            valCls = 'val-q-pos';
          } else if (lower.includes('non-reactive') || lower.includes('negative') || lower.includes('nonreactive')) {
            valCls = 'val-q-neg';
          }
        } else {
          const numVal = typeof val === 'number' ? val : parseFloat(val);
          if (!isNaN(numVal)) {
            // Gender-aware threshold: pick loM/hiM or loF/hiF when the
            // catalog entry provides them and patient sex is known
            // ('M'/'F' from genderCode). Falls back to lo/hi (wide envelope)
            // for unknown sex or non-gendered tests.
            const sex = patient && (patient.sex || patient.genderCode);
            let hi = test.hi, lo = test.lo;
            if (sex === 'M' && (test.hiM != null || test.loM != null)) {
              if (test.hiM != null) hi = test.hiM;
              if (test.loM != null) lo = test.loM;
            } else if (sex === 'F' && (test.hiF != null || test.loF != null)) {
              if (test.hiF != null) hi = test.hiF;
              if (test.loF != null) lo = test.loF;
            }
            if (hi != null && numVal > hi) valCls = 'val-hi';
            else if (lo != null && numVal < lo) valCls = 'val-lo';
          }
        }

        html += `<td class="${valCls}${cls}">${val}</td>`;
      });

      html += '</tr>';
    }
  }

  html += '</tbody></table>';
  wrapper.innerHTML = html;
  switchTab('labview');
}


// ═══════════════════════════════════════════════════════════════════════════════
// EXPORT — combined long-format CSV
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Export all tracked patients × YYYYMM as a single long-format CSV.
 * Layout (header, rows) lives in GROUP.exporter.formatAll (groups/dialysis.js).
 */
function exportCombinedCSV() {
  if (!GROUP.exporter || typeof GROUP.exporter.formatAll !== 'function') {
    showToast('此疾病模組尚未提供 CSV 匯出', 'error'); return;
  }
  const patients = loadPatients();
  if (patients.length === 0) { showToast('尚無病患可匯出', 'error'); return; }

  const labData  = loadLabData();
  const csv      = GROUP.exporter.formatAll(patients, labData);
  // BOM so Excel opens UTF-8 without garbling Chinese display labels.
  const blob     = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const filename = GROUP.exporter.filename
    ? GROUP.exporter.filename()
    : `dialysis_export_${todayStr()}.csv`;
  downloadBlob(blob, filename);
  showToast('CSV 已匯出', 'success');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function saveSettings() {
  const baseUrl = document.getElementById('settingBaseUrl').value.trim().replace(/\/+$/, '');
  const opsid = document.getElementById('settingOpsid').value.trim();
  saveSettingsData({ baseUrl: baseUrl || 'http://ernode.vghb12.vhtt.gov.tw:8000', opsid });
  showToast('設定已儲存', 'success');
}
