<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗腎室檢驗資料管理</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'PingFang TC', 'Segoe UI', Arial, sans-serif;
  background: #f0f4f8; color: #2c3e50; line-height: 1.5; font-size: 14px;
}

/* ─── Header ───────────────────────────────────────────────────────────────── */
.app-header {
  background: linear-gradient(135deg, #1a5276, #2980b9);
  color: #fff; padding: 12px 24px; display: flex; align-items: center;
  justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.app-header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* ─── Buttons ──────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-family: inherit; transition: all .15s;
}
.btn:hover { filter: brightness(1.1); }
.btn-primary   { background: #2980b9; color: #fff; }
.btn-success   { background: #27ae60; color: #fff; }
.btn-warning   { background: #e67e22; color: #fff; }
.btn-danger    { background: #c0392b; color: #fff; }
.btn-secondary { background: #95a5a6; color: #fff; }
.btn-outline   { background: transparent; border: 1px solid #bdc3c7; color: #2c3e50; }
.btn-outline:hover { background: #ecf0f1; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px 8px; font-size: 16px; background: transparent; color: #fff; border: none; cursor: pointer; }
.btn-icon:hover { background: rgba(255,255,255,.15); border-radius: 4px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ─── Layout ───────────────────────────────────────────────────────────────── */
.container { max-width: 1400px; margin: 0 auto; padding: 16px 24px; }
.card {
  background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px; overflow: hidden;
}
.card-header {
  background: #f8f9fa; padding: 10px 16px; border-bottom: 1px solid #e9ecef;
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; font-size: 15px;
}
.card-body { padding: 16px; }

/* ─── Tabs ─────────────────────────────────────────────────────────────────── */
.tabs { display: flex; border-bottom: 2px solid #e9ecef; margin-bottom: 16px; }
.tab-btn {
  padding: 8px 20px; border: none; background: transparent; cursor: pointer;
  font-size: 14px; font-family: inherit; color: #7f8c8d;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s;
}
.tab-btn.active { color: #1a5276; border-bottom-color: #1a5276; font-weight: 600; }
.tab-btn:hover:not(.active) { color: #2c3e50; background: #f8f9fa; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── Patient Table ────────────────────────────────────────────────────────── */
.patient-table { width: 100%; border-collapse: collapse; }
.patient-table th {
  background: #1a5276; color: #fff; padding: 8px 12px; text-align: left;
  font-weight: 500; font-size: 13px; white-space: nowrap;
}
.patient-table td {
  padding: 8px 12px; border-bottom: 1px solid #e9ecef; font-size: 13px;
}
.patient-table tr:hover td { background: #eaf2f8; }
.patient-table .actions { white-space: nowrap; }

/* ─── Lab Data Table ───────────────────────────────────────────────────────── */
.lab-wrapper { overflow-x: auto; }
.lab-table { border-collapse: collapse; min-width: 100%; font-size: 12px; }
.lab-table th, .lab-table td {
  padding: 4px 8px; border: 1px solid #ddd; white-space: nowrap;
}
.lab-table thead th {
  background: #1a5276; color: #fff; position: sticky; top: 0; z-index: 2;
  font-weight: 500;
}
.lab-table .row-category {
  background: #2c3e50; color: #fff; font-weight: 600; text-align: left;
}
.lab-table .row-item td:first-child {
  background: #f8f9fa; font-weight: 500; position: sticky; left: 0; z-index: 1;
  min-width: 120px; border-right: 2px solid #bdc3c7;
}
.lab-table .row-item td:nth-child(2) {
  background: #f8f9fa; position: sticky; left: 120px; z-index: 1;
  min-width: 90px; border-right: 2px solid #bdc3c7; color: #7f8c8d; font-size: 11px;
}
.val-hi { color: #c0392b; font-weight: 700; }
.val-lo { color: #2471a3; font-weight: 700; }
.val-q-pos { color: #c0392b; font-weight: 700; }
.val-q-neg { color: #27ae60; }
.latest-col { background: rgba(255,235,59,.1); }

/* ─── Modal ────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex;
  align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #fff; border-radius: 8px; width: 420px; max-width: 95vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal-header {
  padding: 14px 20px; border-bottom: 1px solid #e9ecef;
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 600; font-size: 16px;
}
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #7f8c8d; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; gap: 8px; }

/* ─── Form ─────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #34495e; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 10px; border: 1px solid #ced4da; border-radius: 4px;
  font-size: 13px; font-family: inherit;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 2px rgba(41,128,185,.2); }

/* ─── Status bar ───────────────────────────────────────────────────────────── */
.status-bar {
  padding: 8px 16px; font-size: 12px; color: #7f8c8d;
  border-top: 1px solid #e9ecef; background: #f8f9fa;
}
.status-bar .spinner { display: inline-block; width: 12px; height: 12px;
  border: 2px solid #bdc3c7; border-top-color: #2980b9; border-radius: 50%;
  animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Settings panel ──────────────────────────────────────────────────────── */
.settings-panel { max-width: 500px; }

/* ─── Misc ─────────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.badge-am { background: #fdebd0; color: #e67e22; }
.badge-pm { background: #d5f5e3; color: #27ae60; }
.badge-135 { background: #d6eaf8; color: #2980b9; }
.badge-246 { background: #fadbd8; color: #c0392b; }
.text-muted { color: #95a5a6; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mb-8 { margin-bottom: 8px; }
.gap-8 { gap: 8px; }
.flex { display: flex; }
.items-center { align-items: center; }

/* ─── Patient detail header ────────────────────────────────────────────────── */
.patient-detail-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
  padding-bottom: 12px; border-bottom: 2px solid #e9ecef;
}
.patient-detail-header h2 { font-size: 18px; }
.patient-detail-header .meta { font-size: 13px; color: #7f8c8d; }

/* ─── KtV / URR computed row ───────────────────────────────────────────────── */
.computed-row { background: #fffde7; }

/* ─── Toast ────────────────────────────────────────────────────────────────── */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 6px; color: #fff; font-size: 13px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toastIn .3s ease;
  max-width: 360px;
}
.toast-success { background: #27ae60; }
.toast-error { background: #c0392b; }
.toast-info { background: #2980b9; }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- ═══ Header ════════════════════════════════════════════════════════════════ -->
<header class="app-header">
  <h1>洗腎室檢驗資料管理</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="switchTab('patients')" title="病患清單">&#128100;</button>
    <button class="btn-icon" onclick="switchTab('settings')" title="設定">&#9881;</button>
  </div>
</header>

<!-- ═══ Toast Container ══════════════════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ Main Container ════════════════════════════════════════════════════════ -->
<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="patients" onclick="switchTab('patients')">病患清單</button>
    <button class="tab-btn" data-tab="labview" onclick="switchTab('labview')">檢驗資料</button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">設定</button>
  </div>

  <!-- ═══ Tab: Patient List ════════════════════════════════════════════════── -->
  <div class="tab-panel active" id="tab-patients">
    <div class="card">
      <div class="card-header">
        <span>病患清單</span>
        <div class="flex gap-8">
          <button class="btn btn-primary btn-sm" onclick="showAddPatient()">+ 新增病患</button>
          <button class="btn btn-success btn-sm" onclick="updateAllPatients()" id="btnUpdateAll">更新全部資料</button>
          <button class="btn btn-outline btn-sm" onclick="exportPatients()">匯出 JSON</button>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">匯入 JSON</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importPatients(event)">
          <button class="btn btn-outline btn-sm" onclick="exportAllLabData()">匯出檢驗資料</button>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <table class="patient-table">
          <thead>
            <tr>
              <th>病歷號</th>
              <th>姓名</th>
              <th>性別</th>
              <th>年齡</th>
              <th>洗腎頻率</th>
              <th>時段</th>
              <th>最後更新</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="patientBody"></tbody>
        </table>
      </div>
      <div class="status-bar" id="statusBar">就緒</div>
    </div>
  </div>

  <!-- ═══ Tab: Lab View ════════════════════════════════════════════════════── -->
  <div class="tab-panel" id="tab-labview">
    <div class="card">
      <div class="card-header">
        <div class="patient-detail-header" id="labPatientHeader" style="border:none;margin:0;padding:0">
          <h2 id="labPatientName">請選擇病患</h2>
          <span class="meta" id="labPatientMeta"></span>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-outline btn-sm" id="btnExportLabCSV" onclick="exportPatientLabCSV()" disabled>匯出 CSV</button>
          <button class="btn btn-outline btn-sm" onclick="switchTab('patients')">返回清單</button>
        </div>
      </div>
      <div class="card-body">
        <div class="lab-wrapper" id="labTableWrapper">
          <p class="text-center text-muted">請從病患清單點選病患以查看檢驗資料</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Tab: Settings ════════════════════════════════════════════════════── -->
  <div class="tab-panel" id="tab-settings">
    <div class="card settings-panel">
      <div class="card-header"><span>系統設定</span></div>
      <div class="card-body">
        <div class="form-group">
          <label>API Base URL</label>
          <input type="text" id="settingBaseUrl" placeholder="http://ernode.vghb12.vhtt.gov.tw:8000">
        </div>
        <div class="form-group">
          <label>操作人員代號 (OPSID)</label>
          <input type="text" id="settingOpsid" placeholder="A123456789">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══ Patient Modal ═════════════════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="patientModal">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">新增病患</span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>病歷號 (Chart No.)</label>
        <input type="text" id="modalChartno" placeholder="810385G 或 000810385G">
      </div>
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="modalName" placeholder="王小明">
      </div>
      <div class="form-group">
        <label>洗腎頻率</label>
        <select id="modalSchedule">
          <option value="一三五">一三五</option>
          <option value="二四六">二四六</option>
        </select>
      </div>
      <div class="form-group">
        <label>時段</label>
        <select id="modalShift">
          <option value="上午">上午</option>
          <option value="下午">下午</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-sm" id="modalSaveBtn" onclick="savePatient()">儲存</button>
    </div>
  </div>
</div>

<!-- ═══ Confirm Modal ═════════════════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal" style="width:340px">
    <div class="modal-header">
      <span>確認刪除</span>
      <button class="modal-close" onclick="closeConfirm()">&times;</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg">確定要刪除此病患嗎？</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn">確定刪除</button>
    </div>
  </div>
</div>

<script>
'use strict';

// __HOSPITAL_LAB_PATTERNS_BEGIN__
// ════════════════════════════════════════════════════════════════════════════
// AUTO-GENERATED BLOCK — DO NOT EDIT BETWEEN THE __PATTERNS__ MARKERS
//
// Source of truth: hospital-lab-patterns repo (catalog.js + reporter.js)
//   https://github.com/Yuchunchen/hospital-lab-patterns
//
// To update:
//   1. Edit ../hospital-lab-patterns/patterns/{catalog,reporter}.js
//   2. git commit + git push
//   3. cd hospital-lab-reporter && node sync-patterns.js
//   4. Reload hospital-lab-data.html in your browser
//
// Synced at: 2026-05-04T05:47:10.076Z
// ════════════════════════════════════════════════════════════════════════════
'use strict';

/**
 * catalog.js — Master human-readable catalog of every lab/imaging entry
 * we know how to detect from the ernode API.
 *
 * Goals:
 *   1. Single source of truth: every test pattern lives here ONCE.
 *   2. Human-readable: organised by clinical category with comments.
 *   3. Universal fields only — NO app-specific layout (page/col/section/cat).
 *      Each consuming app (viewer / reporter) has its own manifest that
 *      picks ids from this catalog and adds layout / overrides.
 *
 * "Track-only" patterns (detect but don't render anywhere) just live here
 * and aren't referenced by any manifest.
 *
 * See ../docs/pattern-spec.md for field definitions, ../docs/learning-workflow.md
 * for the Claude-driven recipe to add new entries.
 */

const CATALOG = [

  // ═══════════════════════════════════════════════════════════════════════
  // HEMATOLOGY (CBC)
  // ═══════════════════════════════════════════════════════════════════════

  { id:'WBC',
    pattern: /WBC:\s*([\d.]+)(?!\s*[-–]\s*\d)/,
    displayName:'白血球 (WBC)', shortLabel:'WBC',
    unit:'×10³/µL', category:'血液',
    ref:'4.0–11.0 ×10³/µL',
    refLo:4.0, refHi:11.0, hi:11, lo:4,
    normalize: 'wbcCount',
    notes:'Negative lookahead in pattern rejects urine routine "WBC: 0-5". Normalize handles /µL (e.g. 6700) → ×10³/µL (6.7).' },

  { id:'RBC',
    pattern: /\bRBC:\s*([\d.]+)/,
    displayName:'紅血球 (RBC)', shortLabel:'RBC',
    unit:'×10⁶/µL', category:'血液',
    ref:'男 4.2–6.2，女 3.7–5.5 ×10⁶/µL',
    refLo:3.7, refHi:6.2, hi:6.2, lo:4.2 },

  { id:'Hb',
    pattern: /(?:Hb|HGB):\s*([\d.]+)/,
    displayName:'血色素 (Hemoglobin)', shortLabel:'Hb',
    unit:'g/dL', category:'血液',
    ref:'男 14–18，女 12–16 g/dL',
    refLo:12, refHi:18, hi:18, lo:14,
    notes:'Pattern matches both "Hb:" and "HGB:" labels.' },

  { id:'HCT',
    pattern: /HCT:\s*([\d.]+)/,
    displayName:'血比容 (HCT)', shortLabel:'HCT',
    unit:'%', category:'血液',
    ref:'男 39–53，女 33–47 %',
    refLo:33, refHi:53, hi:53, lo:39 },

  { id:'MCV',
    pattern: /MCV:\s*([\d.]+)/,
    displayName:'平均紅血球容積 (MCV)', shortLabel:'MCV',
    unit:'fL', category:'血液',
    ref:'79–99 fL',
    refLo:79, refHi:99, hi:99, lo:79 },

  { id:'Platelet',
    pattern: /Platelet:\s*([\d.]+)/,
    displayName:'血小板 (Platelet)', shortLabel:'PLT',
    unit:'×10³/µL', category:'血液',
    ref:'150–400 ×10³/µL',
    refLo:150, refHi:400, hi:400, lo:150,
    normalize: 'plateletCount',
    notes:'Normalize handles /µL (e.g. 250000) → ×10³/µL (250).' },

  // ═══════════════════════════════════════════════════════════════════════
  // PROTEINS
  // ═══════════════════════════════════════════════════════════════════════

  { id:'TP',
    pattern: /Total protein\(serum\):\s*([\d.]+)/i,
    displayName:'總蛋白 (Total Protein)', shortLabel:'TP',
    unit:'g/dL', category:'蛋白質',
    ref:'6.0–8.3 g/dL',
    refLo:6.0, refHi:8.3, hi:8.3, lo:6.0 },

  { id:'Albumin',
    pattern: /(?:^|[\s;])Albumin(?:\([^)]*\))?:\s*([\d.]+)/i,
    displayName:'白蛋白 (Albumin)', shortLabel:'Alb',
    unit:'g/dL', category:'蛋白質',
    ref:'3.5–5.0 g/dL',
    refLo:3.5, refHi:5.0, hi:5.0, lo:3.5,
    meaning:'營養狀態指標',
    notes:'Boundary requirement (^ or whitespace/semicolon) prevents matching "U-Albumin:" or "Microalbumin:".' },

  // ═══════════════════════════════════════════════════════════════════════
  // LIVER FUNCTION
  // ═══════════════════════════════════════════════════════════════════════

  { id:'GOT',
    pattern: /GOT:\s*([\d.]+)/,
    displayName:'天門冬胺酸轉氨酶 (GOT / AST)', shortLabel:'GOT/AST',
    unit:'U/L', category:'肝功能',
    ref:'5–34 U/L',
    refLo:5, refHi:34, hi:34, lo:null },

  { id:'GPT',
    pattern: /GPT:\s*([\d.]+)/,
    displayName:'丙胺酸轉氨酶 (GPT / ALT)', shortLabel:'GPT/ALT',
    unit:'U/L', category:'肝功能',
    ref:'男<45，女<34 U/L',
    refLo:7, refHi:45, hi:45, lo:null },

  { id:'RGT',
    pattern: /(?:r-?GT|R-?GT|γ-?GT|GGT|RGT):\s*([\d.]+)/i,
    displayName:'γ-麩胺醯轉移酶 (r-GT / GGT)', shortLabel:'r-GT',
    unit:'U/L', category:'肝功能',
    ref:'男 < 55，女 < 38 U/L',
    refLo:0, refHi:55, hi:55, lo:null,
    notes:'Pattern matches r-GT, R-GT, γ-GT, GGT, RGT — hospitals use various labels.' },

  { id:'ALP',
    pattern: /(?:Alk[\s.\-]*P|ALP|Alkaline\s*Phosphatase):\s*([\d.]+)/i,
    displayName:'鹼性磷酸酶 (Alk-P / ALP)', shortLabel:'Alk-P',
    unit:'U/L', category:'肝功能',
    ref:'40–130 U/L',
    refLo:34, refHi:130, hi:130, lo:34 },

  { id:'TBIL',
    pattern: /T-BIL:\s*([\d.]+)/,
    displayName:'總膽紅素 (T-BIL)', shortLabel:'T-BIL',
    unit:'mg/dL', category:'肝功能',
    ref:'0.3–1.0 mg/dL',
    refLo:0.3, refHi:1.0, hi:1.0, lo:null },

  { id:'DBIL',
    pattern: /D-BIL:\s*([\d.]+)/,
    displayName:'直接膽紅素 (D-BIL)', shortLabel:'D-BIL',
    unit:'mg/dL', category:'肝功能',
    ref:'0.03–0.18 mg/dL',
    refLo:0.03, refHi:0.18, hi:0.18, lo:null },

  // ═══════════════════════════════════════════════════════════════════════
  // LIPIDS
  // ═══════════════════════════════════════════════════════════════════════

  { id:'CHOL',
    pattern: /CHOL:\s*([\d.]+)/,
    displayName:'總膽固醇 (Cholesterol)', shortLabel:'CHOL',
    unit:'mg/dL', category:'血脂',
    ref:'< 200 mg/dL',
    refLo:null, refHi:200, hi:200, lo:null },

/**
 * normalizers.js — Named numeric-value transforms used by catalog entries.
 *
 * Why named: catalog entries reference normalizers by string name (e.g.
 * `normalize: 'wbcCount'`) so the catalog can be JSON-serialised for
 * runtime fetch. Functions can't go in JSON; string names can.
 *
 * To add a new normalizer:
 *   1. Add a named function below
 *   2. Reference it from a catalog entry: `normalize: 'yourName'`
 *   3. validate.js will confirm the name resolves
 *
 * NOTE: adding a new normalizer requires extension redistribution
 * (the bundled `normalizers.js` snapshot must be updated on each OPD
 * computer). Existing normalizers are stable and cover both current
 * use-cases below.
 */

const NORMALIZERS = {
  // WBC: API may report /µL (e.g. 6700) or ×10³/µL (6.7).
  // Normalize to ×10³/µL — divide by 1000 if value > 100.
  wbcCount: function (v) {
    return v > 100 ? +(v / 1000).toFixed(1) : v;
  },

  // Platelet: API may report /µL (e.g. 250000) or ×10³/µL (250).
  // Normalize to ×10³/µL — divide by 1000 if value > 1000.
  plateletCount: function (v) {
    return v > 1000 ? +(v / 1000).toFixed(0) : v;
  },
};

if (typeof module !== 'undefined' && module.exports) {
  module.exports = NORMALIZERS;
}
if (typeof window !== 'undefined') {
  window.HOSPITAL_LAB_PATTERNS_NORMALIZERS = NORMALIZERS;
}

// ═══════════════════════════════════════════════════════════════════════════════
// CHART NUMBER FORMATTING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Normalize chart number to 9-digit + 1-letter format (e.g. "810385G" -> "000810385G").
 */
function formatChartNo(raw) {
  const s = raw.trim();
  if (!s) throw new Error('請輸入病歷號');
  const last = s[s.length - 1];
  if (!/[a-zA-Z]/.test(last)) throw new Error('病歷號須以英文字母結尾 (如 810385G)');
  const letter = last.toUpperCase();
  const digitStr = s.slice(0, -1).replace(/\D/g, '');
  if (!digitStr) throw new Error('病歷號中未找到數字');
  if (digitStr.length > 9) throw new Error('數字部分最多 9 碼');
  return digitStr.padStart(9, '0') + letter;
}


// ═══════════════════════════════════════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════

/** Parse RESDTTM: "20260414203800" -> Date */
function parseDateResdttm(str) {
  if (!str || str.length < 8) return null;
  const y = +str.slice(0, 4), m = +str.slice(4, 6) - 1, d = +str.slice(6, 8);
  return new Date(y, m, d);
}

/** Parse Taiwan calendar date: "115/04/14 19:36" -> Date */
function parseDateTaiwan(str) {
  if (!str) return null;
  const match = str.match(/^(\d+)\/(\d+)\/(\d+)/);
  if (!match) return null;
  return new Date(+match[1] + 1911, +match[2] - 1, +match[3]);
}

/** Format Date to Taiwan calendar string: "115/04/14" */
function toTaiwanDate(d) {
  if (!d) return '';
  const y = d.getFullYear() - 1911;
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}

/** Format Date to short display: "04/14" */
function toShortDate(d) {
  if (!d) return '';
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

/** Format Date as YYYY-MM-DD for sorting */
function toSortableDate(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}


// ═══════════════════════════════════════════════════════════════════════════════
// API FETCHING & HTML PARSING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Parse patient info from the ernode HTML header.
 * Header text example: "全部醫囑 000123456A 王小明 M 51 歲"
 */
function parsePatientInfo(doc, chartno) {
  const headerText = doc.querySelector('table.Header')?.textContent || '';
  const rest = chartno ? headerText.split(chartno)[1] || '' : headerText;
  const m = rest.match(/\s+(.+?)\s+([MF])\s+(\d+)\s*歲/);
  if (!m) return null;
  return {
    chartno,
    name:   m[1].trim(),
    gender: m[2] === 'M' ? '男' : '女',
    genderCode: m[2],
    age:    m[3],
  };
}

/**
 * Parse a single page of order results from the ernode API HTML.
 * Returns { orders[], nextUrl, total, patientInfo }.
 */
function parseOrdersPage(html, chartno, baseUrl) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const grid = doc.querySelector('table.Grid');
  if (!grid) return { orders: [], nextUrl: null, total: 0, patientInfo: null };

  const patientInfo = parsePatientInfo(doc, chartno);
  const orders = [];

  grid.querySelectorAll('tr.Row').forEach(row => {
    if (row.cells.length < 6) return;
    const h = name => row.querySelector(`input[name="${name}"]`)?.value?.trim() || '';
    orders.push({
      ordseq:     h('ORDSEQ'),
      comKey:     h('COM_KEY'),
      ordapno:    h('ORDAPNO'),
      resdttm:    h('RESDTTM'),
      pfcode:     h('PFCODE'),
      ordType:    h('ORDTYPE'),
      orderName:  row.cells[0]?.textContent.trim() || '',
      status:     row.cells[1]?.textContent.trim() || '',
      reportText: row.cells[2]?.textContent.trim() || '',
      dept:       row.cells[3]?.textContent.trim() || '',
      orderDate:  row.cells[4]?.textContent.trim() || '',
      receiveDate: row.cells[5]?.textContent.trim() || '',
    });
  });

  // Pagination: find ">>" link
  let nextUrl = null;
  doc.querySelectorAll('a').forEach(a => {
    if (a.textContent.trim() === '>>' && !nextUrl) {
      const href = a.getAttribute('href');
      nextUrl = href ? baseUrl + href : null;
    }
  });

  const footerText = doc.querySelector('tr.Footer')?.textContent || '';
  const totalMatch = footerText.match(/總筆數：(\d+)/);
  const total = totalMatch ? +totalMatch[1] : 0;

  return { orders, nextUrl, total, patientInfo };
}

/**
 * Fetch all pages of lab orders for a given chart number.
 * @param {string} chartno - Formatted chart number (e.g. "000810385G")
 * @param {Function} onProgress - Callback(fetched, total)
 * @returns {Promise<{orders: Array, patientInfo: Object}>}
 */
async function fetchAllOrders(chartno, onProgress) {
  const settings = loadSettings();
  const baseUrl = settings.baseUrl;
  let url = `${baseUrl}/order/get_lab_orders?chartno=${chartno}&opsid=${settings.opsid}`;
  const all = [];
  let page = 0, total = 0, patientInfo = null;

  while (url) {
    page++;
    if (page > 50) break; // safety limit

    const resp = await fetch(url, { credentials: 'omit' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const html = await resp.text();

    const result = parseOrdersPage(html, chartno, baseUrl);
    if (page === 1) {
      if (result.total) total = result.total;
      if (result.patientInfo) patientInfo = result.patientInfo;
    }
    all.push(...result.orders);

    if (onProgress) onProgress(all.length, total || '?');
    if (!result.nextUrl || (total && all.length >= total)) break;
    url = result.nextUrl;
  }

  return { orders: all, patientInfo };
}


// ═══════════════════════════════════════════════════════════════════════════════
// LAB VALUE EXTRACTION
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Extract lab values from fetched orders.
 * Returns { testId: [{date: "YYYY-MM-DD", value: number|string, dateObj: Date}, ...], ... }
 *
 * BUN pre/post distinction:
 *   - composite orderName (contains comma): pre-dialysis
 *   - standalone "BUN" orderName: post-dialysis
 */
function extractLabValues(orders) {
  const results = {};
  LAB_TESTS.forEach(t => { results[t.id] = []; });

  // Filter to LAB orders within last 12 months (except hepatitis/HIV/RPR: all-time)
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 12);
  cutoff.setHours(0, 0, 0, 0);

  const ALL_TIME_IDS = new Set(['HBsAg', 'AntiHBs', 'AntiHCV', 'HIV', 'RPR']);

  for (const order of orders) {
    if (order.ordType && order.ordType !== 'LAB') continue;
    if (!order.reportText) continue;

    const dateObj = parseDateResdttm(order.resdttm) || parseDateTaiwan(order.orderDate);
    if (!dateObj) continue;

    const text = order.reportText;
    const dateStr = toSortableDate(dateObj);
    const isComposite = order.orderName.includes(',');
    const isStandaloneBun = order.orderName.trim() === 'BUN';

    for (const test of LAB_TESTS) {
      // Date filter: all-time for hepatitis/HIV/RPR, 12 months for everything else
      if (!ALL_TIME_IDS.has(test.id) && dateObj < cutoff) continue;

      // BUN filter logic
      if (test.filter === 'composite' && !isComposite) continue;
      if (test.filter === 'standalone_bun' && !isStandaloneBun) continue;

      const match = text.match(test.pattern);
      if (!match) continue;

      let value = match[1];
      if (!test.qualitative) {
        value = parseFloat(value);
        if (isNaN(value)) continue;
        if (test.normalize) {
          // catalog references normalizers by string name (so it stays
          // JSON-serialisable); look up the function from the bundled
          // NORMALIZERS table. Tolerate function references too for
          // forward/backward compat.
          const fn = typeof test.normalize === 'function'
            ? test.normalize
            : (typeof NORMALIZERS !== 'undefined' && NORMALIZERS[test.normalize]);
          if (typeof fn === 'function') value = fn(value);
        }
      }

      // Avoid duplicate date+value entries
      const existing = results[test.id];
      const dup = existing.find(e => e.date === dateStr && e.value === value);
      if (!dup) {
        existing.push({ date: dateStr, value, dateObj });
      }
    }
  }

  // Sort each test's results by date (newest first)
  for (const id in results) {
    results[id].sort((a, b) => b.date.localeCompare(a.date));
  }

  return results;
}

/**
 * Compute derived values (URR, Ca*P) from extracted lab data.
 * Adds entries to the results object under computed test IDs.
 */
function computeDerivedValues(results) {
  for (const ct of COMPUTED_TESTS) {
    results[ct.id] = [];

    if (ct.id === 'URR') {
      // Pair BUN_pre and BUN_post by same date
      const preMap = {};
      for (const e of (results['BUN_pre'] || [])) {
        if (!preMap[e.date]) preMap[e.date] = e.value;
      }
      for (const e of (results['BUN_post'] || [])) {
        const pre = preMap[e.date];
        if (pre != null) {
          const v = ct.compute(pre, e.value);
          if (v != null) {
            results[ct.id].push({ date: e.date, value: v, dateObj: e.dateObj });
          }
        }
      }
    } else if (ct.id === 'CaxP') {
      // Pair Ca and P by same date
      const caMap = {};
      for (const e of (results['Ca'] || [])) {
        if (!caMap[e.date]) caMap[e.date] = e.value;
      }
      for (const e of (results['P'] || [])) {
        const ca = caMap[e.date];
        if (ca != null) {
          const v = ct.compute(ca, e.value);
          if (v != null) {
            results[ct.id].push({ date: e.date, value: v, dateObj: e.dateObj });
          }
        }
      }
    }

    results[ct.id].sort((a, b) => b.date.localeCompare(a.date));
  }
  return results;
}

function renderPatientList() {
  const patients = loadPatients();
  const labData = loadLabData();
  const tbody = document.getElementById('patientBody');

  if (patients.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:24px">尚未新增病患，請點選「+ 新增病患」開始</td></tr>';
    return;
  }

  tbody.innerHTML = patients.map((p, i) => {
    const schedBadge = p.schedule === '一三五'
      ? '<span class="badge badge-135">一三五</span>'
      : '<span class="badge badge-246">二四六</span>';
    const shiftBadge = p.shift === '上午'
      ? '<span class="badge badge-am">上午</span>'
      : '<span class="badge badge-pm">下午</span>';
    const lastUpdate = labData[p.chartno]?._lastUpdate
      ? new Date(labData[p.chartno]._lastUpdate).toLocaleString('zh-TW')
      : '<span class="text-muted">未更新</span>';
    const gender = p.gender || '';
    const age = p.age || '';

    return `<tr>
      <td><a href="#" onclick="viewPatientLab('${p.chartno}'); return false;" style="color:#2980b9;font-weight:600">${p.chartno}</a></td>
      <td>${escHtml(p.name)}</td>
      <td>${gender}</td>
      <td>${age}</td>
      <td>${schedBadge}</td>
      <td>${shiftBadge}</td>
      <td style="font-size:11px">${lastUpdate}</td>
      <td class="actions">
        <button class="btn btn-primary btn-sm" onclick="updatePatient('${p.chartno}')">更新</button>
        <button class="btn btn-outline btn-sm" onclick="showEditPatient(${i})">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDeletePatient(${i})">刪除</button>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// UI - PATIENT MODAL (Add / Edit)
// ═══════════════════════════════════════════════════════════════════════════════

let _editIndex = -1; // -1 = adding new

function showAddPatient() {
  _editIndex = -1;
  document.getElementById('modalTitle').textContent = '新增病患';
  document.getElementById('modalChartno').value = '';
  document.getElementById('modalChartno').disabled = false;
  document.getElementById('modalName').value = '';
  document.getElementById('modalSchedule').value = '一三五';
  document.getElementById('modalShift').value = '上午';
  document.getElementById('patientModal').classList.remove('hidden');
}

function showEditPatient(idx) {
  _editIndex = idx;
  const p = loadPatients()[idx];
  if (!p) return;
  document.getElementById('modalTitle').textContent = '編輯病患';
  document.getElementById('modalChartno').value = p.chartno;
  document.getElementById('modalChartno').disabled = true;
  document.getElementById('modalName').value = p.name;
  document.getElementById('modalSchedule').value = p.schedule || '一三五';
  document.getElementById('modalShift').value = p.shift || '上午';
  document.getElementById('patientModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('patientModal').classList.add('hidden');
}

function savePatient() {
  const patients = loadPatients();
  const rawChartno = document.getElementById('modalChartno').value;
  const name = document.getElementById('modalName').value.trim();
  const schedule = document.getElementById('modalSchedule').value;
  const shift = document.getElementById('modalShift').value;

  if (!name) { showToast('請輸入姓名', 'error'); return; }

  let chartno;
  try { chartno = formatChartNo(rawChartno); }
  catch (e) { showToast(e.message, 'error'); return; }

  if (_editIndex === -1) {
    // Adding new
    if (patients.find(p => p.chartno === chartno)) {
      showToast('此病歷號已存在', 'error');
      return;
    }
    patients.push({ chartno, name, schedule, shift });
  } else {
    // Editing
    patients[_editIndex] = { ...patients[_editIndex], name, schedule, shift };
  }

  savePatients(patients);
  closeModal();
  renderPatientList();
  showToast(_editIndex === -1 ? '已新增病患' : '已更新病患資料', 'success');
}


// ═══════════════════════════════════════════════════════════════════════════════
// UI - DELETE CONFIRMATION
// ═══════════════════════════════════════════════════════════════════════════════

function confirmDeletePatient(idx) {
  const p = loadPatients()[idx];
  if (!p) return;
  document.getElementById('confirmMsg').textContent = `確定要刪除 ${p.name} (${p.chartno}) 嗎？`;
  document.getElementById('confirmOkBtn').onclick = () => {
    const patients = loadPatients();
    const chartno = patients[idx].chartno;
    patients.splice(idx, 1);
    savePatients(patients);
    // Also remove lab data
    const labData = loadLabData();
    delete labData[chartno];
    saveLabData(labData);
    closeConfirm();
    renderPatientList();
    showToast('已刪除病患', 'info');
  };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.add('hidden');
}


// ═══════════════════════════════════════════════════════════════════════════════
// DATA FETCHING - SINGLE PATIENT
// ═══════════════════════════════════════════════════════════════════════════════

function setStatus(msg, loading = false) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = (loading ? '<span class="spinner"></span>' : '') + escHtml(msg);
}

async function updatePatient(chartno) {
  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }

  setStatus(`正在擷取 ${chartno} 的資料...`, true);
  try {
    const { orders, patientInfo } = await fetchAllOrders(chartno, (n, t) => {
      setStatus(`${chartno}: 已擷取 ${n} / ${t} 筆`, true);
    });

    // Extract lab values
    let labValues = extractLabValues(orders);
    labValues = computeDerivedValues(labValues);

    // Save to localStorage
    const allLabData = loadLabData();
    allLabData[chartno] = { ...labValues, _lastUpdate: Date.now() };
    saveLabData(allLabData);

    // Update patient info (name, gender, age) if available from API
    if (patientInfo) {
      const patients = loadPatients();
      const idx = patients.findIndex(p => p.chartno === chartno);
      if (idx >= 0) {
        if (patientInfo.name) patients[idx].name = patientInfo.name;
        if (patientInfo.gender) patients[idx].gender = patientInfo.gender;
        if (patientInfo.genderCode) patients[idx].genderCode = patientInfo.genderCode;
        if (patientInfo.age) patients[idx].age = patientInfo.age;
        savePatients(patients);
      }
    }

    renderPatientList();
    setStatus(`${chartno}: 更新完成 (${orders.length} 筆醫囑)`);
    showToast(`${chartno} 資料更新完成`, 'success');
  } catch (err) {
    setStatus(`${chartno}: 擷取失敗 - ${err.message}`);
    showToast(`${chartno} 擷取失敗: ${err.message}`, 'error');
  }
}


// ═══════════════════════════════════════════════════════════════════════════════
// DATA FETCHING - ALL PATIENTS
// ═══════════════════════════════════════════════════════════════════════════════

async function updateAllPatients() {
  const patients = loadPatients();
  if (patients.length === 0) { showToast('沒有病患可更新', 'error'); return; }

  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }

  const btn = document.getElementById('btnUpdateAll');
  btn.disabled = true;
  let success = 0, fail = 0;

  for (let i = 0; i < patients.length; i++) {
    const p = patients[i];
    setStatus(`更新中 (${i+1}/${patients.length}): ${p.chartno} ${p.name}...`, true);
    try {
      const { orders, patientInfo } = await fetchAllOrders(p.chartno, (n, t) => {
        setStatus(`${p.chartno} ${p.name}: ${n}/${t} 筆`, true);
      });

      let labValues = extractLabValues(orders);
      labValues = computeDerivedValues(labValues);

      const allLabData = loadLabData();
      allLabData[p.chartno] = { ...labValues, _lastUpdate: Date.now() };
      saveLabData(allLabData);

      if (patientInfo) {
        if (patientInfo.name) patients[i].name = patientInfo.name;
        if (patientInfo.gender) patients[i].gender = patientInfo.gender;
        if (patientInfo.genderCode) patients[i].genderCode = patientInfo.genderCode;
        if (patientInfo.age) patients[i].age = patientInfo.age;
      }
      success++;
    } catch (err) {
      fail++;
      console.warn(`Failed to fetch ${p.chartno}:`, err);
    }
  }

  savePatients(patients);
  renderPatientList();
  btn.disabled = false;
  setStatus(`全部更新完成: ${success} 成功, ${fail} 失敗`);
  showToast(`更新完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`, fail ? 'warning' : 'success');
}

/**
 * View lab data for a specific patient.
 * Switches to the labview tab and renders the full history table.
 */
// Tracks the currently-viewed patient so 匯出 CSV knows what to export.
let CURRENT_LAB_CHARTNO = null;

function viewPatientLab(chartno) {
  CURRENT_LAB_CHARTNO = chartno;
  const csvBtn = document.getElementById('btnExportLabCSV');
  if (csvBtn) csvBtn.disabled = false;

  const patients = loadPatients();
  const patient = patients.find(p => p.chartno === chartno);
  const labData = loadLabData()[chartno];

  // Update header
  document.getElementById('labPatientName').textContent = patient
    ? `${patient.name} (${chartno})`
    : chartno;
  document.getElementById('labPatientMeta').textContent = patient
    ? `${patient.gender || ''} ${patient.age ? patient.age + '歲' : ''} | ${patient.schedule || ''} ${patient.shift || ''}`
    : '';

  const wrapper = document.getElementById('labTableWrapper');

  if (!labData) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">尚無檢驗資料，請先點選「更新」按鈕擷取資料</p>';
    switchTab('labview');
    return;
  }

  // Restrict the table to the active group's manifest so dialysis-specific
  // form items render in form order; pick up any displayLabel overrides.
  const manifestEntries = (GROUP.labManifest || []).map(resolveManifestEntry);
  const manifestIds     = new Set(manifestEntries.map(e => e.id));
  const labelOverride   = new Map(
    manifestEntries.filter(e => e.displayLabel).map(e => [e.id, e.displayLabel])
  );
  const computedIds = new Set(GROUP.computed || []);
  const allTests = [
    ...LAB_TESTS.filter(t => manifestIds.has(t.id)),
    ...COMPUTED_TESTS.filter(t => computedIds.has(t.id)),
  ];
  const dateSet = new Set();
  for (const test of allTests) {
    const entries = labData[test.id];
    if (!entries) continue;
    for (const e of entries) {
      dateSet.add(e.date);
    }
  }

  const dates = Array.from(dateSet).sort((a, b) => b.localeCompare(a)); // newest first

  if (dates.length === 0) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">未找到任何檢驗數據</p>';
    switchTab('labview');
    return;
  }

  // Convert dates to Taiwan calendar for header display
  const dateHeaders = dates.map(d => {
    const parts = d.split('-');
    const twYear = +parts[0] - 1911;
    return `${twYear}/${parts[1]}/${parts[2]}`;
  });

  // Build table HTML
  let html = '<table class="lab-table">';

  // Header row with dates
  html += '<thead><tr>';
  html += '<th style="min-width:120px;position:sticky;left:0;z-index:3;background:#1a5276">檢驗項目</th>';
  html += '<th style="min-width:90px;position:sticky;left:120px;z-index:3;background:#1a5276">參考值</th>';
  dates.forEach((d, i) => {
    const cls = i === 0 ? ' class="latest-col"' : '';
    html += `<th${cls}>${dateHeaders[i]}</th>`;
  });
  html += '</tr></thead>';

  html += '<tbody>';

  // Group tests by category — restricted to allTests (already manifest-filtered)
  for (const cat of LAB_CATEGORIES) {
    const testsInCat = allTests.filter(t => t.cat === cat.id);
    if (testsInCat.length === 0) continue;
    // Check if category has any data
    const hasData = testsInCat.some(t => labData[t.id] && labData[t.id].length > 0);
    if (!hasData) continue;

    // Category header row
    html += `<tr class="row-category"><td colspan="${dates.length + 2}">${cat.label}</td></tr>`;

    for (const test of testsInCat) {
      const entries = labData[test.id] || [];
      if (entries.length === 0) continue;

      // Build a date -> value map
      const dateMap = {};
      for (const e of entries) {
        if (!dateMap[e.date]) dateMap[e.date] = e.value; // take first (most recent if duplicates)
      }

      const lbl = labelOverride.get(test.id) || test.label;
      html += '<tr class="row-item">';
      html += `<td>${lbl}</td>`;
      html += `<td>${test.ref || ''} ${test.unit ? '(' + test.unit + ')' : ''}</td>`;

      dates.forEach((d, i) => {
        const val = dateMap[d];
        const cls = i === 0 ? ' latest-col' : '';

        if (val == null) {
          html += `<td class="${cls}"></td>`;
          return;
        }

        // Determine color class
        let valCls = '';
        if (test.qualitative) {
          // Qualitative: Reactive/positive = red, Non-Reactive/negative = green
          const lower = String(val).toLowerCase();
          if (lower.includes('reactive') && !lower.includes('non')) {
            valCls = 'val-q-pos';
          } else if (lower.includes('non-reactive') || lower.includes('negative') || lower.includes('nonreactive')) {
            valCls = 'val-q-neg';
          }
        } else {
          const numVal = typeof val === 'number' ? val : parseFloat(val);
          if (!isNaN(numVal)) {
            if (test.hi != null && numVal > test.hi) valCls = 'val-hi';
            else if (test.lo != null && numVal < test.lo) valCls = 'val-lo';
          }
        }

        html += `<td class="${valCls}${cls}">${val}</td>`;
      });

      html += '</tr>';
    }
  }

  html += '</tbody></table>';
  wrapper.innerHTML = html;
  switchTab('labview');
}

// IMPORT / EXPORT
// ═══════════════════════════════════════════════════════════════════════════════

/** Export patient list as JSON file */
function exportPatients() {
  const patients = loadPatients();
  const blob = new Blob([JSON.stringify(patients, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `洗腎室病患清單_${todayStr()}.json`);
  showToast('病患清單已匯出', 'success');
}

/** Import patient list from JSON file */
function importPatients(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('格式不正確');

      const existing = loadPatients();
      let added = 0, updated = 0;

      for (const p of imported) {
        if (!p.chartno || !p.name) continue;
        const idx = existing.findIndex(e => e.chartno === p.chartno);
        if (idx >= 0) {
          // Update existing
          existing[idx] = { ...existing[idx], ...p };
          updated++;
        } else {
          existing.push(p);
          added++;
        }
      }

      savePatients(existing);
      renderPatientList();
      showToast(`匯入完成: ${added} 新增, ${updated} 更新`, 'success');
    } catch (err) {
      showToast(`匯入失敗: ${err.message}`, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset input
}

/** Export all lab data as structured JSON */
function exportAllLabData() {
  const patients = loadPatients();
  const labData = loadLabData();
  const exportObj = { patients, labData };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `洗腎室檢驗資料_${todayStr()}.json`);
  showToast('檢驗資料已匯出', 'success');
}

/**
 * Export the currently-viewed patient's lab data as a form-aware wide CSV.
 * Delegates layout to GROUP.exporter (groups/dialysis.js for now).
 */
function exportPatientLabCSV(chartno) {
  const cn = chartno || CURRENT_LAB_CHARTNO;
  if (!cn) { showToast('請先選擇一位病患', 'error'); return; }
  if (!GROUP.exporter || typeof GROUP.exporter.format !== 'function') {
    showToast('此疾病模組尚未提供 CSV 匯出', 'error'); return;
  }

  const patients = loadPatients();
  const patient  = patients.find(p => p.chartno === cn) || { chartno: cn };
  const labData  = loadLabData()[cn];
  if (!labData) { showToast('此病患尚無檢驗資料', 'error'); return; }

  const draws = GROUP.exporter.buildDraws(labData);
  if (!draws.length) { showToast('此病患尚無可匯出的抽血紀錄', 'error'); return; }

  const csv      = GROUP.exporter.format(patient, draws);
  // BOM so Excel opens UTF-8 without garbling Chinese display labels.
  const blob     = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const filename = GROUP.exporter.filename
    ? GROUP.exporter.filename(patient)
    : `dialysis_${cn}.csv`;
  downloadBlob(blob, filename);
  showToast('CSV 已匯出', 'success');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function loadSettingsUI() {
  const s = loadSettings();
  document.getElementById('settingBaseUrl').value = s.baseUrl || '';
  document.getElementById('settingOpsid').value = s.opsid || '';
}

function saveSettings() {
  const baseUrl = document.getElementById('settingBaseUrl').value.trim().replace(/\/+$/, '');
  const opsid = document.getElementById('settingOpsid').value.trim();
  saveSettingsData({ baseUrl: baseUrl || 'http://ernode.vghb12.vhtt.gov.tw:8000', opsid });
  showToast('設定已儲存', 'success');
}
