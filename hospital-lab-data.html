// LAB VALUE EXTRACTION
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

/**
 * Extract lab values from fetched orders.
 * Returns { testId: [{date, value, dateObj, reportDateTime, orderName}, ...], ... }
 *
 * Step 2: BUN pre/post is no longer pre-classified at the parser layer. Both
 * BUN_pre and BUN_post testIds match every BUN occurrence; the dialysis
 * group's resolveBUN() re-derives pre/post from reportDateTime per cluster.
 * The legacy `composite` / `standalone_bun` filter strings (which never
 * matched the catalog's actual orderNameFilter regex anyway) have been
 * removed.
 */
function extractLabValues(orders) {
  const results = {};
  LAB_TESTS.forEach(t => { results[t.id] = []; });

  // Filter to LAB orders within last 12 months (except hepatitis/HIV/RPR: all-time)
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 12);
  cutoff.setHours(0, 0, 0, 0);

  const ALL_TIME_IDS = new Set(['HBsAg', 'AntiHBs', 'AntiHCV', 'HIV', 'RPR']);
  // Tests with sub-page enrichment chase historical values (e.g. annual
  // Aluminum). Give them all-time treatment too so the enriched older
  // entries don't get dropped by the 12-month cutoff downstream.
  LAB_TESTS.forEach(t => { if (t && t.subpage) ALL_TIME_IDS.add(t.id); });

  for (const order of orders) {
    if (order.ordType && order.ordType !== 'LAB') continue;
    if (!order.reportText) continue;

    const dateObj = parseDateResdttm(order.resdttm) || parseDateTaiwan(order.orderDate);
    if (!dateObj) continue;

    const text = order.reportText;
    const dateStr = toSortableDate(dateObj);
    const reportDateTime = dateObj.toISOString(); // full timestamp persisted for resolveBUN (legacy)
    const orderName     = order.orderName    || '';
    // Revision 1: persist explicit cluster anchor + BUN-sort key per entry.
    // effectiveTime = з”ҹж•ҲжҷӮй–“ (monthly cluster key); signOffTime = з°Ҫж”¶жҷӮй–“ (BUN pre/post sort).
    const effectiveTime = order.effectiveTime || null;
    const signOffTime   = order.signOffTime   || null;

    for (const test of LAB_TESTS) {
      // Date filter: all-time for hepatitis/HIV/RPR, 12 months for everything else
      if (!ALL_TIME_IDS.has(test.id) && dateObj < cutoff) continue;

      const match = text.match(test.pattern);
      if (!match) continue;

      let value = match[1];
      if (!test.qualitative) {
        // Detection-limit markers: keep "<N" / ">N" as a normalised string
        // (e.g. "AlйӢҒ: <2"). Downstream consumers naturally degrade вҖ” table
        // rendering parseFloat вҶ’ NaN вҶ’ renders as plain text without alarm
        // colour; URR/CaГ—P guard with isFinite; CSV stringifies as-is.
        // Skipping normalize() for these is safe вҖ” the `<` / `>` markers
        // historically come from manual lab annotations, not unit-conversion
        // candidates (no test today applies normalize to such values).
        const trimmed = String(value).replace(/\s+/g, '');
        if (/^[<>]/.test(trimmed)) {
          value = trimmed;
        } else {
          value = parseFloat(value);
          if (isNaN(value)) continue;
          if (test.normalize) {
            // catalog references normalizers by string name (so it stays
            // JSON-serialisable); look up the function from the bundled
            // NORMALIZERS table. Tolerate function references too for
            // forward/backward compat.
            const fn = typeof test.normalize === 'function'
              ? test.normalize
              : (typeof NORMALIZERS !== 'undefined' && NORMALIZERS[test.normalize]);
            if (typeof fn === 'function') value = fn(value);
          }
        }
      }

      // Dedupe: prefer signOffTime as the discriminator (it's the most
      // unique per-draw timestamp), then reportDateTime, finally fall back
      // to date+value when neither timestamp is present.
      const existing = results[test.id];
      const dup = existing.find(e =>
        e.value === value &&
        ((e.signOffTime   && e.signOffTime   === signOffTime)   ||
         (e.reportDateTime && e.reportDateTime === reportDateTime) ||
         (!e.signOffTime && !e.reportDateTime && e.date === dateStr))
      );
      if (!dup) {
        existing.push({
          date: dateStr,
          value,
          dateObj,
          reportDateTime,
          effectiveTime,
          signOffTime,
          orderName,
        });
      }
    }
  }

  // Sort each test's results by date (newest first)
  for (const id in results) {
    results[id].sort((a, b) => b.date.localeCompare(a.date));
  }

  // Revision 1 hotfix (2026-05-05): rebuild BUN_pre[] / BUN_post[].
  // Both regexes match every BUN occurrence, so each entry was being stored
  // in BOTH arrays вҖ” leaving BUN(AD) effectively empty downstream.
  classifyBUNPrePost(results);

  return results;
}

/**
 * Post-processing pass for BUN_pre / BUN_post (revision 1 hotfix).
 *
 * Both BUN_pre and BUN_post share the same /BUN:\s*([\d.]+)/ regex, so every
 * BUN draw lands in BOTH arrays. This pass rebuilds the two arrays so each
 * physical draw appears exactly once in the correct bucket.
 *
 * Method A (primary, cross-hospital safe): sort same-date entries by
 * signOffTime / dateObj вҖ” earliest = pre (жҙ—еүҚ), latest = post (жҙ—еҫҢ).
 * Method B (fallback): when A is ambiguous (missing timestamps or ties),
 * match orderName for жҙ—еүҚ / жҙ—еҫҢ markers.
 */
function classifyBUNPrePost(results) {
  const pre  = results.BUN_pre  || [];
  const post = results.BUN_post || [];
  const all  = [...pre, ...post];
  if (all.length === 0) return results;

  // Dedupe: same physical draw in BUN_pre[] and BUN_post[].
  const seen = new Set();
  const dedup = [];
  for (const e of all) {
    const tsKey = e.signOffTime
      || (e.dateObj instanceof Date ? e.dateObj.toISOString() : '')
      || e.reportDateTime
      || e.date
      || '';
    const key = String(e.value) + '|' + tsKey + '|' + (e.orderName || '');
    if (seen.has(key)) continue;
    seen.add(key);
    dedup.push(e);
  }

  // Group by date (YYYY-MM-DD)
  const byDate = {};
  for (const e of dedup) {
    if (!e.date) continue;
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  }

  const newPre = [];
  const newPost = [];
  for (const date in byDate) {
    const { pre: p, post: q } = classifyBUNForDate(byDate[date], date);
    if (p) newPre.push(p);
    if (q) newPost.push(q);
  }

  newPre.sort((a, b) => b.date.localeCompare(a.date));
  newPost.sort((a, b) => b.date.localeCompare(a.date));
  results.BUN_pre  = newPre;
  results.BUN_post = newPost;
  return results;
}

function _bunEntryTime(e) {
  if (e.signOffTime) {
    const t = new Date(e.signOffTime).getTime();
    if (Number.isFinite(t)) return t;
  }
  if (e.dateObj instanceof Date) {
    const t = e.dateObj.getTime();
    if (Number.isFinite(t)) return t;
  }
  if (e.reportDateTime) {
    const t = new Date(e.reportDateTime).getTime();
    if (Number.isFinite(t)) return t;
  }
  return null;
}

function classifyBUNForDate(entries, date) {
  if (entries.length === 1) return { pre: entries[0], post: null };

  const times = entries.map(_bunEntryTime);
  const hasMissing = times.some(t => t == null);
  const present    = times.filter(t => t != null);
  const hasTie     = present.length !== new Set(present).size;

  // Method A вҖ” sort by timestamp; earliest = pre, latest = post.
  if (!hasMissing && !hasTie) {
    const sorted = [...entries].sort((a, b) => _bunEntryTime(a) - _bunEntryTime(b));
    if (sorted.length > 2) {
      try { console.warn(`[BUN] 3+ entries on date ${date} вҖ” taking earliest as pre, latest as post`, entries); } catch (_) {}
    }
    return { pre: sorted[0], post: sorted[sorted.length - 1] };
  }

  // Method B вҖ” fallback by orderName text.
  try { console.warn(`[BUN] classification fell back to orderName for date ${date}`, entries); } catch (_) {}
  let pre = null, post = null;
  const unmarked = [];
  for (const e of entries) {
    const name = e.orderName || '';
    if (name.includes('жҙ—еҫҢ')) {
      if (!post) post = e;
    } else if (name.includes('жҙ—еүҚ')) {
      if (!pre) pre = e;
    } else {
      unmarked.push(e);
    }
  }
  if (!pre  && unmarked.length > 0) pre  = unmarked.shift();
  if (!post && unmarked.length > 0) post = unmarked.shift();
  if (unmarked.length > 0) {
    try { console.warn(`[BUN] ambiguous on date ${date} вҖ” extra unmarked entries dropped`, entries); } catch (_) {}
  }
  return { pre, post };
}

/**
 * Compute derived values (URR, Ca*P) from extracted lab data.
 * Adds entries to the results object under computed test IDs.
 */
function computeDerivedValues(results) {
  for (const ct of COMPUTED_TESTS) {
    results[ct.id] = [];

    if (ct.id === 'URR') {
      // Pair BUN_pre and BUN_post by same date
      const preMap = {};
      for (const e of (results['BUN_pre'] || [])) {
        if (!preMap[e.date]) preMap[e.date] = e.value;
      }
      for (const e of (results['BUN_post'] || [])) {
        const pre = preMap[e.date];
        if (pre != null) {
          const v = ct.compute(pre, e.value);
          if (v != null) {
            results[ct.id].push({ date: e.date, value: v, dateObj: e.dateObj });
          }
        }
      }
    } else if (ct.id === 'CaxP') {
      // Pair Ca and P by same date
      const caMap = {};
      for (const e of (results['Ca'] || [])) {
        if (!caMap[e.date]) caMap[e.date] = e.value;
      }
      for (const e of (results['P'] || [])) {
        const ca = caMap[e.date];
        if (ca != null) {
          const v = ct.compute(ca, e.value);
          if (v != null) {
            results[ct.id].push({ date: e.date, value: v, dateObj: e.dateObj });
          }
        }
      }
    }

    results[ct.id].sort((a, b) => b.date.localeCompare(a.date));
  }
  return results;
}

// в”Җв”Җв”Җ Patient selection (Phase 1.5) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// In-memory Set of chartnos the user has ticked. Intentionally NOT persisted
// to localStorage вҖ” refresh = clear is the documented expected behavior.
// Export functions consult getSelectedChartNos() to decide scope; null means
// "all visible patients" (i.e. nothing ticked вҶ’ export everyone).

const selectedPatients = new Set();

function toggleSelectAll(checked) {
  // Only flip what's currently visible (after sort/filter), per brief В§1.3.
  document.querySelectorAll('.patient-select').forEach(cb => {
    cb.checked = checked;
    if (checked) selectedPatients.add(cb.value);
    else         selectedPatients.delete(cb.value);
  });
  // Also repaint the row backgrounds without a full re-render.
  document.querySelectorAll('#patientBody tr').forEach(tr => {
    const cb = tr.querySelector('.patient-select');
    if (!cb) return;
    if (cb.checked) { tr.classList.add('row-selected'); tr.style.background = '#eaf4fd'; }
    else            { tr.classList.remove('row-selected'); tr.style.background = ''; }
  });
  updateSelectUI();
}

function togglePatientSelect(chartno, checked) {
  if (checked) selectedPatients.add(chartno);
  else         selectedPatients.delete(chartno);
  // Lightweight row repaint without a full re-render.
  const cb = document.querySelector(`.patient-select[value="${CSS.escape(chartno)}"]`);
  const tr = cb ? cb.closest('tr') : null;
  if (tr) {
    if (checked) { tr.classList.add('row-selected'); tr.style.background = '#eaf4fd'; }
    else         { tr.classList.remove('row-selected'); tr.style.background = ''; }
  }
  updateSelectState();
}

// Sync the header's master checkbox (checked / indeterminate / clear) and
// refresh the export-button labels. Called after every patient render and
// after every individual toggle.
function updateSelectState() {
  const all     = document.querySelectorAll('.patient-select');
  const checked = document.querySelectorAll('.patient-select:checked');
  const master  = document.getElementById('selectAll');
  if (master) {
    master.checked       = all.length > 0 && checked.length === all.length;
    master.indeterminate = checked.length > 0 && checked.length < all.length;
  }
  updateSelectUI();
}

function updateSelectUI() {
  // Append `(N)` to export button labels when the user has narrowed scope.
  // Empty selection вҶ’ revert to plain label (= е…ЁйғЁ).
  const n = selectedPatients.size;
  const setLabel = (id, base) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.textContent = n > 0 ? `${base} (${n})` : base;
  };
  setLabel('btnExportKiDiTi', 'еҢҜеҮәKiDiTiиіҮж–ҷ');
  setLabel('btnExportCSV',    'еҢҜеҮәcsv');
}

// null = export all tracked patients; array = only those.
function getSelectedChartNos() {
  return selectedPatients.size > 0 ? Array.from(selectedPatients) : null;
}


// Column config drives header rendering, sort, and filter widgets.
// Built once per render so dynamic patientFields (dialysisDays/shift) stay
// in sync with whatever the active group declares.
function buildPatientColumns() {
  const cols = [
    // Phase 1.5: leftmost selection checkbox column. Width-fixed,
    // no sort, no filter вҖ” renderPatientHead/Body special-case `_select`.
    { key: '_select',     label: '',         filter: null, sort: null },
    { key: 'chartno',     label: 'з—…жӯ·иҷҹ',   filter: 'text', sort: 'localeZh' },
    { key: 'name',        label: 'е§“еҗҚ',     filter: 'text', sort: 'localeZh' },
    { key: 'sex',         label: 'жҖ§еҲҘ',     filter: 'enum', enumOptions: ['M', 'F'], sort: 'string' },
    { key: 'age',         label: 'е№ҙйҪЎ',     filter: 'text', sort: 'numeric' },
  ];
  for (const f of (GROUP.patientFields || [])) {
    cols.push({
      key: f.key, label: f.label,
      filter: 'enum',
      enumOptions: (f.options || []).slice(),
      sort: 'enumUnsetLast',
    });
  }
  cols.push({ key: '_lastUpdate', label: 'жңҖеҫҢжӣҙж–°', filter: null, sort: 'numeric' });
  cols.push({ key: '_actions',    label: 'еӢ•дҪң',     filter: null, sort: null });
  return cols;
}

function loadSortState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.patientSort)) || null; }
  catch { return null; }
}
function saveSortState(s) {
  if (s) localStorage.setItem(STORAGE_KEYS.patientSort, JSON.stringify(s));
  else   localStorage.removeItem(STORAGE_KEYS.patientSort);
}
function loadFilterState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.patientFilters)) || {}; }
  catch { return {}; }
}
function saveFilterState(f) {
  localStorage.setItem(STORAGE_KEYS.patientFilters, JSON.stringify(f || {}));
}

// Read the value used for sort/filter (handles synthetic _lastUpdate +
// sex fallback for legacy genderCode-only records).
function patientCellValue(p, key, labData) {
  if (key === '_lastUpdate') return labData[p.chartno]?._lastUpdate || 0;
  if (key === 'sex')         return p.sex || p.genderCode || '';
  return p[key] != null ? p[key] : '';
}

function compareForColumn(va, vb, sortType, dir) {
  const sign = dir === 'desc' ? -1 : 1;
  if (sortType === 'numeric') {
    const na = Number(va), nb = Number(vb);
    const aNan = !Number.isFinite(na), bNan = !Number.isFinite(nb);
    if (aNan && bNan) return 0;
    if (aNan) return 1;          // missing values always last
    if (bNan) return -1;
    return (na - nb) * sign;
  }
  if (sortType === 'enumUnsetLast') {
    const aUnset = !va || va === 'жңӘиЁӯе®ҡ';
    const bUnset = !vb || vb === 'жңӘиЁӯе®ҡ';
    if (aUnset && !bUnset) return 1;   // жңӘиЁӯе®ҡ always at the bottom
    if (!aUnset && bUnset) return -1;
    return String(va).localeCompare(String(vb), 'zh-TW') * sign;
  }
  if (sortType === 'localeZh') {
    return String(va || '').localeCompare(String(vb || ''), 'zh-TW') * sign;
  }
  return String(va || '').localeCompare(String(vb || '')) * sign;
}

function applyPatientFilters(list, filters, labData, cols) {
  const colByKey = new Map(cols.map(c => [c.key, c]));
  const active = Object.entries(filters).filter(([, v]) => v != null && String(v).trim() !== '' && v !== '(е…ЁйғЁ)');
  if (active.length === 0) return list;
  return list.filter(p => active.every(([key, val]) => {
    const col = colByKey.get(key);
    if (!col) return true;
    const cell = patientCellValue(p, key, labData);
    if (col.filter === 'enum') return String(cell) === String(val);
    return String(cell).toLowerCase().includes(String(val).toLowerCase());
  }));
}

function applyPatientSort(list, sort, labData) {
  if (!sort || !sort.column) return list;
  const cols = buildPatientColumns();
  const col = cols.find(c => c.key === sort.column);
  if (!col || !col.sort) return list;
  return [...list].sort((a, b) => compareForColumn(
    patientCellValue(a, sort.column, labData),
    patientCellValue(b, sort.column, labData),
    col.sort, sort.dir
  ));
}

function renderPatientHead(cols, sort, filters) {
  const head = document.getElementById('patientHead');
  if (!head) return;
  const sortInd = (key) => {
    if (!sort || sort.column !== key) return '';
    return `<span class="sort-ind">${sort.dir === 'asc' ? 'в–І' : 'в–ј'}</span>`;
  };
  const headerCells = cols.map(c => {
    if (c.key === '_select') {
      return `<th style="width:36px;text-align:center"><input type="checkbox" id="selectAll" title="е…ЁйҒё/е…ЁдёҚйҒё (еғ…дҪңз”Ёж–јзӣ®еүҚеҸҜиҰӢеҲ—)" onchange="toggleSelectAll(this.checked)"></th>`;
    }
    const sortable = !!c.sort;
    const cls = sortable ? 'sortable' : '';
    const onClick = sortable ? ` onclick="cyclePatientSort('${c.key}')"` : '';
    return `<th class="${cls}"${onClick}>${escHtml(c.label)}${sortInd(c.key)}</th>`;
  }).join('');
  const filterCells = cols.map(c => {
    if (!c.filter) return '<th></th>';
    const cur = filters[c.key] != null ? filters[c.key] : '';
    if (c.filter === 'enum') {
      const opts = ['(е…ЁйғЁ)', ...(c.enumOptions || [])].map(o => {
        const val = o === '(е…ЁйғЁ)' ? '' : o;
        return `<option value="${escAttr(val)}"${String(cur) === String(val) ? ' selected' : ''}>${escHtml(o)}</option>`;
      }).join('');
      return `<th><select data-col="${escAttr(c.key)}" onchange="setPatientFilter('${c.key}', this.value)">${opts}</select></th>`;
    }
    return `<th><input type="text" data-col="${escAttr(c.key)}" value="${escAttr(cur)}" placeholder="зҜ©йҒё..." oninput="setPatientFilter('${c.key}', this.value)"></th>`;
  }).join('');
  head.innerHTML = `<tr>${headerCells}</tr><tr class="filter-row">${filterCells}</tr>`;
}

function renderPatientBody(visible, cols, labData, totalCount) {
  const tbody = document.getElementById('patientBody');
  if (!tbody) return;
  const colspan = cols.length;
  if (totalCount === 0) {
    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted" style="padding:24px">е°ҡжңӘиҝҪи№Өд»»дҪ•з—…жӮЈгҖӮи«ӢеңЁдёҠж–№ијёе…Ҙз—…жӯ·иҷҹеҫҢжҢүгҖҢж–°еўһжё…е–®гҖҚгҖӮ</td></tr>`;
    return;
  }
  if (visible.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted" style="padding:24px">жІ’жңүз¬ҰеҗҲзӣ®еүҚзҜ©йҒёжўқд»¶зҡ„з—…жӮЈгҖӮ</td></tr>`;
    return;
  }
  const fields = (GROUP.patientFields || []);
  const fieldKeys = new Set(fields.map(f => f.key));

  tbody.innerHTML = visible.map(p => {
    const isSelected = selectedPatients.has(p.chartno);
    const rowAttrs = isSelected ? ' class="row-selected" style="background:#eaf4fd"' : '';
    const cells = cols.map(c => {
      if (c.key === '_select') {
        return `<td style="text-align:center"><input type="checkbox" class="patient-select" value="${escAttr(p.chartno)}"${isSelected ? ' checked' : ''} onchange="togglePatientSelect('${p.chartno}', this.checked)"></td>`;
      }
      if (c.key === 'chartno') {
        return `<td><a href="#" onclick="viewPatientLab('${p.chartno}'); return false;" style="color:#2980b9;font-weight:600">${escHtml(p.chartno)}</a></td>`;
      }
      if (c.key === 'name') return `<td>${escHtml(p.name || '')}</td>`;
      if (c.key === 'sex')  return `<td>${escHtml(p.sex || p.genderCode || '')}</td>`;
      if (c.key === 'age')  return `<td>${escHtml(p.age != null ? String(p.age) : '')}</td>`;
      if (fieldKeys.has(c.key)) {
        const f = fields.find(x => x.key === c.key);
        const cur = p[c.key] != null && p[c.key] !== '' ? p[c.key] : (f.default || '');
        const opts = (f.options || []).map(o =>
          `<option value="${escAttr(o)}"${o === cur ? ' selected' : ''}>${escHtml(o)}</option>`
        ).join('');
        return `<td><select onchange="updatePatientField('${p.chartno}','${f.key}',this.value)" style="padding:4px 6px;font-size:12px">${opts}</select></td>`;
      }
      if (c.key === '_lastUpdate') {
        const ts = labData[p.chartno]?._lastUpdate;
        const text = ts ? new Date(ts).toLocaleString('zh-TW') : '<span class="text-muted">жңӘжӣҙж–°</span>';
        return `<td style="font-size:11px">${text}</td>`;
      }
      if (c.key === '_actions') {
        return `<td class="actions"><span class="row-actions">
          <button class="btn btn-primary" title="йҮҚж–°жҠ“еҸ–жӯӨз—…жӮЈиіҮж–ҷ" data-row-refresh="${escAttr(p.chartno)}" onclick="refreshOnePatient('${p.chartno}', this)">вҶ»</button>
          <button class="btn btn-danger" title="з§»йҷӨжӯӨз—…жӮЈ" onclick="confirmRemovePatient('${p.chartno}')">вң•</button>
        </span></td>`;
      }
      return '<td></td>';
    }).join('');
    return `<tr${rowAttrs}>${cells}</tr>`;
  }).join('');
}

function renderPatientList() {
  const cols     = buildPatientColumns();
  const patients = loadPatients();
  const labData  = loadLabData();
  const sort     = loadSortState();
  const filters  = loadFilterState();
  const filtered = applyPatientFilters(patients, filters, labData, cols);
  const sorted   = applyPatientSort(filtered, sort, labData);
  renderPatientHead(cols, sort, filters);
  renderPatientBody(sorted, cols, labData, patients.length);
  // Master checkbox + export-button labels reflect the surviving Set state.
  updateSelectState();
}

// Header click handler вҖ” cycles unsorted вҶ’ asc вҶ’ desc вҶ’ unsorted.
function cyclePatientSort(column) {
  const cur = loadSortState();
  let next;
  if (!cur || cur.column !== column)      next = { column, dir: 'asc' };
  else if (cur.dir === 'asc')             next = { column, dir: 'desc' };
  else                                    next = null;
  saveSortState(next);
  renderPatientList();
}

// Filter input handler вҖ” text inputs call this on every keystroke. With
// вүӨ ~50 patients the re-render cost is negligible, so no debounce needed.
// Re-rendering the whole table would steal focus from the input being
// typed into; we restore focus + caret position after the rebuild.
function setPatientFilter(column, value) {
  const filters = loadFilterState();
  if (value == null || String(value).trim() === '') delete filters[column];
  else                                              filters[column] = value;
  saveFilterState(filters);

  const active  = document.activeElement;
  const wasInput = active && active.tagName === 'INPUT' && active.dataset.col === column;
  const caret   = wasInput ? active.selectionStart : null;

  renderPatientList();

  if (wasInput) {
    const next = document.querySelector(`#patientHead input[data-col="${CSS.escape(column)}"]`);
    if (next) {
      next.focus();
      if (caret != null) try { next.setSelectionRange(caret, caret); } catch (_) {}
    }
  }
}

/**
 * Per-row refresh handler (hotfix v2). Re-fetches labs + demographics for
 * a single chartNo using the same pipeline as the top-level жӣҙж–°иіҮж–ҷ.
 * The clicked button is disabled with a spinner glyph during the fetch.
 */
async function refreshOnePatient(chartno, btn) {
  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('и«Ӣе…ҲеҲ°гҖҢиЁӯе®ҡгҖҚеЎ«еҜ«ж“ҚдҪңдәәе“Ўд»Јиҷҹ (OPSID)', 'error');
    switchTab('settings');
    return;
  }
  const originalText = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = 'вҹі'; }
  setStatus(`жӣҙж–° ${chartno} дёӯ...`, true);
  try {
    await fetchAndStore(chartno);
    renderPatientList();
    setStatus(`е·Іжӣҙж–°: ${chartno}`);
    showToast(`е·Іжӣҙж–° ${chartno}`, 'success');
  } catch (err) {
    console.warn(`Failed to refresh ${chartno}:`, err);
    if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
    setStatus(`жӣҙж–°еӨұж•—: ${chartno}`);
    showToast(`жӣҙж–° ${chartno} еӨұж•—`, 'error');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}
function escAttr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** Persist a user-editable field on a patient (dialysisDays / shift selects). */
function updatePatientField(chartno, key, value) {
  const patients = loadPatients();
  const idx = patients.findIndex(p => p.chartno === chartno);
  if (idx < 0) return;
  patients[idx][key] = value;
  savePatients(patients);
}

// DATA FETCHING вҖ” ID-LIST INPUT + BATCH UPDATE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function setStatus(msg, loading = false) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = (loading ? '<span class="spinner"></span>' : '') + escHtml(msg);
}

/**
 * Split a textarea blob into normalized chartNos.
 * Accepts newlines, commas, semicolons, pipes, or whitespace as separators.
 * Returns { chartnos: [...unique, normalized], errors: [...rejected raw tokens with reason] }.
 */
function parseChartNoList(text) {
  const result = { chartnos: [], errors: [] };
  if (!text) return result;
  const tokens = text.split(/[,;|\s]+/).map(s => s.trim()).filter(Boolean);
  const seen = new Set();
  for (const t of tokens) {
    try {
      const cn = formatChartNo(t);
      if (seen.has(cn)) continue;
      seen.add(cn);
      result.chartnos.push(cn);
    } catch (err) {
      result.errors.push(`${t}: ${err.message}`);
    }
  }
  return result;
}

/**
 * Fetch one chartNo end-to-end: hit the API, extract labs, persist to
 * storage, refresh demographics. Throws on network / parse error.
 *
 * Incremental path: if the raw-orders IndexedDB cache already has orders
 * for this chartno, we run fetchIncremental вҖ” typically 1 API call per
 * patient instead of 5вҖ“15. First fetch (or empty cache) falls back to
 * fetchAllOrders.
 */
async function fetchAndStore(chartno) {
  const cached = await ordersCacheGet(chartno);

  let orders, patientInfo;
  if (cached && Array.isArray(cached.orders) && cached.orders.length > 0) {
    // Clone cached orders so the in-place status overwrites in
    // fetchIncremental don't mutate the IndexedDB-derived array before
    // the final put writes the merged result.
    const baseline = cached.orders.map(o => ({ ...o }));
    const result = await fetchIncremental(chartno, baseline, (n, t) => {
      setStatus(`${chartno}: еўһйҮҸжӣҙж–° ${n} / ${t} зӯҶ`, true);
    });
    orders = result.orders;
    patientInfo = result.patientInfo;
    console.log(`[incremental] ${chartno}: ${result.pagesChecked} page(s) checked, total ${orders.length}`);
  } else {
    const result = await fetchAllOrders(chartno, (n, t) => {
      setStatus(`${chartno}: е·Іж“·еҸ– ${n} / ${t} зӯҶ`, true);
    });
    orders = result.orders;
    patientInfo = result.patientInfo;
  }

  // Sub-page enrichment: any manifest testId still missing вҶ’ selectively
  // fetch the "и«Ӣ ClickгҖҢжӯЈејҸе ұе‘ҠгҖҚ" sub-pages within cutoff (cache-first).
  // LAB_TESTS = resolved REPORTER_MANIFEST, so adding a new sub-page-only
  // test now only requires a catalog/manifest change. enrichMissingValues
  // skips orders whose pattern already matches reportText, so previously
  // enriched cached orders aren't re-enriched.
  try {
    await enrichMissingValues(orders, chartno, LAB_TESTS, {
      onProgress: msg => setStatus(`${chartno}: ${msg}`, true),
    });
  } catch (e) {
    console.warn('[enrichMissingValues] failed:', e);
  }

  // Persist raw orders cache (post-enrichment so cached reportText already
  // includes any sub-page splices).
  try {
    await ordersCachePut(chartno, orders);
  } catch (e) {
    console.warn('[ordersCache] put failed:', e);
  }

  let labValues = extractLabValues(orders);
  labValues = computeDerivedValues(labValues);
  const allLabData = loadLabData();
  allLabData[chartno] = { ...labValues, _lastUpdate: Date.now() };
  saveLabData(allLabData);

  // Demographics refresh on every fetch (revision 1: not user-editable).
  if (patientInfo) {
    const patients = loadPatients();
    const idx = patients.findIndex(p => p.chartno === chartno);
    if (idx >= 0) {
      if (patientInfo.name)       patients[idx].name = patientInfo.name;
      if (patientInfo.genderCode) patients[idx].sex  = patientInfo.genderCode;
      if (patientInfo.age)        patients[idx].age  = patientInfo.age;
      savePatients(patients);
    }
  }
}

/**
 * Handler for the ж–°еўһжё…е–® button: parses the textarea, adds any new chartNos
 * to the tracked list (with default field values), then batch-fetches each.
 * On completion the textarea is cleared (per revision 1 hotfix).
 */
async function addAndUpdateFromInput() {
  const ta  = document.getElementById('chartnoInput');
  const raw = ta ? ta.value : '';
  const { chartnos, errors } = parseChartNoList(raw);

  if (errors.length) {
    const head = errors.slice(0, 3).join('пјӣ ');
    showToast(`${errors.length} зӯҶз„Ўж•Ҳз—…жӯ·иҷҹе·ІеҝҪз•Ҙпјҡ${head}${errors.length > 3 ? 'вҖҰ' : ''}`, 'error', 5000);
  }
  if (chartnos.length === 0) {
    if (!errors.length) showToast('и«Ӣијёе…ҘиҮіе°‘дёҖзӯҶз—…жӯ·иҷҹ', 'error');
    return;
  }

  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('и«Ӣе…ҲеҲ°гҖҢиЁӯе®ҡгҖҚеЎ«еҜ«ж“ҚдҪңдәәе“Ўд»Јиҷҹ (OPSID)', 'error');
    switchTab('settings');
    return;
  }

  // Add any new chartNos to the tracked list with default field values.
  const patients = loadPatients();
  const fields = (GROUP.patientFields || []);
  let added = 0;
  for (const cn of chartnos) {
    if (!patients.find(p => p.chartno === cn)) {
      const fresh = { chartno: cn };
      for (const f of fields) fresh[f.key] = f.default || '';
      patients.push(fresh);
      added++;
    }
  }
  if (added > 0) {
    savePatients(patients);
    renderPatientList();
  }

  const btnAdd = document.getElementById('btnAddToList');
  const btnRef = document.getElementById('btnRefreshList');
  if (btnAdd) btnAdd.disabled = true;
  if (btnRef) btnRef.disabled = true;
  let success = 0, fail = 0;
  for (let i = 0; i < chartnos.length; i++) {
    const cn = chartnos[i];
    setStatus(`ж–°еўһжё…е–®дёӯ (${i + 1}/${chartnos.length}): ${cn}...`, true);
    try {
      await fetchAndStore(cn);
      success++;
    } catch (err) {
      fail++;
      console.warn(`Failed to fetch ${cn}:`, err);
    }
  }
  renderPatientList();
  if (btnAdd) btnAdd.disabled = false;
  if (btnRef) btnRef.disabled = false;
  if (ta && success > 0 && fail === 0) ta.value = '';
  setStatus(`ж–°еўһе®ҢжҲҗ: ${success} жҲҗеҠҹ${fail ? `, ${fail} еӨұж•—` : ''}`);
  showToast(`ж–°еўһе®ҢжҲҗ: ${success} жҲҗеҠҹ${fail ? `, ${fail} еӨұж•—` : ''}`, fail ? 'error' : 'success');
}

/**
 * View lab data for a specific patient.
 * Switches to the labview tab and renders the full history table.
 */
function viewPatientLab(chartno) {
  const patients = loadPatients();
  const patient = patients.find(p => p.chartno === chartno);
  const labData = loadLabData()[chartno];

  // Update header вҖ” sex/age come from auto-filled demographics; revision 1
  // dropped the schedule/frequency text in favor of the patient-row selects.
  document.getElementById('labPatientName').textContent = patient
    ? `${patient.name || ''} (${chartno})`
    : chartno;
  const sex = patient ? (patient.sex || patient.genderCode || '') : '';
  const age = patient && patient.age != null ? patient.age + 'жӯІ' : '';
  const dd  = patient ? (patient.dialysisDays || '') : '';
  const sh  = patient ? (patient.shift || '') : '';
  document.getElementById('labPatientMeta').textContent =
    [sex, age, dd, sh].filter(Boolean).join(' пҪң ');

  const wrapper = document.getElementById('labTableWrapper');

  if (!labData) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">е°ҡз„ЎжӘўй©—иіҮж–ҷпјҢи«Ӣе…Ҳй»һйҒёгҖҢж–°еўһжё…е–®гҖҚжҲ–гҖҢе…ЁйғЁжӣҙж–°гҖҚжҢүйҲ•ж“·еҸ–иіҮж–ҷ</p>';
    switchTab('labview');
    return;
  }

  // Restrict the table to the active group's manifest so dialysis-specific
  // form items render in form order; pick up any displayLabel overrides.
  const manifestEntries = (GROUP.labManifest || []).map(resolveManifestEntry);
  const manifestIds     = new Set(manifestEntries.map(e => e.id));
  const labelOverride   = new Map(
    manifestEntries.filter(e => e.displayLabel).map(e => [e.id, e.displayLabel])
  );
  const computedIds = new Set(GROUP.computed || []);
  const allTests = [
    ...LAB_TESTS.filter(t => manifestIds.has(t.id)),
    ...COMPUTED_TESTS.filter(t => computedIds.has(t.id)),
  ];

  // Step 2: BUN_pre / BUN_post / URR are now resolved per cluster via the
  // dialysis group's resolveBunClustersFromStored() вҖ” same source of truth
  // as the CSV exporter. The stored BUN_pre / BUN_post arrays now contain
  // every BUN occurrence twice (one per testId), so per-date dateMap reads
  // are no longer meaningful for those rows; we override them below.
  const bunSlots = (typeof GROUP.resolveBunClustersFromStored === 'function')
    ? GROUP.resolveBunClustersFromStored(labData) : {};
  const bunPreByDate  = {};
  const bunPostByDate = {};
  const urrByDate     = {};
  for (const startDate in bunSlots) {
    const slot = bunSlots[startDate];
    if (slot.pre  && slot.preDate)  bunPreByDate[slot.preDate]   = slot.pre.value;
    if (slot.post && slot.postDate) bunPostByDate[slot.postDate] = slot.post.value;
    if (slot.urr != null)           urrByDate[startDate]         = slot.urr;
  }
  const overrideMap = {
    BUN_pre:  bunPreByDate,
    BUN_post: bunPostByDate,
    URR:      urrByDate,
  };

  const dateSet = new Set();
  for (const test of allTests) {
    const entries = labData[test.id];
    if (!entries) continue;
    for (const e of entries) {
      dateSet.add(e.date);
    }
  }
  // Make sure every cluster start / pre date / post date appears as a column,
  // even if no other test was drawn on that exact date.
  for (const startDate in bunSlots) {
    dateSet.add(startDate);
    const slot = bunSlots[startDate];
    if (slot.preDate)  dateSet.add(slot.preDate);
    if (slot.postDate) dateSet.add(slot.postDate);
  }

  const dates = Array.from(dateSet).sort((a, b) => b.localeCompare(a)); // newest first

  if (dates.length === 0) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">жңӘжүҫеҲ°д»»дҪ•жӘўй©—ж•ёж“ҡ</p>';
    switchTab('labview');
    return;
  }

  // Convert dates to Taiwan calendar for header display
  const dateHeaders = dates.map(d => {
    const parts = d.split('-');
    const twYear = +parts[0] - 1911;
    return `${twYear}/${parts[1]}/${parts[2]}`;
  });

  // Build table HTML
  let html = '<table class="lab-table">';

  // Header row with dates
  html += '<thead><tr>';
  html += '<th style="min-width:120px;position:sticky;left:0;z-index:3;background:#1a5276">жӘўй©—й …зӣ®</th>';
  html += '<th style="min-width:90px;position:sticky;left:120px;z-index:3;background:#1a5276">еҸғиҖғеҖј</th>';
  dates.forEach((d, i) => {
    const cls = i === 0 ? ' class="latest-col"' : '';
    html += `<th${cls}>${dateHeaders[i]}</th>`;
  });
  html += '</tr></thead>';

  html += '<tbody>';

  const hasAny = id => {
    if (overrideMap[id] && Object.keys(overrideMap[id]).length > 0) return true;
    return labData[id] && labData[id].length > 0;
  };

  // Group tests by category вҖ” restricted to allTests (already manifest-filtered)
  for (const cat of LAB_CATEGORIES) {
    const testsInCat = allTests.filter(t => t.cat === cat.id);
    if (testsInCat.length === 0) continue;
    // Check if category has any data (includes Step 2 BUN/URR overrides)
    const hasData = testsInCat.some(t => hasAny(t.id));
    if (!hasData) continue;

    // Category header row
    html += `<tr class="row-category"><td colspan="${dates.length + 2}">${cat.label}</td></tr>`;

    for (const test of testsInCat) {
      if (!hasAny(test.id)) continue;
      const entries = labData[test.id] || [];

      // Build a date -> value map. For BUN_pre / BUN_post / URR (Step 2),
      // the override map IS the source of truth (resolveBUN per cluster);
      // ignore raw stored entries which now contain duplicates.
      const dateMap = overrideMap[test.id]
        ? Object.assign({}, overrideMap[test.id])
        : (() => {
            const m = {};
            for (const e of entries) {
              if (!(e.date in m)) m[e.date] = e.value; // first wins (newest if pre-sorted)
            }
            return m;
          })();

      const lbl = labelOverride.get(test.id) || test.label;
      html += '<tr class="row-item">';
      html += `<td>${lbl}</td>`;
      html += `<td>${test.ref || ''} ${test.unit ? '(' + test.unit + ')' : ''}</td>`;

      dates.forEach((d, i) => {
        const val = dateMap[d];
        const cls = i === 0 ? ' latest-col' : '';

        if (val == null) {
          html += `<td class="${cls}"></td>`;
          return;
        }

        // Determine color class
        let valCls = '';
        if (test.qualitative) {
          // Qualitative: Reactive/positive = red, Non-Reactive/negative = green
          const lower = String(val).toLowerCase();
          if (lower.includes('reactive') && !lower.includes('non')) {
            valCls = 'val-q-pos';
          } else if (lower.includes('non-reactive') || lower.includes('negative') || lower.includes('nonreactive')) {
            valCls = 'val-q-neg';
          }
        } else {
          const numVal = typeof val === 'number' ? val : parseFloat(val);
          if (!isNaN(numVal)) {
            // Gender-aware threshold: pick loM/hiM or loF/hiF when the
            // catalog entry provides them and patient sex is known
            // ('M'/'F' from genderCode). Falls back to lo/hi (wide envelope)
            // for unknown sex or non-gendered tests.
            const sex = patient && (patient.sex || patient.genderCode);
            let hi = test.hi, lo = test.lo;
            if (sex === 'M' && (test.hiM != null || test.loM != null)) {
              if (test.hiM != null) hi = test.hiM;
              if (test.loM != null) lo = test.loM;
            } else if (sex === 'F' && (test.hiF != null || test.loF != null)) {
              if (test.hiF != null) hi = test.hiF;
              if (test.loF != null) lo = test.loF;
            }
            if (hi != null && numVal > hi) valCls = 'val-hi';
            else if (lo != null && numVal < lo) valCls = 'val-lo';
          }
        }

        html += `<td class="${valCls}${cls}">${val}</td>`;
      });

      html += '</tr>';
    }
  }

  html += '</tbody></table>';
  wrapper.innerHTML = html;
  switchTab('labview');
}


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// EXPORT вҖ” KiDiTi жӘўй©—иЁҳйҢ„ (58-field positional CSV)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// KiDiTi е№іеҸ°иҰҸж јпјҡ
//   - UTF-8 with BOM, comma-delimited, NO header row.
//   - 58 fields by position; missing values MUST be empty (not 0 вҖ” 0 жңғиў«з®—йҖІ
//     зөұиЁҲ). Numeric fields use toFixed(N) per `N x.y` spec; string fields are
//     emitted as-is (quoted only if they contain a comma or quote).
//   - ж—Ҙжңҹпјҡж°‘еңӢе№ҙ 7 зўј RRRMMDDпјҲ114вҶ’2025пјүгҖӮ
//   - HBsAg / Anti-HCV: ReactiveвҶ’YгҖҒNon-ReactiveвҶ’NгҖҒзјәеҖјвҶ’OпјҲжңӘеҒҡпјүгҖӮ
// One row per (patient Г— monthly check). Reuses the same monthly draw detection
// as еҢҜеҮәcsv (з”ҹж•ҲжҷӮй–“еҸўйӣҶ + жңҲеҲқе„Әе…Ҳ) so both exports stay date-aligned.

function _kdtToMinguoDate(isoDate) {
  if (!isoDate) return '';
  const m = String(isoDate).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  const y = (parseInt(m[1], 10) - 1911);
  return `${y}${m[2]}${m[3]}`;
}

function _kdtFmtNum(value, decimals) {
  if (value == null || value === '') return '';
  const n = parseFloat(value);
  if (!isFinite(n)) return '';   // covers '<2' / 'N/A' / etc. вҖ” KiDiTi wants blank
  return n.toFixed(decimals != null ? decimals : 2);
}

function _kdtMapHepYNO(value) {
  if (value == null || value === '') return 'O';
  const s = String(value).trim().toLowerCase();
  if (s === 'reactive' || s === 'positive' || s === '+' || s === 'pos') return 'Y';
  if (s === 'non-reactive' || s === 'nonreactive' || s === 'negative' || s === '-' || s === 'neg') return 'N';
  return 'O';
}

function _kdtCsvCell(v) {
  if (v == null) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

// One value per (testId, draw): the lab entry stored at the draw cluster.
function _kdtVal(draw, id) {
  const e = draw && draw.labs && draw.labs[id];
  return e && e.value != null ? e.value : '';
}

/**
 * Export every tracked patient Г— monthly draw as a KiDiTi жӘўй©—иЁҳйҢ„ CSV.
 * Field order and decimals follow TASK_BRIEF_phase2_dialysis_kiditi В§3.5.
 */
function exportKiDiTiCSV() {
  let patients = loadPatients();
  if (!patients.length) { showToast('е°ҡз„Ўз—…жӮЈеҸҜеҢҜеҮә', 'error'); return; }

  // Phase 1.5: respect ticked subset; null = export everyone.
  const selected = getSelectedChartNos();
  if (selected) {
    const wanted = new Set(selected);
    patients = patients.filter(p => wanted.has(p.chartno || p.chartNo));
    if (!patients.length) {
      showToast('еӢҫйҒёзҡ„з—…жӮЈйғҪдёҚеңЁжё…е–®дёӯ', 'error'); return;
    }
  }

  const allLabData = loadLabData();
  const rows = [];
  for (const p of patients) {
    const cn = p.chartno || p.chartNo || '';
    if (!cn) continue;
    const labData = allLabData[cn];
    if (!labData) continue;
    const draws   = DIALYSIS_GROUP.detectMonthlyDrawsFromStored(labData);
    const byMonth = DIALYSIS_GROUP.pickEarliestPerMonth(draws);
    const months  = Object.keys(byMonth).sort();
    if (!months.length) continue;

    const idno    = (p.idno || p.idNo || '').toString().trim();
    const chartno = String(cn).padStart(10, '0');

    for (const yyyymm of months) {
      const draw = byMonth[yyyymm];

      // Inline computed: UIBC = TIBC вҲ’ Fe, CaxP = Ca Г— P (per draw, by date).
      const tibc = parseFloat(_kdtVal(draw, 'TIBC'));
      const fe   = parseFloat(_kdtVal(draw, 'Fe'));
      const uibc = (isFinite(tibc) && isFinite(fe)) ? (tibc - fe) : '';
      const ca   = parseFloat(_kdtVal(draw, 'Ca'));
      const ph   = parseFloat(_kdtVal(draw, 'P'));
      const caxp = (isFinite(ca) && isFinite(ph)) ? (ca * ph) : '';

      const row = [
        idno,                                                  // 01 иә«д»Ҫиӯүиҷҹ (S 10)
        chartno,                                               // 02 з—…жӯ·иҷҹ (S 10)
        _kdtToMinguoDate(draw.drawDate),                       // 03 ж—Ҙжңҹ (S 7) RRRMMDD
        _kdtFmtNum(_kdtVal(draw, 'WBC')),                      // 04 W.B.C.
        _kdtFmtNum(_kdtVal(draw, 'RBC')),                      // 05 R.B.C.
        _kdtFmtNum(_kdtVal(draw, 'Hb')),                       // 06 Hb
        _kdtFmtNum(_kdtVal(draw, 'HCT')),                      // 07 Hct
        _kdtFmtNum(_kdtVal(draw, 'MCV')),                      // 08 MCV
        _kdtFmtNum(_kdtVal(draw, 'Platelet')),                 // 09 Platelet
        _kdtFmtNum(_kdtVal(draw, 'TP')),                       // 10 Total protein
        _kdtFmtNum(_kdtVal(draw, 'Albumin')),                  // 11 Albumin
        _kdtFmtNum(_kdtVal(draw, 'GOT')),                      // 12 AST/GOT
        _kdtFmtNum(_kdtVal(draw, 'GPT')),                      // 13 ALT/GPT
        _kdtFmtNum(_kdtVal(draw, 'ALP')),                      // 14 Alkaline-P
        _kdtFmtNum(_kdtVal(draw, 'TBIL')),                     // 15 Total Bilirubin
        _kdtFmtNum(_kdtVal(draw, 'CHOL')),                     // 16 Cholesterol
        _kdtFmtNum(_kdtVal(draw, 'TG')),                       // 17 Triglyceride
        _kdtFmtNum(_kdtVal(draw, 'GluAC')),                    // 18 Glucose AC
        '', '', '', '', '',                                    // 19вҖ“23 йҖҸжһҗеүҚ/еҫҢ BP / й«”йҮҚ / йҖҸжһҗжҷӮй–“ (з©ә)
        _kdtFmtNum(_kdtVal(draw, 'BUN_pre')),                  // 24 йҖҸжһҗеүҚBUN
        _kdtFmtNum(_kdtVal(draw, 'BUN_post')),                 // 25 йҖҸжһҗеҫҢBUN
        '', '',                                                // 26вҖ“27 дёӢж¬ЎйҖҸжһҗеүҚBUN / е…©ж¬ЎйҖҸжһҗй–“йҡ” (з©ә)
        _kdtFmtNum(_kdtVal(draw, 'CREAT')),                    // 28 Creatinine
        _kdtFmtNum(_kdtVal(draw, 'UA')),                       // 29 Uric acid
        _kdtFmtNum(_kdtVal(draw, 'Na')),                       // 30 Na
        _kdtFmtNum(_kdtVal(draw, 'K')),                        // 31 K
        _kdtFmtNum(_kdtVal(draw, 'Cl')),                       // 32 Cl
        _kdtFmtNum(_kdtVal(draw, 'Ca')),                       // 33 е…ЁйҲЈ Ca
        _kdtFmtNum(_kdtVal(draw, 'FreeCa')),                   // 34 йӣўеӯҗйҲЈ
        _kdtFmtNum(_kdtVal(draw, 'P')),                        // 35 P
        _kdtFmtNum(_kdtVal(draw, 'Fe')),                       // 36 Fe
        _kdtFmtNum(uibc),                                      // 37 UIBC = TIBC вҲ’ Fe
        _kdtFmtNum(_kdtVal(draw, 'TIBC')),                     // 38 TIBC
        _kdtFmtNum(_kdtVal(draw, 'Ferritin')),                 // 39 Ferritin
        _kdtFmtNum(_kdtVal(draw, 'Aluminum')),                 // 40 Al
        _kdtFmtNum(_kdtVal(draw, 'Mg')),                       // 41 Mg
        _kdtFmtNum(_kdtVal(draw, 'iPTH')),                     // 42 intact-PTH
        '',                                                    // 43 CTR (N 7.3, з©ә)
        _kdtMapHepYNO(_kdtVal(draw, 'HBsAg')),                 // 44 HBsAg вҶ’ Y/N/O
        _kdtMapHepYNO(_kdtVal(draw, 'AntiHCV')),               // 45 Anti-HCV вҶ’ Y/N/O
        '',                                                    // 46 EKG (S 40, з©ә)
        '',                                                    // 47 иә«й«ҳ (N 7.3, з©ә)
        '', '', '', '', '', '',                                // 48вҖ“53 иҮӘиЁӮдёҖ~е…ӯ (N 7.2, з©ә)
        '', '',                                                // 54вҖ“55 иҮӘиЁӮдёғгҖҒе…« (S 30, з©ә)
        _kdtFmtNum(caxp),                                      // 56 йҲЈзЈ·д№ҳз©Қ = Ca Г— P
        '',                                                    // 57 HCV-RNA (IU/ML) (з©ә вҖ” ernode з„Ў)
        '',                                                    // 58 HCV-RNA е®ҡжҖ§ (з©ә вҖ” ernode з„Ў)
      ];
      rows.push(row.map(_kdtCsvCell).join(','));
    }
  }

  if (!rows.length) {
    showToast('жІ’жңүеҸҜеҢҜеҮәзҡ„жңҲжӘўиіҮж–ҷпјҲи«Ӣе…ҲгҖҢе…ЁйғЁжӣҙж–°гҖҚпјү', 'error');
    return;
  }

  // CRLF line endings вҖ” Windows-friendly and what the KiDiTi importer expects.
  const csv = rows.join('\r\n') + '\r\n';
  const blob = new Blob(['п»ҝ' + csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, `KiDiTi_жӘўй©—иЁҳйҢ„_${todayStr()}.csv`);
  const scope = selected ? `${patients.length} дҪҚеӢҫйҒё` : `${patients.length} дҪҚе…ЁйғЁ`;
  showToast(`KiDiTi CSV е·ІеҢҜеҮәпјҲ${scope}пјҢ${rows.length} еҲ—пјү`, 'success');
}


// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// EXPORT вҖ” combined long-format CSV
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

/**
 * Export all tracked patients Г— YYYYMM as a single long-format CSV.
 * Layout (header, rows) lives in GROUP.exporter.formatAll (groups/dialysis.js).
 */
function exportCombinedCSV() {
  if (!GROUP.exporter || typeof GROUP.exporter.formatAll !== 'function') {
    showToast('жӯӨз–ҫз—…жЁЎзө„е°ҡжңӘжҸҗдҫӣ CSV еҢҜеҮә', 'error'); return;
  }
  let patients = loadPatients();
  if (patients.length === 0) { showToast('е°ҡз„Ўз—…жӮЈеҸҜеҢҜеҮә', 'error'); return; }

  // Phase 1.5: respect ticked subset; null = export everyone.
  const selected = getSelectedChartNos();
  if (selected) {
    const wanted = new Set(selected);
    patients = patients.filter(p => wanted.has(p.chartno || p.chartNo));
    if (!patients.length) {
      showToast('еӢҫйҒёзҡ„з—…жӮЈйғҪдёҚеңЁжё…е–®дёӯ', 'error'); return;
    }
  }

  const labData  = loadLabData();
  const csv      = GROUP.exporter.formatAll(patients, labData);
  // BOM so Excel opens UTF-8 without garbling Chinese display labels.
  const blob     = new Blob(['п»ҝ' + csv], { type: 'text/csv;charset=utf-8' });
  const filename = GROUP.exporter.filename
    ? GROUP.exporter.filename()
    : `dialysis_export_${todayStr()}.csv`;
  downloadBlob(blob, filename);
  const scope = selected ? `${patients.length} дҪҚеӢҫйҒё` : `${patients.length} дҪҚе…ЁйғЁ`;
  showToast(`CSV е·ІеҢҜеҮәпјҲ${scope}пјү`, 'success');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function loadSettingsUI() {
  const s = loadSettings();
  document.getElementById('settingBaseUrl').value = s.baseUrl || '';
  document.getElementById('settingOpsid').value = s.opsid || '';
}

function saveSettings() {
  const baseUrl = document.getElementById('settingBaseUrl').value.trim().replace(/\/+$/, '');
  const opsid = document.getElementById('settingOpsid').value.trim();
  saveSettingsData({ baseUrl: baseUrl || 'http://ernode.vghb12.vhtt.gov.tw:8000', opsid });
  showToast('иЁӯе®ҡе·Іе„Іеӯҳ', 'success');
}
