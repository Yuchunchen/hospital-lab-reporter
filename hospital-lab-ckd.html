// ─── core/compute.js ──────────────────────────────────────────────────
// ─── compute.js ───────────────────────────────────────────────
// Registry-driven derived-value dispatcher.
//
// 2026-05-20: rewritten from the hardcoded URR / Ca×P if-else into a generic
// dispatcher over the COMPUTATIONS registry inlined from patterns/computed.js.
// The reporter still asks COMPUTED_TESTS (= REPORTER_COMPUTED) for the rows
// to render; each id is looked up in COMPUTATIONS for the actual formula.
//
// Why: CKD staging (eGFR, GFRStage, UACRStage, UPCRStage, KDIGORisk,
// TaiwanCKD, EarlyCKD) shares the same per-date pairing shape as URR / CaxP,
// and the formulas already live in patterns/computed.js. Hardcoding 9
// branches here would copy logic that the patterns repo owns.
//
// Per-date pairing model:
//   - `needs` whose id starts with `__patient.` are patient-static
//     (age, gender). They're pulled from the patient argument once.
//   - Other needs are date-series in `results` (lab values or previously
//     computed staging strings, e.g. EarlyCKD needs ['eGFR', 'TaiwanCKD']).
//   - The first lab need is the ANCHOR: its dates drive the output dates.
//     Other needs fill in at matching dates; missing → null. Each
//     computation's compute() decides whether nulls are acceptable
//     (TaiwanCKD tolerates missing UACR/UPCR; KDIGORisk does not).
//
// Dialysis URR is still re-derived per cluster by groups/dialysis.js
// (resolveBunClustersFromStored). Lab-view overrides results['URR'] with
// the cluster-based map, so the dispatcher's per-date URR is harmless.

/**
 * Compute derived values from extracted lab data.
 * Iterates COMPUTED_TESTS (render manifest) and dispatches each id to the
 * matching entry in COMPUTATIONS (formula registry).
 *
 * @param {object} results - extracted lab values, mutated in place
 * @param {object} [patient] - {age, gender} for patient-static needs
 */
function computeDerivedValues(results, patient) {
  const registry = (typeof COMPUTATIONS !== 'undefined' && Array.isArray(COMPUTATIONS))
    ? new Map(COMPUTATIONS.map(c => [c.id, c]))
    : new Map();

  for (const ct of COMPUTED_TESTS) {
    results[ct.id] = [];
    const comp = registry.get(ct.id);
    if (!comp || typeof comp.compute !== 'function') continue;
    results[ct.id] = _computeSeries(results, comp, patient);
  }
  return results;
}

function _computeSeries(results, comp, patient) {
  const needs = Array.isArray(comp.needs) ? comp.needs : [];
  const labNeeds = needs.filter(n => !String(n).startsWith('__patient.'));
  const ptNeeds  = needs.filter(n =>  String(n).startsWith('__patient.'));

  // Patient-static args (age, gender). Missing field = skip the whole series.
  const ptArgs = {};
  for (const n of ptNeeds) {
    const field = n.slice('__patient.'.length);
    const v = patient ? patient[field] : null;
    if (v == null || v === '') return [];
    ptArgs[field] = v;
  }

  // No lab inputs (e.g. theoretical patient-only formula) — nothing to pair.
  if (labNeeds.length === 0) return [];

  // Anchor by the first lab need; matching dates fetch the rest.
  // The anchor entry's effectiveTime / signOffTime propagates to the
  // computed entry so groups/early-ckd.js _flattenEntriesByCluster()
  // clusters staging values in the same draw bucket as the source labs.
  const anchorNeed = labNeeds[0];
  const seriesByDate = Object.create(null);
  for (const e of (results[anchorNeed] || [])) {
    if (!e || !e.date || e.value == null) continue;
    if (!seriesByDate[e.date]) {
      seriesByDate[e.date] = {
        __dateObj:       e.dateObj || null,
        __effectiveTime: e.effectiveTime || null,
        __signOffTime:   e.signOffTime || null,
      };
    }
    if (!(anchorNeed in seriesByDate[e.date])) {
      seriesByDate[e.date][anchorNeed] = e.value;
    }
  }
  for (const needId of labNeeds.slice(1)) {
    for (const e of (results[needId] || [])) {
      if (!e || !e.date || e.value == null) continue;
      const slot = seriesByDate[e.date];
      if (!slot) continue;                                // anchor absent
      if (!(needId in slot)) slot[needId] = e.value;      // first wins
    }
  }

  const out = [];
  for (const date of Object.keys(seriesByDate).sort()) {
    const slot = seriesByDate[date];
    const args = Object.assign({}, ptArgs);
    for (const needId of labNeeds) {
      args[needId] = (needId in slot) ? slot[needId] : null;
    }
    let v;
    try { v = comp.compute(args); }
    catch (err) {
      console.warn('[compute] ' + comp.id + ' on ' + date + ' failed:', err);
      continue;
    }
    if (v == null) continue;
    if (typeof v === 'number' && !isFinite(v)) continue;
    out.push({
      date,
      value: v,
      dateObj:       slot.__dateObj || new Date(date),
      effectiveTime: slot.__effectiveTime || null,
      signOffTime:   slot.__signOffTime || null,
    });
  }
  out.sort((a, b) => b.date.localeCompare(a.date));      // newest first
  return out;
}

// Patient list table: columns, sort/filter, render, selection (Phase 1.5)
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every

// ═══════════════════════════════════════════════════════════════════════════════
// UI - PATIENT LIST  (hotfix v2: sortable + filterable, per-row actions)

// ─── Patient selection (Phase 1.5) ───────────────────────────────────────────
// In-memory Set of chartnos the user has ticked. Intentionally NOT persisted
// to localStorage — refresh = clear is the documented expected behavior.
// Export functions consult getSelectedChartNos() to decide scope; null means
// "all visible patients" (i.e. nothing ticked → export everyone).

const selectedPatients = new Set();

function toggleSelectAll(checked) {
  // Only flip what's currently visible (after sort/filter), per brief §1.3.
  document.querySelectorAll('.patient-select').forEach(cb => {
    cb.checked = checked;
    if (checked) selectedPatients.add(cb.value);
    else         selectedPatients.delete(cb.value);
  });
  // Also repaint the row backgrounds without a full re-render.
  document.querySelectorAll('#patientBody tr').forEach(tr => {
    const cb = tr.querySelector('.patient-select');
    if (!cb) return;
    if (cb.checked) { tr.classList.add('row-selected'); tr.style.background = '#eaf4fd'; }
    else            { tr.classList.remove('row-selected'); tr.style.background = ''; }
  });
  updateSelectUI();
}

function togglePatientSelect(chartno, checked) {
  if (checked) selectedPatients.add(chartno);
  else         selectedPatients.delete(chartno);
  // Lightweight row repaint without a full re-render.
  const cb = document.querySelector(`.patient-select[value="${CSS.escape(chartno)}"]`);
  const tr = cb ? cb.closest('tr') : null;
  if (tr) {
    if (checked) { tr.classList.add('row-selected'); tr.style.background = '#eaf4fd'; }
    else         { tr.classList.remove('row-selected'); tr.style.background = ''; }
  }
  updateSelectState();
}

// Sync the header's master checkbox (checked / indeterminate / clear) and
// refresh the export-button labels. Called after every patient render and
// after every individual toggle.
function updateSelectState() {
  const all     = document.querySelectorAll('.patient-select');
  const checked = document.querySelectorAll('.patient-select:checked');
  const master  = document.getElementById('selectAll');
  if (master) {
    master.checked       = all.length > 0 && checked.length === all.length;
    master.indeterminate = checked.length > 0 && checked.length < all.length;
  }
  updateSelectUI();
}

function updateSelectUI() {
  // Append `(N)` to export button labels when the user has narrowed scope.
  // Empty selection → revert to plain label (= 全部).
  const n = selectedPatients.size;
  const setLabel = (id, base) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.textContent = n > 0 ? `${base} (${n})` : base;
  };
  setLabel('btnExportKiDiTi', '匯出KiDiTi資料');
  setLabel('btnExportCSV',    '匯出csv');
}

// null = export all tracked patients; array = only those.
function getSelectedChartNos() {
  return selectedPatients.size > 0 ? Array.from(selectedPatients) : null;
}


// Column config drives header rendering, sort, and filter widgets.
// Built once per render so dynamic patientFields (dialysisDays/shift) stay
// in sync with whatever the active group declares.
function buildPatientColumns() {
  const cols = [
    // Phase 1.5: leftmost selection checkbox column. Width-fixed,
    // no sort, no filter — renderPatientHead/Body special-case `_select`.
    { key: '_select',     label: '',         filter: null, sort: null },
    { key: 'chartno',     label: '病歷號',   filter: 'text', sort: 'localeZh' },
    { key: 'name',        label: '姓名',     filter: 'text', sort: 'localeZh' },
    { key: 'sex',         label: '性別',     filter: 'enum', enumOptions: ['M', 'F'], sort: 'string' },
    { key: 'age',         label: '年齡',     filter: 'text', sort: 'numeric' },
  ];
  for (const f of (GROUP.patientFields || [])) {
    cols.push({
      key: f.key, label: f.label,
      filter: 'enum',
      enumOptions: (f.options || []).slice(),
      sort: 'enumUnsetLast',
    });
  }
  cols.push({ key: '_lastUpdate', label: '最後更新', filter: null, sort: 'numeric' });
  cols.push({ key: '_actions',    label: '動作',     filter: null, sort: null });
  return cols;
}

function loadSortState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.patientSort)) || null; }
  catch { return null; }
}
function saveSortState(s) {
  if (s) localStorage.setItem(STORAGE_KEYS.patientSort, JSON.stringify(s));
  else   localStorage.removeItem(STORAGE_KEYS.patientSort);
}
function loadFilterState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.patientFilters)) || {}; }
  catch { return {}; }
}
function saveFilterState(f) {
  localStorage.setItem(STORAGE_KEYS.patientFilters, JSON.stringify(f || {}));
}

// Read the value used for sort/filter (handles synthetic _lastUpdate +
// sex fallback for legacy genderCode-only records).
function patientCellValue(p, key, labData) {
  if (key === '_lastUpdate') return labData[p.chartno]?._lastUpdate || 0;
  if (key === 'sex')         return p.sex || p.genderCode || '';
  return p[key] != null ? p[key] : '';
}

function compareForColumn(va, vb, sortType, dir) {
  const sign = dir === 'desc' ? -1 : 1;
  if (sortType === 'numeric') {
    const na = Number(va), nb = Number(vb);
    const aNan = !Number.isFinite(na), bNan = !Number.isFinite(nb);
    if (aNan && bNan) return 0;
    if (aNan) return 1;          // missing values always last
    if (bNan) return -1;
    return (na - nb) * sign;
  }
  if (sortType === 'enumUnsetLast') {
    const aUnset = !va || va === '未設定';
    const bUnset = !vb || vb === '未設定';
    if (aUnset && !bUnset) return 1;   // 未設定 always at the bottom
    if (!aUnset && bUnset) return -1;
    return String(va).localeCompare(String(vb), 'zh-TW') * sign;
  }
  if (sortType === 'localeZh') {
    return String(va || '').localeCompare(String(vb || ''), 'zh-TW') * sign;
  }
  return String(va || '').localeCompare(String(vb || '')) * sign;
}

function applyPatientFilters(list, filters, labData, cols) {
  const colByKey = new Map(cols.map(c => [c.key, c]));
  const active = Object.entries(filters).filter(([, v]) => v != null && String(v).trim() !== '' && v !== '(全部)');
  if (active.length === 0) return list;
  return list.filter(p => active.every(([key, val]) => {
    const col = colByKey.get(key);
    if (!col) return true;
    const cell = patientCellValue(p, key, labData);
    if (col.filter === 'enum') return String(cell) === String(val);
    return String(cell).toLowerCase().includes(String(val).toLowerCase());
  }));
}

function applyPatientSort(list, sort, labData) {
  if (!sort || !sort.column) return list;
  const cols = buildPatientColumns();
  const col = cols.find(c => c.key === sort.column);
  if (!col || !col.sort) return list;
  return [...list].sort((a, b) => compareForColumn(
    patientCellValue(a, sort.column, labData),
    patientCellValue(b, sort.column, labData),
    col.sort, sort.dir
  ));
}

function renderPatientHead(cols, sort, filters) {
  const head = document.getElementById('patientHead');
  if (!head) return;
  const sortInd = (key) => {
    if (!sort || sort.column !== key) return '';
    return `<span class="sort-ind">${sort.dir === 'asc' ? '▲' : '▼'}</span>`;
  };
  const headerCells = cols.map(c => {
    if (c.key === '_select') {
      return `<th style="width:36px;text-align:center"><input type="checkbox" id="selectAll" title="全選/全不選 (僅作用於目前可見列)" onchange="toggleSelectAll(this.checked)"></th>`;
    }
    const sortable = !!c.sort;
    const cls = sortable ? 'sortable' : '';
    const onClick = sortable ? ` onclick="cyclePatientSort('${c.key}')"` : '';
    return `<th class="${cls}"${onClick}>${escHtml(c.label)}${sortInd(c.key)}</th>`;
  }).join('');
  const filterCells = cols.map(c => {
    if (!c.filter) return '<th></th>';
    const cur = filters[c.key] != null ? filters[c.key] : '';
    if (c.filter === 'enum') {
      const opts = ['(全部)', ...(c.enumOptions || [])].map(o => {
        const val = o === '(全部)' ? '' : o;
        return `<option value="${escAttr(val)}"${String(cur) === String(val) ? ' selected' : ''}>${escHtml(o)}</option>`;
      }).join('');
      return `<th><select data-col="${escAttr(c.key)}" onchange="setPatientFilter('${c.key}', this.value)">${opts}</select></th>`;
    }
    return `<th><input type="text" data-col="${escAttr(c.key)}" value="${escAttr(cur)}" placeholder="篩選..." oninput="setPatientFilter('${c.key}', this.value)"></th>`;
  }).join('');
  head.innerHTML = `<tr>${headerCells}</tr><tr class="filter-row">${filterCells}</tr>`;
}

function renderPatientBody(visible, cols, labData, totalCount) {
  const tbody = document.getElementById('patientBody');
  if (!tbody) return;
  const colspan = cols.length;
  if (totalCount === 0) {
    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted" style="padding:24px">尚未追蹤任何病患。請在上方輸入病歷號後按「新增清單」。</td></tr>`;
    return;
  }
  if (visible.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center text-muted" style="padding:24px">沒有符合目前篩選條件的病患。</td></tr>`;
    return;
  }
  const fields = (GROUP.patientFields || []);
  const fieldKeys = new Set(fields.map(f => f.key));

  tbody.innerHTML = visible.map(p => {
    const isSelected = selectedPatients.has(p.chartno);
    const rowAttrs = isSelected ? ' class="row-selected" style="background:#eaf4fd"' : '';
    const cells = cols.map(c => {
      if (c.key === '_select') {
        return `<td style="text-align:center"><input type="checkbox" class="patient-select" value="${escAttr(p.chartno)}"${isSelected ? ' checked' : ''} onchange="togglePatientSelect('${p.chartno}', this.checked)"></td>`;
      }
      if (c.key === 'chartno') {
        return `<td><a href="#" onclick="viewPatientLab('${p.chartno}'); return false;" style="color:#2980b9;font-weight:600">${escHtml(p.chartno)}</a></td>`;
      }
      if (c.key === 'name') return `<td>${escHtml(p.name || '')}</td>`;
      if (c.key === 'sex')  return `<td>${escHtml(p.sex || p.genderCode || '')}</td>`;
      if (c.key === 'age')  return `<td>${escHtml(p.age != null ? String(p.age) : '')}</td>`;
      if (fieldKeys.has(c.key)) {
        const f = fields.find(x => x.key === c.key);
        const cur = p[c.key] != null && p[c.key] !== '' ? p[c.key] : (f.default || '');
        const opts = (f.options || []).map(o =>
          `<option value="${escAttr(o)}"${o === cur ? ' selected' : ''}>${escHtml(o)}</option>`
        ).join('');
        return `<td><select onchange="updatePatientField('${p.chartno}','${f.key}',this.value)" style="padding:4px 6px;font-size:12px">${opts}</select></td>`;
      }
      if (c.key === '_lastUpdate') {
        const ts = labData[p.chartno]?._lastUpdate;
        const text = ts ? new Date(ts).toLocaleString('zh-TW') : '<span class="text-muted">未更新</span>';
        return `<td style="font-size:11px">${text}</td>`;
      }
      if (c.key === '_actions') {
        return `<td class="actions"><span class="row-actions">
          <button class="btn btn-primary" title="重新抓取此病患資料" data-row-refresh="${escAttr(p.chartno)}" onclick="refreshOnePatient('${p.chartno}', this)">↻</button>
          <button class="btn btn-danger" title="移除此病患" onclick="confirmRemovePatient('${p.chartno}')">✕</button>
        </span></td>`;
      }
      return '<td></td>';
    }).join('');
    return `<tr${rowAttrs}>${cells}</tr>`;
  }).join('');
}

async function renderPatientList() {
  const cols     = buildPatientColumns();
  const patients = loadPatients();
  const labData  = await loadLabData();
  const sort     = loadSortState();
  const filters  = loadFilterState();
  const filtered = applyPatientFilters(patients, filters, labData, cols);
  const sorted   = applyPatientSort(filtered, sort, labData);
  renderPatientHead(cols, sort, filters);
  renderPatientBody(sorted, cols, labData, patients.length);
  // Master checkbox + export-button labels reflect the surviving Set state.
  updateSelectState();
}

// Header click handler — cycles unsorted → asc → desc → unsorted.
async function cyclePatientSort(column) {
  const cur = loadSortState();
  let next;
  if (!cur || cur.column !== column)      next = { column, dir: 'asc' };
  else if (cur.dir === 'asc')             next = { column, dir: 'desc' };
  else                                    next = null;
  saveSortState(next);
  await renderPatientList();
}

// Filter input handler — text inputs call this on every keystroke. With
// ≤ ~50 patients the re-render cost is negligible, so no debounce needed.
// Re-rendering the whole table would steal focus from the input being
// typed into; we restore focus + caret position after the rebuild.
async function setPatientFilter(column, value) {
  const filters = loadFilterState();
  if (value == null || String(value).trim() === '') delete filters[column];
  else                                              filters[column] = value;
  saveFilterState(filters);

  const active  = document.activeElement;
  const wasInput = active && active.tagName === 'INPUT' && active.dataset.col === column;
  const caret   = wasInput ? active.selectionStart : null;

  await renderPatientList();

  if (wasInput) {
    const next = document.querySelector(`#patientHead input[data-col="${CSS.escape(column)}"]`);
    if (next) {
      next.focus();
      if (caret != null) try { next.setSelectionRange(caret, caret); } catch (_) {}
    }
  }
}

/**
 * Per-row refresh handler (hotfix v2). Re-fetches labs + demographics for
 * a single chartNo using the same pipeline as the top-level 更新資料.
 * The clicked button is disabled with a spinner glyph during the fetch.
 */
async function refreshOnePatient(chartno, btn) {
  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }
  const originalText = btn ? btn.innerHTML : null;
  if (btn) { btn.disabled = true; btn.innerHTML = '⟳'; }
  setStatus(`更新 ${chartno} 中...`, true);
  try {
    await fetchAndStore(chartno);
    await renderPatientList();
    setStatus(`已更新: ${chartno}`);
    showToast(`已更新 ${chartno}`, 'success');
  } catch (err) {
    console.warn(`Failed to refresh ${chartno}:`, err);
    if (btn) { btn.disabled = false; btn.innerHTML = originalText; }
    setStatus(`更新失敗: ${chartno}`);
    showToast(`更新 ${chartno} 失敗`, 'error');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}
function escAttr(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** Persist a user-editable field on a patient (dialysisDays / shift selects). */
function updatePatientField(chartno, key, value) {
  const patients = loadPatients();
  const idx = patients.findIndex(p => p.chartno === chartno);
  if (idx < 0) return;
  patients[idx][key] = value;
  savePatients(patients);
}

// ═══════════════════════════════════════════════════════════════════════════════
// UI - REMOVE PATIENT FROM TRACKED LIST
// ═══════════════════════════════════════════════════════════════════════════════

function confirmRemovePatient(chartno) {
  const p = loadPatients().find(x => x.chartno === chartno);
  if (!p) return;
  document.getElementById('confirmMsg').textContent =
    `確定要從追蹤清單移除 ${p.name || ''} (${chartno}) 嗎？此病患的檢驗資料也會一併刪除。`;
  document.getElementById('confirmOkBtn').onclick = async () => {
    // savePatients 必須先寫回 localStorage，labDataDelete 才能在 cross-group
    // 掃描時看到此 chartno 已從本 group 移除。
    const patients = loadPatients().filter(x => x.chartno !== chartno);
    savePatients(patients);
    try { await labDataDelete(chartno); } catch (e) { console.warn('[labData] delete failed:', e); }
    try { await ordersCacheDelete(chartno); } catch (e) { console.warn('[ordersCache] delete failed:', e); }
    selectedPatients.delete(chartno);
    closeConfirm();
    await renderPatientList();
    showToast('已移除', 'info');
  };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirmModal').classList.add('hidden');
}


// ─── core/ui-patient-crud.js ──────────────────────────────────────────
// ─── ui-patient-crud.js ───────────────────────────────────────────────
// Patient CRUD pipeline: add / refresh-all / refresh-one + setStatus + parser
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// DATA FETCHING — ID-LIST INPUT + BATCH UPDATE
// ═══════════════════════════════════════════════════════════════════════════════

function setStatus(msg, loading = false) {
  const bar = document.getElementById('statusBar');
  bar.innerHTML = (loading ? '<span class="spinner"></span>' : '') + escHtml(msg);
}

/**
 * Split a textarea blob into normalized chartNos.
 * Accepts newlines, commas, semicolons, pipes, or whitespace as separators.
 * Returns { chartnos: [...unique, normalized], errors: [...rejected raw tokens with reason] }.
 */
function parseChartNoList(text) {
  const result = { chartnos: [], errors: [] };
  if (!text) return result;
  const tokens = text.split(/[,;|\s]+/).map(s => s.trim()).filter(Boolean);
  const seen = new Set();
  for (const t of tokens) {
    try {
      const cn = formatChartNo(t);
      if (seen.has(cn)) continue;
      seen.add(cn);
      result.chartnos.push(cn);
    } catch (err) {
      result.errors.push(`${t}: ${err.message}`);
    }
  }
  return result;
}

/**
 * Fetch one chartNo end-to-end: hit the API, extract labs, persist to
 * storage, refresh demographics. Throws on network / parse error.
 *
 * Incremental path: if the raw-orders IndexedDB cache already has orders
 * for this chartno, we run fetchIncremental — typically 1 API call per
 * patient instead of 5–15. First fetch (or empty cache) falls back to
 * fetchAllOrders.
 */
async function fetchAndStore(chartno) {
  const cached = await ordersCacheGet(chartno);

  let orders, patientInfo;
  if (cached && Array.isArray(cached.orders) && cached.orders.length > 0) {
    // Clone cached orders so the in-place status overwrites in
    // fetchIncremental don't mutate the IndexedDB-derived array before
    // the final put writes the merged result.
    const baseline = cached.orders.map(o => ({ ...o }));
    const result = await fetchIncremental(chartno, baseline, (n, t) => {
      setStatus(`${chartno}: 增量更新 ${n} / ${t} 筆`, true);
    });
    orders = result.orders;
    patientInfo = result.patientInfo;
    console.log(`[incremental] ${chartno}: ${result.pagesChecked} page(s) checked, total ${orders.length}`);
  } else {
    const result = await fetchAllOrders(chartno, (n, t) => {
      setStatus(`${chartno}: 已擷取 ${n} / ${t} 筆`, true);
    });
    orders = result.orders;
    patientInfo = result.patientInfo;
  }

  // Sub-page enrichment: any manifest testId still missing → selectively
  // fetch the "請 Click「正式報告」" sub-pages within cutoff (cache-first).
  // LAB_TESTS = resolved REPORTER_MANIFEST, so adding a new sub-page-only
  // test now only requires a catalog/manifest change. enrichMissingValues
  // skips orders whose pattern already matches reportText, so previously
  // enriched cached orders aren't re-enriched.
  try {
    await enrichMissingValues(orders, chartno, LAB_TESTS, {
      onProgress: msg => setStatus(`${chartno}: ${msg}`, true),
    });
  } catch (e) {
    console.warn('[enrichMissingValues] failed:', e);
  }

  // Persist raw orders cache (post-enrichment so cached reportText already
  // includes any sub-page splices).
  try {
    await ordersCachePut(chartno, orders);
  } catch (e) {
    console.warn('[ordersCache] put failed:', e);
  }

  let labValues = extractLabValues(orders);
  // Patient-static needs for the compute dispatcher (eGFR-CKDEPI 2021 needs
  // age + gender). Pull from the fresh API response when available, else
  // fall back to the stored patient row. age is "current" age — historical
  // eGFRs use the same value (acceptable for early CKD where age drifts a
  // few years; birthDate-aware upgrade is a follow-up if ernode exposes it).
  const storedPatient = loadPatients().find(p => p.chartno === chartno);
  const computePatient = {
    age:    (patientInfo && patientInfo.age != null)        ? patientInfo.age
          : (storedPatient && storedPatient.age),
    gender: (patientInfo && patientInfo.genderCode)         ? patientInfo.genderCode
          : (storedPatient && (storedPatient.sex || storedPatient.genderCode)) || null,
  };
  labValues = computeDerivedValues(labValues, computePatient);
  // 2026-05-13: 直接 per-chartno 寫 IDB，不再 load 全部 patients 再整批寫。
  try {
    await labDataPut(chartno, { ...labValues, _lastUpdate: Date.now() });
  } catch (e) {
    console.warn(`[labData] put failed for ${chartno}:`, e);
  }

  // Demographics refresh on every fetch (revision 1: not user-editable).
  if (patientInfo) {
    const patients = loadPatients();
    const idx = patients.findIndex(p => p.chartno === chartno);
    if (idx >= 0) {
      if (patientInfo.name)       patients[idx].name = patientInfo.name;
      if (patientInfo.genderCode) patients[idx].sex  = patientInfo.genderCode;
      if (patientInfo.age)        patients[idx].age  = patientInfo.age;
      savePatients(patients);
    }
  }
}

/**
 * Handler for the 新增清單 button: parses the textarea, adds any new chartNos
 * to the tracked list (with default field values), then batch-fetches each.
 * On completion the textarea is cleared (per revision 1 hotfix).
 */
async function addAndUpdateFromInput() {
  const ta  = document.getElementById('chartnoInput');
  const raw = ta ? ta.value : '';
  const { chartnos, errors } = parseChartNoList(raw);

  if (errors.length) {
    const head = errors.slice(0, 3).join('； ');
    showToast(`${errors.length} 筆無效病歷號已忽略：${head}${errors.length > 3 ? '…' : ''}`, 'error', 5000);
  }
  if (chartnos.length === 0) {
    if (!errors.length) showToast('請輸入至少一筆病歷號', 'error');
    return;
  }

  const settings = loadSettings();
  if (!settings.opsid) {
    showToast('請先到「設定」填寫操作人員代號 (OPSID)', 'error');
    switchTab('settings');
    return;
  }

  // Add any new chartNos to the tracked list with default field values.
  const patients = loadPatients();
  const fields = (GROUP.patientFields || []);
  let added = 0;
  for (const cn of chartnos) {
    if (!patients.find(p => p.chartno === cn)) {
      const fresh = { chartno: cn };
      for (const f of fields) fresh[f.key] = f.default || '';
      patients.push(fresh);
      added++;
    }
  }
  if (added > 0) {
    savePatients(patients);
    await renderPatientList();
  }

  const btnAdd = document.getElementById('btnAddToList');
  const btnRef = document.getElementById('btnRefreshList');
  if (btnAdd) btnAdd.disabled = true;
  if (btnRef) btnRef.disabled = true;
  let success = 0, fail = 0;
  for (let i = 0; i < chartnos.length; i++) {
    const cn = chartnos[i];
    setStatus(`新增清單中 (${i + 1}/${chartnos.length}): ${cn}...`, true);
    try {
      await fetchAndStore(cn);
      success++;
    } catch (err) {
      fail++;
      console.warn(`Failed to fetch ${cn}:`, err);
    }
  }
  await renderPatientList();
  if (btnAdd) btnAdd.disabled = false;
  if (btnRef) btnRef.disabled = false;
  if (ta && success > 0 && fail === 0) ta.value = '';
  setStatus(`新增完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`);
  showToast(`新增完成: ${success} 成功${fail ? `, ${fail} 失敗` : ''}`, fail ? 'error' : 'success');
}

/**
 * Handler for the 更新資料 button: re-fetch labs + demographics for every
 * chartNo currently in the patient list (ignores the textarea contents).
 */
async function refreshExistingPatients() {
  const patients = loadPatients();
  if (patients.length === 0) {
    showToast('清單為空，請先用「新增清單」加入病人', 'error');

  if (!settings.opsid) {

    return;
  }

  const btnAdd = document.getElementById('btnAddToList');
  const btnRef = document.getElementById('btnRefreshList');
  if (btnAdd) btnAdd.disabled = true;

// ─── ui-lab-view.js ───────────────────────────────────────────────
// Per-patient lab history table renderer
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// LAB DATA TABLE RENDERING
// ═══════════════════════════════════════════════════════════════════════════════

// Staging-string → colour class (KDIGO-aligned, 4 levels). Used by entries
// declared with `kind:'staging'` in REPORTER_COMPUTED (GFRStage / UACRStage /
// UPCRStage / KDIGORisk / TaiwanCKD / EarlyCKD). eGFR is numeric and uses the
// regular hi/lo path. Empty class = no colour applied.
const STAGING_CLASS = {
  // GFRStage
  '正常':       'val-stage-normal',
  'CKD2':       'val-stage-mild',
  'CKD3a':      'val-stage-mild',
  'CKD3b':      'val-stage-moderate',
  'CKD4':       'val-stage-severe',
  'CKD5':       'val-stage-severe',
  // UACRStage
  'A2':         'val-stage-mild',
  'A3':         'val-stage-moderate',
  // UPCRStage
  '輕度':       'val-stage-mild',
  '顯著':       'val-stage-moderate',
  '腎病範圍':   'val-stage-severe',
  // KDIGORisk
  '低風險':     'val-stage-normal',
  '中風險':     'val-stage-mild',
  '高風險':     'val-stage-moderate',
  '極高風險':   'val-stage-severe',
  // TaiwanCKD
  '第一期':     'val-stage-normal',
  '第二期':     'val-stage-mild',
  '第三期 3a':  'val-stage-mild',
  '第三期 3b':  'val-stage-moderate',
  '第四期':     'val-stage-severe',
  '第五期':     'val-stage-severe',
  // EarlyCKD
  'P1早期':     'val-stage-mild',
  'P2中晚期':   'val-stage-moderate',
};

function stagingClass(v) {
  return STAGING_CLASS[String(v)] || '';
}

/**
 * View lab data for a specific patient.
 * Switches to the labview tab and renders the full history table.
 */
async function viewPatientLab(chartno) {
  const patients = loadPatients();
  const patient = patients.find(p => p.chartno === chartno);
  const labData = (await loadLabData())[chartno];

  // Update header — sex/age come from auto-filled demographics; revision 1
  // dropped the schedule/frequency text in favor of the patient-row selects.
  document.getElementById('labPatientName').textContent = patient
    ? `${patient.name || ''} (${chartno})`
    : chartno;
  const sex = patient ? (patient.sex || patient.genderCode || '') : '';
  const age = patient && patient.age != null ? patient.age + '歲' : '';
  const dd  = patient ? (patient.dialysisDays || '') : '';
  const sh  = patient ? (patient.shift || '') : '';
  document.getElementById('labPatientMeta').textContent =
    [sex, age, dd, sh].filter(Boolean).join(' ｜ ');

  const wrapper = document.getElementById('labTableWrapper');

  if (!labData) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">尚無檢驗資料，請先點選「新增清單」或「全部更新」按鈕擷取資料</p>';
    switchTab('labview');
    return;
  }

  // Restrict the table to the active group's manifest so dialysis-specific
  // form items render in form order; pick up any displayLabel overrides.
  const manifestEntries = (GROUP.labManifest || []).map(resolveManifestEntry);
  const manifestIds     = new Set(manifestEntries.map(e => e.id));
  const labelOverride   = new Map(
    manifestEntries.filter(e => e.displayLabel).map(e => [e.id, e.displayLabel])
  );
  const computedIds = new Set(GROUP.computed || []);
  const allTests = [
    ...LAB_TESTS.filter(t => manifestIds.has(t.id)),
    ...COMPUTED_TESTS.filter(t => computedIds.has(t.id)),
  ];

  // Step 2: BUN_pre / BUN_post / URR are now resolved per cluster via the
  // dialysis group's resolveBunClustersFromStored() — same source of truth
  // as the CSV exporter. The stored BUN_pre / BUN_post arrays now contain
  // every BUN occurrence twice (one per testId), so per-date dateMap reads
  // are no longer meaningful for those rows; we override them below.
  const bunSlots = (typeof GROUP.resolveBunClustersFromStored === 'function')
    ? GROUP.resolveBunClustersFromStored(labData) : {};
  const bunPreByDate  = {};
  const bunPostByDate = {};
  const urrByDate     = {};
  for (const startDate in bunSlots) {
    const slot = bunSlots[startDate];
    if (slot.pre  && slot.preDate)  bunPreByDate[slot.preDate]   = slot.pre.value;
    if (slot.post && slot.postDate) bunPostByDate[slot.postDate] = slot.post.value;
    if (slot.urr != null)           urrByDate[startDate]         = slot.urr;
  }
  const overrideMap = {
    BUN_pre:  bunPreByDate,
    BUN_post: bunPostByDate,
    URR:      urrByDate,
  };

  const dateSet = new Set();
  for (const test of allTests) {
    const entries = labData[test.id];
    if (!entries) continue;
    for (const e of entries) {
      dateSet.add(e.date);
    }
  }
  // Make sure every cluster start / pre date / post date appears as a column,
  // even if no other test was drawn on that exact date.
  for (const startDate in bunSlots) {
    dateSet.add(startDate);
    const slot = bunSlots[startDate];
    if (slot.preDate)  dateSet.add(slot.preDate);
    if (slot.postDate) dateSet.add(slot.postDate);
  }

  const dates = Array.from(dateSet).sort((a, b) => b.localeCompare(a)); // newest first

  if (dates.length === 0) {
    wrapper.innerHTML = '<p class="text-center text-muted" style="padding:24px">未找到任何檢驗數據</p>';
    switchTab('labview');
    return;
  }

  // Convert dates to Taiwan calendar for header display
  const dateHeaders = dates.map(d => {
    const parts = d.split('-');
    const twYear = +parts[0] - 1911;
    return `${twYear}/${parts[1]}/${parts[2]}`;
  });

  // Build table HTML
  let html = '<table class="lab-table">';

  // Header row with dates
  html += '<thead><tr>';
  html += '<th style="min-width:120px;position:sticky;left:0;z-index:3;background:#1a5276">檢驗項目</th>';
  html += '<th style="min-width:90px;position:sticky;left:120px;z-index:3;background:#1a5276">參考值</th>';
  dates.forEach((d, i) => {
    const cls = i === 0 ? ' class="latest-col"' : '';
    html += `<th${cls}>${dateHeaders[i]}</th>`;
  });
  html += '</tr></thead>';

  html += '<tbody>';

  const hasAny = id => {
    if (overrideMap[id] && Object.keys(overrideMap[id]).length > 0) return true;
    return labData[id] && labData[id].length > 0;
  };

  // Group tests by category — restricted to allTests (already manifest-filtered)
  for (const cat of LAB_CATEGORIES) {
    const testsInCat = allTests.filter(t => t.cat === cat.id);
    if (testsInCat.length === 0) continue;
    // Check if category has any data (includes Step 2 BUN/URR overrides)
    const hasData = testsInCat.some(t => hasAny(t.id));
    if (!hasData) continue;

    // Category header row
    html += `<tr class="row-category"><td colspan="${dates.length + 2}">${cat.label}</td></tr>`;

    for (const test of testsInCat) {
      if (!hasAny(test.id)) continue;
      const entries = labData[test.id] || [];

      // Build a date -> value map. For BUN_pre / BUN_post / URR (Step 2),
      // the override map IS the source of truth (resolveBUN per cluster);
      // ignore raw stored entries which now contain duplicates.
      const dateMap = overrideMap[test.id]
        ? Object.assign({}, overrideMap[test.id])
        : (() => {
            const m = {};
            for (const e of entries) {
              if (!(e.date in m)) m[e.date] = e.value; // first wins (newest if pre-sorted)
            }
            return m;
          })();

      const lbl = labelOverride.get(test.id) || test.label;
      html += '<tr class="row-item">';
      html += `<td>${lbl}</td>`;
      html += `<td>${test.ref || ''} ${test.unit ? '(' + test.unit + ')' : ''}</td>`;

      dates.forEach((d, i) => {
        const val = dateMap[d];
        const cls = i === 0 ? ' latest-col' : '';

        if (val == null) {
          html += `<td class="${cls}"></td>`;
          return;
        }

        // Determine color class
        let valCls = '';
        if (test.kind === 'staging') {
          // CKD staging strings (GFRStage / UACRStage / UPCRStage / KDIGORisk /
          // TaiwanCKD / EarlyCKD). No numeric hi/lo — colour via STAGING_CLASS.
          valCls = stagingClass(val);
        } else if (test.qualitative) {
          // Qualitative: Reactive/positive = red, Non-Reactive/negative = green
          const lower = String(val).toLowerCase();
          if (lower.includes('reactive') && !lower.includes('non')) {
            valCls = 'val-q-pos';
          } else if (lower.includes('non-reactive') || lower.includes('negative') || lower.includes('nonreactive')) {
            valCls = 'val-q-neg';
          }
        } else {
          const numVal = typeof val === 'number' ? val : parseFloat(val);
          if (!isNaN(numVal)) {
            // sex is 'M'/'F' from the patient record (or null/unknown).
            const sex = (patient && (patient.sex || patient.genderCode)) || null;
            let hi = test.hi, lo = test.lo;
            // Route through the shared machine × time × gender resolver ONLY for
            // catalog-backed in-scope tests (they carry refHistory). allTests here
            // is LAB_TESTS ∩ active manifest, so in-scope tests in BOTH the
            // dialysis and CKD HTML get this. BUN_pre/post, computed, qualitative,
            // and excluded entries have no refHistory → keep their own lo/hi (zero
            // regression). d is this column's ISO date; resolveRef + CATALOG come
            // from the patterns block (single <script>, defined before core).
            if (typeof resolveRef === 'function' && test.refHistory && test.id) {
              const catList = (typeof CATALOG !== 'undefined') ? CATALOG
                            : (window.HOSPITAL_LAB_PATTERNS_CATALOG || []);
              const g = (sex === 'M' || sex === 'F') ? sex : null;
              // age_dim §5: reporter passes age=undefined this round (→ resolveRef
              // age-agnostic, zero regression). Reporter's patient.age is current
              // age; threading a per-row ageAtReport is deferred (待補資料來源).
              const r = resolveRef(test.id, getMachineSource(), d, g, catList, undefined);
              if (r) { hi = r.refHi; lo = r.refLo; }
            } else {
              // Gender-aware fallback (SOP G, unchanged): loM/hiM or loF/hiF.
              if (sex === 'M' && (test.hiM != null || test.loM != null)) {
                if (test.hiM != null) hi = test.hiM;
                if (test.loM != null) lo = test.loM;
              } else if (sex === 'F' && (test.hiF != null || test.loF != null)) {
                if (test.hiF != null) hi = test.hiF;
                if (test.loF != null) lo = test.loF;
              }
            }
            if (hi != null && numVal > hi) valCls = 'val-hi';
            else if (lo != null && numVal < lo) valCls = 'val-lo';
          }
        }

        html += `<td class="${valCls}${cls}">${val}</td>`;
      });

      html += '</tr>';
    }
  }

  html += '</tbody></table>';
  wrapper.innerHTML = html;
  switchTab('labview');
}

// downloadBlob + exportCombinedCSV (group exporter delegate)
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work

// ═══════════════════════════════════════════════════════════════════════════════
// EXPORT — combined long-format CSV
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Export all tracked patients × YYYYMM as a single long-format CSV.
 * Layout (header, rows) lives in GROUP.exporter.formatAll (groups/dialysis.js).
 */
async function exportCombinedCSV() {
  if (!GROUP.exporter || typeof GROUP.exporter.formatAll !== 'function') {
    showToast('此疾病模組尚未提供 CSV 匯出', 'error'); return;
  }
  let patients = loadPatients();
  if (patients.length === 0) { showToast('尚無病患可匯出', 'error'); return; }

  // Phase 1.5: respect ticked subset; null = export everyone.
  const selected = getSelectedChartNos();
  if (selected) {
    const wanted = new Set(selected);
    patients = patients.filter(p => wanted.has(p.chartno || p.chartNo));
    if (!patients.length) {
      showToast('勾選的病患都不在清單中', 'error'); return;
    }
  }

  const labData  = await loadLabData();
  const csv      = GROUP.exporter.formatAll(patients, labData);
  // BOM so Excel opens UTF-8 without garbling Chinese display labels.
  const blob     = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const filename = GROUP.exporter.filename
    ? GROUP.exporter.filename()
    : `dialysis_export_${todayStr()}.csv`;
  downloadBlob(blob, filename);
  const scope = selected ? `${patients.length} 位勾選` : `${patients.length} 位全部`;
  showToast(`CSV 已匯出（${scope}）`, 'success');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── First-run machine picker (vhtt / vhyl) ─────────────────────────────────
// Reuses the .modal-overlay shell in body.html (#machineModal). Two-step
// (pick → confirm) so a vhyl user doesn't mis-pick vhtt (brief §11.5). The key
// is shared across the three HTMLs (same file:// origin) — set it once anywhere
// and the others stay silent.
function renderMachinePick() {
  const body = document.getElementById('machineModalBody');
  if (!body) return;
  body.innerHTML =
    '<p style="margin-bottom:12px;line-height:1.5;color:#4a5568;font-size:13px;">' +
      '用來判讀檢驗值的正常範圍 — 不同院區試劑校正不同。設定一次後不再詢問（可在設定分頁更改）。</p>' +
    '<div style="display:flex;gap:10px;">' +
      '<button class="btn btn-primary" style="flex:1" onclick="pickMachine(\'vhtt\')">臺東分院 (vhtt)</button>' +
      '<button class="btn btn-primary" style="flex:1" onclick="pickMachine(\'vhyl\')">玉里分院 (vhyl)</button>' +
    '</div>';
}
function showMachineFirstRun() {
  renderMachinePick();
  const modal = document.getElementById('machineModal');
  if (modal) modal.classList.remove('hidden');
}
function pickMachine(m) {
  const body = document.getElementById('machineModalBody');
  if (!body) return;
  const label = m === 'vhtt' ? '臺東分院 (vhtt)' : '玉里分院 (vhyl)';
  body.innerHTML =
    '<p style="margin-bottom:12px;line-height:1.5;font-size:13px;">你選的是 <strong>' + label + '</strong>，確認？</p>' +
    '<div style="display:flex;gap:10px;">' +
      '<button class="btn btn-secondary" style="flex:1" onclick="renderMachinePick()">重選</button>' +
      '<button class="btn btn-primary" style="flex:1" onclick="confirmMachine(\'' + m + '\')">確認</button>' +
    '</div>';
}
function confirmMachine(m) {
  setMachineSource(m);
  const modal = document.getElementById('machineModal');
  if (modal) modal.classList.add('hidden');
}

// Exposed for unit testing if ever needed.
function normalizeQualitative(raw) {
  if (raw == null) return '';
  const s = String(raw).trim();
  if (!s) return '';
  if (s === '-' || s === '+/-') return '[-]';
  // "1+" / "2+" / "3+" / "4+"
  const m = s.match(/^(\d+)\+$/);
  if (m) return '[' + '+'.repeat(Number(m[1])) + ']';
  // "+", "++", "+++", "++++" multi-plus
  const plusCount = (s.match(/\+/g) || []).length;
  if (plusCount > 0) return '[' + '+'.repeat(plusCount) + ']';
  return '[-]';   // unknown captured token → conservative negative
}

// Format a numeric lab value cell. Detection-limit strings ("<2", ">100")
// pass through verbatim so Excel sees a string cell.
function _renalNumCell(value) {
  if (value == null || value === '') return '';
  const s = String(value).trim();
  if (s === '') return '';
  if (/^[<>]/.test(s)) return s;
  const n = parseFloat(s);
  return isFinite(n) ? n : s;
}

function _renalDateCell(isoDate) {
  if (!isoDate) return '';
  const m = String(isoDate).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[1]}/${m[2]}/${m[3]}` : '';
}

// Pull one stored entry's value for a testId from a draw cluster.
function _renalVal(draw, id) {
  const e = draw && draw.labs && draw.labs[id];
  return e && e.value != null ? e.value : '';
}

/**
 * Export the active CKD group's tracked patients to a 腎臟病平台 xlsx.
 * Selection-aware: respects the Phase 1.5 patient-checkbox filter.
 */
async function exportRenalPlatformXlsx() {
  if (typeof XLSX === 'undefined') {
    showToast('xlsx library 未載入', 'error');
    return;
  }
  const group = (typeof window !== 'undefined' && window.ACTIVE_GROUP) || GROUP;
  if (!group || !group.detectDrawsFromStored) {
    showToast('此疾病模組未提供 draw detection', 'error');
    return;
  }

  let patients = loadPatients();
  if (!patients.length) { showToast('尚無病患可匯出', 'error'); return; }

  const selected = getSelectedChartNos();
  if (selected) {
    const wanted = new Set(selected);
    patients = patients.filter(p => wanted.has(p.chartno || p.chartNo));
    if (!patients.length) { showToast('勾選的病患都不在清單中', 'error'); return; }
  }

  const allLabData = await loadLabData();

  // 23-column schema. Row 1 keys / Row 2 labels / Row 3 units / Row 4+ data.
  // Source: TASK_BRIEF_phase3_early_ckd.md §3.2.
  const COLS = [
    { key: 'CID',                 label: '病歷號',          unit: ''          },
    { key: 'Chk_Date',            label: '檢查日期',        unit: 'yyyy/mm/dd' },
    { key: 'Creatinine',          label: 'Creatinine',      unit: 'mg/dl'     },
    { key: 'Urea_Nitrogen',       label: 'Urea Nitrogen',   unit: 'mg/dl'     },
    { key: 'Hct',                 label: 'Hct',             unit: '%'         },
    { key: 'HbA1C',               label: 'HbA1c',           unit: '%'         },
    { key: 'Uric_Acid',           label: 'Uric Acid',       unit: 'mg/dl'     },
    { key: 'Cholesterol',         label: 'Cholesterol',     unit: 'mg/dl'     },
    { key: 'Triglyceride',        label: 'Triglyceride',    unit: 'mg/dl'     },
    { key: 'Albumin',             label: 'Albumin',         unit: 'g/dl'      },
    { key: 'Urine_Proteine',      label: 'Urine Protein',   unit: 'mg/dl'     },
    { key: 'OB',                  label: 'OB',              unit: ''          },
    { key: 'Sugar_AC',            label: 'Sugar[AC]',       unit: 'mg/dl'     },
    { key: 'LDL_Cholesterol',     label: 'LDL-cholesterol', unit: 'mg/dl'     },
    { key: 'Urine_Total_Protein', label: 'Urine Total Protein', unit: 'mg/dl' },
    { key: 'Urine_creatinial',    label: 'Urine creatinial',unit: 'mg/dl'     },
    { key: 'Urine_PCR',           label: 'UPCR',            unit: 'mg/gm'     },
    { key: 'ACRatio',             label: 'UACR',            unit: 'μg/mg'     },
    { key: 'Urine_Glucose',       label: '尿糖',            unit: ''          },
    { key: 'Height',              label: 'Height',          unit: 'cm'        },
    { key: 'Weight',              label: 'Weight',          unit: 'kg'        },
    { key: 'BP1',                 label: '收縮壓',          unit: 'mmHg'      },
    { key: 'BP2',                 label: '舒張壓',          unit: 'mmHg'      },
  ];

  const headerRowKeys   = COLS.map(c => c.key);
  const headerRowLabels = COLS.map(c => c.label);
  const headerRowUnits  = COLS.map(c => c.unit);

  const dataRows = [];
  for (const p of patients) {
    const cn = p.chartno || p.chartNo || '';
    if (!cn) continue;
    const labData = allLabData[cn];
    if (!labData) continue;
    const draws = group.detectDrawsFromStored(labData);
    if (!draws.length) continue;

    // One row per draw cluster (NOT per month — the renal platform wants
    // every check date, not aggregated). Keep ascending order by drawDate.
    for (const draw of draws) {
      const row = [
        cn,                                                  // CID
        _renalDateCell(draw.drawDate),                       // Chk_Date
        _renalNumCell(_renalVal(draw, 'CREAT')),             // Creatinine
        _renalNumCell(_renalVal(draw, 'BUN')),               // Urea Nitrogen
        _renalNumCell(_renalVal(draw, 'HCT')),               // Hct
        _renalNumCell(_renalVal(draw, 'HbA1c')),             // HbA1c
        _renalNumCell(_renalVal(draw, 'UA')),                // Uric Acid
        _renalNumCell(_renalVal(draw, 'CHOL')),              // Cholesterol
        _renalNumCell(_renalVal(draw, 'TG')),                // Triglyceride
        _renalNumCell(_renalVal(draw, 'Albumin')),           // Albumin
        _renalNumCell(_renalVal(draw, 'UrineProtein')),      // Urine Protein
        normalizeQualitative(_renalVal(draw, 'UrineOB')),    // OB → [-/+/++/+++]
        _renalNumCell(_renalVal(draw, 'GluAC')),             // Sugar[AC]
        _renalNumCell(_renalVal(draw, 'LDL')),               // LDL-cholesterol
        '',                                                  // Urine Total Protein (24hr — 門診不做，留空)
        _renalNumCell(_renalVal(draw, 'UrineCr')),           // Urine creatinial
        _renalNumCell(_renalVal(draw, 'UPCR')),              // UPCR
        _renalNumCell(_renalVal(draw, 'UACR')),              // UACR
        normalizeQualitative(_renalVal(draw, 'UrineGlucose')), // 尿糖
        '', '', '', '',                                      // Height / Weight / BP1 / BP2 (non-lab)
      ];
      dataRows.push(row);
    }
  }

  if (!dataRows.length) {
    showToast('沒有可匯出的檢驗資料（請先「全部更新」）', 'error');
    return;
  }

  const aoa = [headerRowKeys, headerRowLabels, headerRowUnits, ...dataRows];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Column widths — make the labels comfortable to read.
  ws['!cols'] = COLS.map(c => ({ wch: Math.max(10, c.label.length + 2) }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '工作表1');

  const filename = `腎平台檢驗數據_${todayStr()}.xlsx`;
  // SheetJS write → ArrayBuffer → Blob → downloadBlob (re-uses core helper).
  const buf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  downloadBlob(blob, filename);

  const scope = selected ? `${patients.length} 位勾選` : `${patients.length} 位全部`;
  showToast(`腎平台檢驗數據已匯出（${scope}，${dataRows.length} 列）`, 'success');
}

</script>
