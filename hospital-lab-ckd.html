<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初期慢性腎臟病檢驗資料管理</title>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'PingFang TC', 'Segoe UI', Arial, sans-serif;
  background: #f0f4f8; color: #2c3e50; line-height: 1.5; font-size: 14px;
}

/* ─── Header ───────────────────────────────────────────────────────────────── */
.app-header {
  background: linear-gradient(135deg, #1a5276, #2980b9);
  color: #fff; padding: 12px 24px; display: flex; align-items: center;
  justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.app-header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* ─── Buttons ──────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-family: inherit; transition: all .15s;
}
.btn:hover { filter: brightness(1.1); }
.btn-primary   { background: #2980b9; color: #fff; }
.btn-success   { background: #27ae60; color: #fff; }
.btn-warning   { background: #e67e22; color: #fff; }
.btn-danger    { background: #c0392b; color: #fff; }
.btn-secondary { background: #95a5a6; color: #fff; }
.btn-outline   { background: transparent; border: 1px solid #bdc3c7; color: #2c3e50; }
.btn-outline:hover { background: #ecf0f1; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px 8px; font-size: 16px; background: transparent; color: #fff; border: none; cursor: pointer; }
.btn-icon:hover { background: rgba(255,255,255,.15); border-radius: 4px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ─── Layout ───────────────────────────────────────────────────────────────── */
.container { max-width: 1400px; margin: 0 auto; padding: 16px 24px; }
.card {
  background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 16px; overflow: hidden;
}
.card-header {
  background: #f8f9fa; padding: 10px 16px; border-bottom: 1px solid #e9ecef;
  display: flex; align-items: center; justify-content: space-between;
  font-weight: 600; font-size: 15px;
}
.card-body { padding: 16px; }

/* ─── Tabs ─────────────────────────────────────────────────────────────────── */
.tabs { display: flex; border-bottom: 2px solid #e9ecef; margin-bottom: 16px; }
.tab-btn {
  padding: 8px 20px; border: none; background: transparent; cursor: pointer;
  font-size: 14px; font-family: inherit; color: #7f8c8d;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s;
}
.tab-btn.active { color: #1a5276; border-bottom-color: #1a5276; font-weight: 600; }
.tab-btn:hover:not(.active) { color: #2c3e50; background: #f8f9fa; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── Patient Table ────────────────────────────────────────────────────────── */
.patient-table { width: 100%; border-collapse: collapse; }
.patient-table th {
  background: #1a5276; color: #fff; padding: 8px 12px; text-align: left;
  font-weight: 500; font-size: 13px; white-space: nowrap;
}
.patient-table td {
  padding: 8px 12px; border-bottom: 1px solid #e9ecef; font-size: 13px;
}
.patient-table tr:hover td { background: #eaf2f8; }
.patient-table .actions { white-space: nowrap; }
.patient-table th.sortable { cursor: pointer; user-select: none; }
.patient-table th.sortable:hover { background: #154360; }
.patient-table th .sort-ind { font-size: 11px; opacity: .85; margin-left: 4px; }
.patient-table tr.filter-row th {
  background: #ecf0f1; padding: 4px 6px; font-weight: 400;
}
.patient-table tr.filter-row input,
.patient-table tr.filter-row select {
  width: 100%; padding: 3px 6px; font-size: 12px; font-family: inherit;
  border: 1px solid #bdc3c7; border-radius: 3px; background: #fff; color: #2c3e50;
}
.patient-table .row-actions { display: inline-flex; gap: 4px; }
.patient-table .row-actions .btn { padding: 3px 8px; font-size: 12px; line-height: 1; }
.patient-table .row-actions .btn:disabled { opacity: .5; cursor: wait; }

/* ─── Lab Data Table ───────────────────────────────────────────────────────── */
.lab-wrapper { overflow-x: auto; }
.lab-table { border-collapse: collapse; min-width: 100%; font-size: 12px; }
.lab-table th, .lab-table td {
  padding: 4px 8px; border: 1px solid #ddd; white-space: nowrap;
}
.lab-table thead th {
  background: #1a5276; color: #fff; position: sticky; top: 0; z-index: 2;
  font-weight: 500;
}
.lab-table .row-category {
  background: #2c3e50; color: #fff; font-weight: 600; text-align: left;
}
.lab-table .row-item td:first-child {
  background: #f8f9fa; font-weight: 500; position: sticky; left: 0; z-index: 1;
  min-width: 120px; border-right: 2px solid #bdc3c7;
}
.lab-table .row-item td:nth-child(2) {
  background: #f8f9fa; position: sticky; left: 120px; z-index: 1;
  min-width: 90px; border-right: 2px solid #bdc3c7; color: #7f8c8d; font-size: 11px;
}
.val-hi { color: #c0392b; font-weight: 700; }
.val-lo { color: #2471a3; font-weight: 700; }
.val-q-pos { color: #c0392b; font-weight: 700; }
.val-q-neg { color: #27ae60; }
.latest-col { background: rgba(255,235,59,.1); }
/* KDIGO-aligned staging colours (CKD HTML only — dialysis.computed has no
   staging ids so these classes never apply there). 4 levels: normal / mild /
   moderate / severe. */
.val-stage-normal   { background: #c8e6c9; color: #1b5e20; font-weight: 600; }
.val-stage-mild     { background: #fff9c4; color: #827717; font-weight: 600; }
.val-stage-moderate { background: #ffcc80; color: #8a4500; font-weight: 600; }
.val-stage-severe   { background: #ef9a9a; color: #b71c1c; font-weight: 700; }

/* ─── Modal ────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex;
  align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #fff; border-radius: 8px; width: 420px; max-width: 95vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal-header {
  padding: 14px 20px; border-bottom: 1px solid #e9ecef;
  display: flex; justify-content: space-between; align-items: center;
  font-weight: 600; font-size: 16px;
}
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #7f8c8d; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; gap: 8px; }

/* ─── Form ─────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #34495e; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 10px; border: 1px solid #ced4da; border-radius: 4px;
  font-size: 13px; font-family: inherit;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 2px rgba(41,128,185,.2); }

/* ─── Status bar ───────────────────────────────────────────────────────────── */
.status-bar {
  padding: 8px 16px; font-size: 12px; color: #7f8c8d;
  border-top: 1px solid #e9ecef; background: #f8f9fa;
}
.status-bar .spinner { display: inline-block; width: 12px; height: 12px;
  border: 2px solid #bdc3c7; border-top-color: #2980b9; border-radius: 50%;
  animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Settings panel ──────────────────────────────────────────────────────── */
.settings-panel { max-width: 500px; }

/* ─── Misc ─────────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.badge-am { background: #fdebd0; color: #e67e22; }
.badge-pm { background: #d5f5e3; color: #27ae60; }
.badge-135 { background: #d6eaf8; color: #2980b9; }
.badge-246 { background: #fadbd8; color: #c0392b; }
.text-muted { color: #95a5a6; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mb-8 { margin-bottom: 8px; }
.gap-8 { gap: 8px; }
.flex { display: flex; }
.items-center { align-items: center; }

/* ─── Patient detail header ────────────────────────────────────────────────── */
.patient-detail-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
  padding-bottom: 12px; border-bottom: 2px solid #e9ecef;
}
.patient-detail-header h2 { font-size: 18px; }
.patient-detail-header .meta { font-size: 13px; color: #7f8c8d; }

/* ─── KtV / URR computed row ───────────────────────────────────────────────── */
.computed-row { background: #fffde7; }

/* ─── Toast ────────────────────────────────────────────────────────────────── */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 6px; color: #fff; font-size: 13px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toastIn .3s ease;
  max-width: 360px;
}
.toast-success { background: #27ae60; }
.toast-error { background: #c0392b; }
.toast-info { background: #2980b9; }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }

</style>
</head>
<body>

<!-- ═══ Header ════════════════════════════════════════════════════════════════ -->
<header class="app-header">
  <h1>初期慢性腎臟病檢驗資料管理</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="switchTab('patients')" title="病患清單">&#128100;</button>
    <button class="btn-icon" onclick="switchTab('settings')" title="設定">&#9881;</button>
  </div>
</header>

<!-- ═══ Toast Container ══════════════════════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══ Main Container ════════════════════════════════════════════════════════ -->
<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="patients" onclick="switchTab('patients')">病患清單</button>
    <button class="tab-btn" data-tab="labview" onclick="switchTab('labview')">檢驗資料</button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">設定</button>
  </div>

  <!-- ═══ Tab: Patient List ════════════════════════════════════════════════── -->
  <div class="tab-panel active" id="tab-patients">
    <div class="card">
      <div class="card-header">
        <span>病患清單</span>
      </div>
      <div class="card-body">
        <div class="form-group" style="margin-bottom:8px">
          <label>病歷號清單（一行一個，或以逗號 / 分號 / 空白分隔）</label>
          <textarea id="chartnoInput" rows="3"
            style="width:100%; padding:8px 10px; border:1px solid #ced4da; border-radius:4px; font-family:inherit; font-size:13px; resize:vertical;"
            placeholder="000105069H&#10;000810385G"></textarea>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap">
          <div style="display:flex; gap:8px">
            <button class="btn btn-success btn-sm" id="btnAddToList" onclick="addAndUpdateFromInput()">新增清單</button>
          </div>
          <div style="display:flex; gap:8px; align-items:center">
            <button class="btn btn-primary" id="btnRefreshList" onclick="refreshExistingPatients()"
              style="padding:12px 32px; font-size:1.15em; font-weight:600; box-shadow:0 2px 6px rgba(52,152,219,0.35); margin-right:16px;">全部更新</button>
            <button class="btn btn-warning" id="btnExportRenalPlatform" onclick="exportRenalPlatformXlsx()"
              style="padding:12px 32px; font-size:1.15em; font-weight:600; box-shadow:0 2px 6px rgba(230,126,34,0.35);">匯出腎平台資料</button>
            <button class="btn btn-warning" id="btnExportCSV" onclick="exportCombinedCSV()"
              style="padding:12px 32px; font-size:1.15em; font-weight:600; box-shadow:0 2px 6px rgba(230,126,34,0.35);">匯出csv</button>
          </div>
        </div>
      </div>
      <div class="card-body" style="padding:0;border-top:1px solid #e9ecef">
        <table class="patient-table">
          <thead id="patientHead"></thead>
          <tbody id="patientBody"></tbody>
        </table>
      </div>
      <div class="status-bar" id="statusBar">就緒</div>
    </div>
  </div>

  <!-- ═══ Tab: Lab View ════════════════════════════════════════════════════── -->
  <div class="tab-panel" id="tab-labview">
    <div class="card">
      <div class="card-header">
        <div class="patient-detail-header" id="labPatientHeader" style="border:none;margin:0;padding:0">
          <h2 id="labPatientName">請選擇病患</h2>
          <span class="meta" id="labPatientMeta"></span>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-outline btn-sm" onclick="switchTab('patients')">返回清單</button>
        </div>
      </div>
      <div class="card-body">
        <div class="lab-wrapper" id="labTableWrapper">
          <p class="text-center text-muted">請從病患清單點選病患以查看檢驗資料</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Tab: Settings ════════════════════════════════════════════════════── -->
  <div class="tab-panel" id="tab-settings">
    <div class="card settings-panel">
      <div class="card-header"><span>系統設定</span></div>
      <div class="card-body">
        <div class="form-group">
          <label>API Base URL</label>
          <input type="text" id="settingBaseUrl" placeholder="http://ernode.vghb12.vhtt.gov.tw:8000">
        </div>
        <div class="form-group">
          <label>操作人員代號 (OPSID)</label>
          <input type="text" id="settingOpsid" placeholder="A123456789">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
      </div>
    </div>
  </div>

</div>

<!-- ═══ Confirm Modal ═════════════════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal" style="width:340px">
    <div class="modal-header">
      <span>確認刪除</span>
      <button class="modal-close" onclick="closeConfirm()">&times;</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg">確定要刪除此病患嗎？</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger btn-sm" id="confirmOkBtn">確定刪除</button>
    </div>
  </div>
</div>

<!-- ═══ Machine first-run modal (vhtt / vhyl) ════════════════════════════════ -->
<!-- Body filled by init.js (renderMachinePick → pickMachine → confirmMachine). -->
<div class="modal-overlay hidden" id="machineModal">
  <div class="modal" style="width:380px">
    <div class="modal-header"><span>這台電腦在哪個院區？</span></div>
    <div class="modal-body" id="machineModalBody"></div>
  </div>
</div>

/**
 * computed.js — Derived-value formulas shared by viewer and reporter.
 *
 * Each computation has:
 *   id        unique string
 *   needs     ids of source patterns (looked up from viewer/reporter
 *             catalogs by the consumer)
 *   compute   pure function — receives an input bag keyed by `needs` ids,
 *             returns the computed value (number, string, or {value, tag}).
 *   meta      optional display info {unit, ref, hi, lo}
 *
 * The implementations here mirror those embedded in
 * hospital-lab-viewer/report.js and hospital-lab-reporter/hospital-lab-data.html
 * so that consumers can move to this file without behaviour changes.
 */

// ─── eGFR via CKD-EPI 2021 (race-free) ───────────────────────────────────
//   GFR = 142 × min(Scr/κ, 1)^α × max(Scr/κ, 1)^-1.200 × 0.9938^age × (1.012 if female)
// Where κ = 0.7 (F) / 0.9 (M); α = -0.241 (F) / -0.302 (M).
function eGFR_CKDEPI_2021({ creatinine, age, gender }) {
  if (creatinine == null || age == null || gender == null) return null;
  const isF = gender === 'F' || gender === '女';
  const k     = isF ? 0.7  : 0.9;
  const alpha = isF ? -0.241 : -0.302;
  const female_factor = isF ? 1.012 : 1.0;
  const ratio = creatinine / k;
  const min = Math.min(ratio, 1);
  const max = Math.max(ratio, 1);
  return +(142 * Math.pow(min, alpha) * Math.pow(max, -1.200)
              * Math.pow(0.9938, age) * female_factor).toFixed(1);
}

// ─── URR (Urea Reduction Ratio) ──────────────────────────────────────────
function URR({ bun_pre, bun_post }) {
  if (bun_pre == null || bun_post == null || bun_pre === 0) return null;
  return +((1 - bun_post / bun_pre) * 100).toFixed(1);
}

// ─── Ca × P product ──────────────────────────────────────────────────────
function CaP({ Ca, P }) {
  if (Ca == null || P == null) return null;
  return +(Ca * P).toFixed(1);
}

// ─── UIBC (Unsaturated Iron Binding Capacity) ───────────────────────────
//   UIBC = TIBC − Fe
function UIBC({ TIBC, Fe }) {
  if (TIBC == null || Fe == null) return null;
  const v = TIBC - Fe;
  return v >= 0 ? +v.toFixed(1) : null;
}

// ─── PSA Free/Total ratio (only meaningful when PSA > 4) ─────────────────
function PSARatio({ PSA, FreePSA }) {
  if (PSA == null || FreePSA == null || PSA <= 4) return null;
  const r = +(FreePSA / PSA * 100).toFixed(1);
  let tag = 'normal';
  if (r < 10) tag = 'warning';
  else if (r < 25) tag = 'caution';
  return { value: r, tag };
}

// ─── GFR stage (KDIGO) ───────────────────────────────────────────────────
function GFRStage({ eGFR }) {
  if (eGFR == null) return null;
  if (eGFR >= 90) return '正常';
  if (eGFR >= 60) return 'CKD2';
  if (eGFR >= 45) return 'CKD3a';
  if (eGFR >= 30) return 'CKD3b';
  if (eGFR >= 15) return 'CKD4';
  return 'CKD5';
}

// ─── UACR stage (mg/g) ───────────────────────────────────────────────────
function UACRStage({ UACR }) {
  if (UACR == null) return null;
  if (UACR < 30)  return '正常';
  if (UACR < 300) return 'A2';
  return 'A3';
}

// ─── UPCR stage (mg/g) ───────────────────────────────────────────────────
function UPCRStage({ UPCR }) {
  if (UPCR == null) return null;
  if (UPCR < 150)  return '正常';
  if (UPCR < 500)  return '輕度';
  if (UPCR < 3500) return '顯著';
  return '腎病範圍';
}

// ─── KDIGO risk grid ─────────────────────────────────────────────────────
//
//             | A1 (UACR<30)   A2 (30–300)   A3 (>=300)
//  G1 (>=90)  | low            moderate       high
//  G2 (60–89) | low            moderate       high
//  G3a(45–59) | moderate       high           very high
//  G3b(30–44) | high           very high      very high
//  G4 (15–29) | very high      very high      very high
//  G5 (<15)   | very high      very high      very high
function KDIGORisk({ eGFR, UACR }) {
  if (eGFR == null || UACR == null) return null;
  const g = eGFR >= 90 ? 1 : eGFR >= 60 ? 2 : eGFR >= 45 ? 3 : eGFR >= 30 ? 4 : eGFR >= 15 ? 5 : 6;
  const a = UACR < 30 ? 1 : UACR < 300 ? 2 : 3;
  const grid = [
    null,
    ['低', '中', '高'],
    ['低', '中', '高'],
    ['中', '高', '極高'],
    ['高', '極高', '極高'],
    ['極高', '極高', '極高'],
    ['極高', '極高', '極高'],
  ];
  return grid[g][a - 1] + '風險';
}

// ─── Taiwan CKD stage (similar to KDIGO but uses UPCR fallback) ─────────
function TaiwanCKD({ eGFR, UACR, UPCR }) {
  if (eGFR == null) return null;
  // Damage marker: UACR ≥ 30 OR UPCR ≥ 150
  const hasDamage = (UACR != null && UACR >= 30) || (UPCR != null && UPCR >= 150);
  if (eGFR >= 90 && !hasDamage) return '正常';
  if (eGFR >= 90)  return '第一期';
  if (eGFR >= 60)  return hasDamage ? '第二期' : '正常';
  if (eGFR >= 45)  return '第三期 3a';
  if (eGFR >= 30)  return '第三期 3b';
  if (eGFR >= 15)  return '第四期';
  return '第五期';
}

// ─── Early CKD class (健保 P1 / P2) ─────────────────────────────────────
function EarlyCKD({ TaiwanCKD: tw, eGFR }) {
  if (eGFR == null) return null;
  if (tw === '正常') return '正常';
  return eGFR >= 45 ? 'P1早期' : 'P2中晚期';
}

// ─── HCV / HBsAg / RPR / TPHA qualitative ───────────────────────────────
//
// These map free-form "Reactive / Non-Reactive" plus an optional numeric
// titer into a user-facing string. Implementations live in each consumer's
// report.js today; the canonical behaviour is captured here for reuse.
function qualitativeFromText({ rawText, label }) {
  if (!rawText) return null;
  // Match a label-prefixed line, e.g. "Anti-HCV: Non-Reactive  1.92"
  const re = new RegExp(`${label}[^:\\n]*:\\s*([^\\s,;]+)(?:\\s+([\\d.]+))?`, 'i');
  const m  = rawText.match(re);
  if (!m) return null;
  const verdict = m[1].toLowerCase();
  const isPositive = /^react/.test(verdict);
  const isNegative = /^non[-\s]?react/.test(verdict);
  let label_zh;
  if (isPositive) label_zh = '帶原';
  else if (isNegative) label_zh = '正常';
  else label_zh = m[1]; // pass-through
  const titer = m[2] ? ` (${label} ${m[2]})` : '';
  return { value: label_zh + titer, tag: isPositive ? 'warning' : 'normal' };
}

// ─── Hepatitis display ──────────────────────────────────────────────────
//
// Three markers (HBsAg / Anti-HBs / Anti-HCV) share one display function;
// the only axis of variation is polarity:
//   antigen   — Reactive = 有疾病 (warning), Non-Reactive = 正常 (normal)
//   antibody  — Reactive = 有抗體 (normal),  Non-Reactive = 無抗體 (warning)
//
// Inputs come from raw catalog entries as arrays of {date, value, ...}
// (the consumer's parse loop produces these). We take the most recent.
// Returns { date, value, tag } or null when the qualitative entry is missing.
function _hepatitisDisplay(qualEntries, titerEntries, label, polarity) {
  const q = (qualEntries && qualEntries[0]) || null;
  if (!q) return null;
  const t = (titerEntries && titerEntries[0]) || null;
  const numStr = t ? t.value : '';

  let displayVal, tag;
  const qualRaw = q.value;
  if (qualRaw === 'Reactive') {
    if (polarity === 'antigen') { displayVal = '帶原';   tag = 'warning'; }
    else                         { displayVal = '有抗體'; tag = 'normal';  }
  } else if (qualRaw === 'Non-Reactive') {
    if (polarity === 'antigen') { displayVal = '正常';   tag = 'normal';  }
    else                         { displayVal = '無抗體'; tag = 'warning'; }
  } else {
    displayVal = qualRaw; tag = 'caution';
  }
  if (numStr) displayVal += ` (${label} ${numStr})`;

  return { date: q.date, value: displayVal, tag };
}

function HBsAgDisplay({ HBsAg, HBsAgTiter }) {
  return _hepatitisDisplay(HBsAg, HBsAgTiter, 'HBsAg', 'antigen');
}
function AntiHBsDisplay({ AntiHBs, AntiHBsTiter }) {
  return _hepatitisDisplay(AntiHBs, AntiHBsTiter, 'Anti-HBs', 'antibody');
}
function HCV({ AntiHCV, AntiHCVTiter }) {
  return _hepatitisDisplay(AntiHCV, AntiHCVTiter, 'Anti-HCV', 'antigen');
}

// ─── Computation registry ───────────────────────────────────────────────
const COMPUTATIONS = [
  { id:'eGFR',       needs:['CREAT', '__patient.age', '__patient.gender'],
    compute: ({ CREAT, age, gender }) => eGFR_CKDEPI_2021({ creatinine: CREAT, age, gender }),

        } else {
          drawDateIso = bucket.effectiveTime.slice(0, 10);
        }
      } else {
        for (const id in bucket.byTestId) {
          const e0 = bucket.byTestId[id][0];
          if (e0 && e0.date) { drawDateIso = e0.date; break; }
        }
        drawDateIso = drawDateIso || '';
      }

      // BUN pre: prefer the cleaned date-indexed pre, fall back to whatever
      // sat in this cluster's BUN_pre / BUN bucket (legacy data path).
      const pre = bunIdx.pre[drawDateIso]
        || (bucket.byTestId.BUN_pre && bucket.byTestId.BUN_pre[0])
        || (bucket.byTestId.BUN     && bucket.byTestId.BUN[0])
        || null;
      // BUN post: cross-cluster lookup by date (post lives in its own cluster
      // on vhtt where eff==entry.date). On vhyl, eff is days before the actual
      // draw date, so the date-keyed bunIdx lookup misses — fall back to the
      // current cluster's own BUN_post bucket, which is where pre/post end up
      // when they share an effectiveTime (vhyl pattern, 2026-05-12).
      const post = bunIdx.post[drawDateIso]
        || (bucket.byTestId.BUN_post && bucket.byTestId.BUN_post[0])
        || null;

      // Collect non-BUN labs (one entry per testId — they share the cluster
      // key, so any duplicate is a parser-side dedupe miss).
      const labs = {};
      for (const id in bucket.byTestId) {
        if (this._bunIds.indexOf(id) >= 0) continue;
        labs[id] = bucket.byTestId[id][0];
      }
      if (pre)  labs.BUN_pre  = pre;
      if (post) labs.BUN_post = post;

      // URR
      const computed = {};
      const pv = pre  ? Number(pre.value)  : NaN;
      const sv = post ? Number(post.value) : NaN;
      if (Number.isFinite(pv) && Number.isFinite(sv) && pv > 0) {
        computed.URR = +((1 - sv / pv) * 100).toFixed(1);
      }

      const yyyymm = drawDateIso ? drawDateIso.slice(0, 4) + drawDateIso.slice(5, 7) : '';

      draws.push({
        effectiveTime: bucket.effectiveTime,
        drawDate: drawDateIso,
        yyyymm,
        labs,
        computed,
      });
    }
    draws.sort((a, b) => {
      const ka = a.effectiveTime || a.drawDate || '';
      const kb = b.effectiveTime || b.drawDate || '';
      return ka < kb ? -1 : ka > kb ? 1 : 0;
    });

    // Annual-periodicity tests (e.g. Aluminum, HBsAg) have their own
    // 生效時間 and don't pass the monthly-overlap gate above, so the
    // exporter would never see them. For each annual test, look up its
    // entries in labData and attach each one onto the monthly draw that
    // shares its YYYYMM. Edge case: an annual draw in a month with no
    // monthly draw is dropped — same row-blanking convention as monthly.
    const annualIds = (this.labManifest || [])
      .map(resolveManifestEntry)
      .filter(e => e.periodicity === 'annual')
      .map(e => e.id);
    if (annualIds.length && draws.length) {
      const drawByMonth = new Map();
      for (const d of draws) {
        if (!d.yyyymm) continue;
        // Prefer the earliest monthly draw of the month if multiple exist.
        if (!drawByMonth.has(d.yyyymm)) drawByMonth.set(d.yyyymm, d);
      }
      for (const id of annualIds) {
        const arr = labDataForPatient[id];
        if (!Array.isArray(arr)) continue;
        for (const e of arr) {
          if (!e || !e.date) continue;
          const yyyymm = e.date.slice(0, 4) + e.date.slice(5, 7);
          const target = drawByMonth.get(yyyymm);
          if (!target) continue;
          // Don't clobber an entry the cluster already had (some annuals
          // do happen to be drawn alongside the monthly panel).
          if (!target.labs[id]) target.labs[id] = e;
        }
      }
    }

    return draws;
  },

  // Group monthly draws by YYYYMM, take the one with smallest effectiveTime
  // per month. Returns { 'YYYYMM': draw }.
  pickEarliestPerMonth(monthlyDraws) {
    const out = {};
    for (const d of (monthlyDraws || [])) {
      if (!d.yyyymm) continue;
      const cur = out[d.yyyymm];
      if (!cur) { out[d.yyyymm] = d; continue; }
      const ka = cur.effectiveTime || cur.drawDate || '';
      const kb = d.effectiveTime   || d.drawDate   || '';
      if (kb < ka) out[d.yyyymm] = d;
    }
    return out;
  },

  // Lab-table BUN cluster map for the labview tab.
  // Revision 1 hotfix: built directly from the cleaned BUN_pre[] / BUN_post[]
  // arrays (one canonical entry per date) so pre/post pair correctly even
  // when 洗前 and 洗後 sit in separate effectiveTime clusters.
  resolveBunClustersFromStored(labDataForPatient) {
    const out = {};
    if (!labDataForPatient) return out;
    const { pre: preIdx, post: postIdx } = this._indexBunByDate(labDataForPatient);
    const allDates = new Set([...Object.keys(preIdx), ...Object.keys(postIdx)]);
    for (const date of allDates) {
      const pre  = preIdx[date]  || null;
      const post = postIdx[date] || null;
      const slot = {
        pre, post,
        preDate:  pre  ? pre.date  : null,
        postDate: post ? post.date : null,
        urr: null,
        effectiveTime: (pre && pre.effectiveTime) || (post && post.effectiveTime) || null,
      };
      const pv = pre  ? Number(pre.value)  : NaN;
      const sv = post ? Number(post.value) : NaN;
      if (Number.isFinite(pv) && Number.isFinite(sv) && pv > 0) {
        slot.urr = +((1 - sv / pv) * 100).toFixed(1);
      }
      out[date] = slot;
    }
    return out;
  },

  // ─── CSV exporter — combined long format ────────────────────────────────
  // One row per (chartNo × YYYYMM). 4 cols per test (value/unit/lower/higher),
  // URR appended at the end. Empty cells stay empty (no carry-forward).
  exporter: {
    interval: 'monthly',

    filename(today) {
      const t = today instanceof Date ? today : new Date();
      const yyyymmdd = `${t.getFullYear()}${String(t.getMonth() + 1).padStart(2, '0')}${String(t.getDate()).padStart(2, '0')}`;
      return `dialysis_export_${yyyymmdd}.csv`;
    },

    formatAll(patients, allLabData, opts) {
      opts = opts || {};
      const catalog         = opts.catalog         || (typeof CATALOG          !== 'undefined' ? CATALOG          : []);
      const computedCatalog = opts.computedCatalog || (typeof REPORTER_COMPUTED !== 'undefined' ? REPORTER_COMPUTED : []);
      const catById  = new Map(catalog.map(e => [e.id, e]));
      const compById = new Map(computedCatalog.map(e => [e.id, e]));
      const manifest = DIALYSIS_GROUP.labManifest.map(resolveManifestEntry);
      const computedIds = DIALYSIS_GROUP.computed;

      const labelOf = entry => entry.displayLabel
        || (catById.get(entry.id) && (catById.get(entry.id).shortLabel || catById.get(entry.id).displayName))
        || entry.id;
      const unitOf = id => {
        const c = catById.get(id) || compById.get(id);
        return c && c.unit ? c.unit : '';
      };
      const hiOf = id => {
        const c = catById.get(id) || compById.get(id);
        if (!c) return '';
        if (c.hi != null) return c.hi;
        if (c.refHi != null) return c.refHi;
        return '';
      };
      const loOf = id => {
        const c = catById.get(id) || compById.get(id);
        if (!c) return '';
        if (c.lo != null) return c.lo;
        if (c.refLo != null) return c.refLo;
        return '';
      };
      const csvCell = v => {
        if (v == null) return '';
        const s = String(v);
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      };

      // Header — id, YYYYMM, then 4 cols per test, then 4 cols per computed.
      const header = ['id', 'YYYYMM'];
      for (const entry of manifest) {
        const lbl = labelOf(entry);
        header.push(`${lbl} value`, `${lbl} unit`, `${lbl} lower`, `${lbl} higher`);
      }
      for (const id of computedIds) {
        const lbl = (compById.get(id) && compById.get(id).label) || id;
        header.push(`${lbl} value`, `${lbl} unit`, `${lbl} lower`, `${lbl} higher`);
      }
      const lines = [header.map(csvCell).join(',')];

      // Rows: sort patients by chartNo, then per-patient sort YYYYMM ascending.
      const patientList = [...(patients || [])].sort((a, b) => {
        const ca = String(a.chartno || a.chartNo || '');
        const cb = String(b.chartno || b.chartNo || '');
        return ca.localeCompare(cb);
      });

      for (const p of patientList) {
        const cn = p.chartno || p.chartNo || '';
        if (!cn) continue;
        const labData = (allLabData && allLabData[cn]) || null;
        if (!labData) continue;
        const draws  = DIALYSIS_GROUP.detectMonthlyDrawsFromStored(labData);
        const byMonth = DIALYSIS_GROUP.pickEarliestPerMonth(draws);
        const months = Object.keys(byMonth).sort();
        for (const yyyymm of months) {
          const draw = byMonth[yyyymm];
          const row = [cn, yyyymm];
          for (const entry of manifest) {
            const cell = draw.labs && draw.labs[entry.id];
            const val  = cell && cell.value != null ? cell.value : '';
            const unit = (cell && cell.unit) || unitOf(entry.id);
            row.push(val, unit, loOf(entry.id), hiOf(entry.id));
          }
          for (const id of computedIds) {
            const val = draw.computed && draw.computed[id] != null ? draw.computed[id] : '';
            row.push(val, unitOf(id), loOf(id), hiOf(id));
          }
          lines.push(row.map(csvCell).join(','));
        }
      }
      return lines.join('\n');
    },
  },
};

// ─── helpers ─────────────────────────────────────────────────────────────────

// Cached set of testIds that count as "monthly required" for the overlap
// test. Manifest is fixed at module load — safe to memo.
let _monthlyReqIdsCache = null;
function monthlyRequiredIds(group) {
  if (!_monthlyReqIdsCache) {
    _monthlyReqIdsCache = new Set(
      group.labManifest
        .map(resolveManifestEntry)
        .filter(e => e.periodicity === 'monthly')
        .map(e => e.id)
    );
  }
  return _monthlyReqIdsCache;
}

// Legacy fallback for resolveBUN — only used when every BUN entry in a
// cluster is missing signOffTime (i.e. records written before revision 1).
function resolveBUNByLegacyOrderName(entries) {
  let pre = null, post = null;
  for (const e of entries) {
    const name = (e.orderName || '').trim();
    if (!post && name === 'BUN') post = e;
    else if (!pre && name.includes(',')) pre = e;
  }
  if (!pre) pre = entries.find(e => e !== post) || null;
  return { pre, post };
}

'use strict';

/**
 * groups/early-ckd.js — 初期慢性腎臟病（Early CKD）疾病群組模組
 *
 * Phase 3 (2026-05-08): first additional disease after dialysis. CKD draws
 * are simpler than dialysis — no BUN pre/post split, no exact monthly
 * cadence (門診 1–3 個月不等). One cluster per 生效時間, qualified when
 * it carries Creatinine OR BUN; same `pickEarliestPerMonth` rule when a
 * patient has multiple clusters in one calendar month.
 *
 * The renal-platform xlsx export lives in export-formats/renal-platform-
 * xlsx.js — this module just wires the manifest + draw detection + a
 * long-format CSV exporter (parallel to dialysis 匯出csv).
 *
 * Browser registry: window.GROUPS['early-ckd'].
 */

// ─── Helper: normalise labManifest entries ──────────────────────────────────
function resolveCkdManifestEntry(entry) {
  if (typeof entry === 'string') return { id: entry };
  return Object.assign({}, entry);
}

const EARLY_CKD_GROUP = {
  id: 'early-ckd',
  label: '初期慢性腎臟病',

  storageKey: {
    patients: 'patients_ckd',
    labs:     'labs_ckd',
  },

  // No CKD-specific user-editable fields (Phase 3). Demographics fill from
  // the API on every fetch; CKD stage will be a computed value once the
  // lab-view renders eGFR.
  patientFields: [],

  // Lab manifest — order roughly mirrors the renal-platform xlsx columns
  // (§3.2 of TASK_BRIEF_phase3_early_ckd.md). Catalog ids; the export
  // formatter looks each one up at write time.
  labManifest: [
    // ── 腎功能 ──
    'CREAT',
    'BUN',                                // generic BUN (not BUN_pre/post)
    'UA',
    // ── 血液 ──
    'HCT',
    // ── 血糖 ──
    'GluAC',
    'HbA1c',
    // ── 血脂 ──
    'CHOL',
    'TG',
    'LDL',
    // ── 蛋白質 ──
    'Albumin',
    // ── 尿液 (Phase 3 新加) ──
    { id: 'UrineProtein', displayLabel: 'Urine Protein' },   // mg/dL, sub-page
    { id: 'UrineOB',      displayLabel: 'OB' },              // qualitative
    { id: 'UrineGlucose', displayLabel: '尿糖' },            // qualitative
    { id: 'UrineCr',      displayLabel: 'Urine creatinine' },
    'UPCR',
    'UACR',
  ],

  // CKD staging — wired 2026-05-20 via the registry-driven dispatcher in
  // core/compute.js (formulas live in patterns/computed.js COMPUTATIONS).
  // Order chosen so the lab-view renders eGFR → 各 stage 由粗到細 → 健保分群。
  computed: ['eGFR', 'GFRStage', 'UACRStage', 'UPCRStage', 'KDIGORisk', 'TaiwanCKD', 'EarlyCKD'],

  // CKD draw detection — much looser than dialysis:
  // any cluster carrying Creatinine OR BUN counts as a check.
  drawDetection: {
    requiredAnyOf: ['CREAT', 'BUN'],
  },

  // Bucket every stored entry by its effectiveTime (= cluster anchor).
  _flattenEntriesByCluster(labDataForPatient) {
    const buckets = new Map();
    let warned = false;
    for (const id in labDataForPatient) {
      if (id.startsWith('_')) continue;
      const arr = labDataForPatient[id];
      if (!Array.isArray(arr)) continue;
      for (const e of arr) {
        let key;
        if (e.effectiveTime) {
          key = e.effectiveTime;
        } else {
          key = 'date:' + (e.date || '');
          if (!warned) {
            try { console.warn('[early-ckd] entries missing effectiveTime — bucketing by date as fallback. Refetch to populate.'); } catch (_) {}
            warned = true;
          }
        }
        if (!buckets.has(key)) buckets.set(key, { effectiveTime: e.effectiveTime || null, byTestId: {} });
        const slot = buckets.get(key).byTestId;
        if (!slot[id]) slot[id] = [];
        slot[id].push(e);
      }
    }
    return buckets;
  },

  // Returns [{ effectiveTime, drawDate, yyyymm, labs:{testId: entry} }]
  // sorted ascending by effectiveTime / drawDate.
  detectDrawsFromStored(labDataForPatient) {
    if (!labDataForPatient) return [];
    const buckets = this._flattenEntriesByCluster(labDataForPatient);
    const required = (this.drawDetection && this.drawDetection.requiredAnyOf) || [];

    const draws = [];
    for (const [, bucket] of buckets) {
      const ids = new Set(Object.keys(bucket.byTestId));

      // Qualifying check: at least one of the required test ids must be
      // present (CREAT or BUN). Loose on purpose — CKD 門診 panels vary.
      if (required.length && !required.some(id => ids.has(id))) continue;

      // drawDate from effectiveTime via local-time accessors so the
      // YYYY-MM-DD slice matches entry.date keys (same UTC-vs-TPE caveat
      // that bit dialysis groups during refactor).
      let drawDateIso = null;
      if (bucket.effectiveTime) {
        const d = new Date(bucket.effectiveTime);
        if (!isNaN(d.getTime())) {
          drawDateIso = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        } else {
          drawDateIso = bucket.effectiveTime.slice(0, 10);
        }
      } else {
        for (const id in bucket.byTestId) {
          const e0 = bucket.byTestId[id][0];
          if (e0 && e0.date) { drawDateIso = e0.date; break; }
        }
        drawDateIso = drawDateIso || '';
      }

      // One entry per testId per cluster; the group uses `date` key for
      // any cross-cluster pairing (none yet, but keeps shape consistent
      // with dialysis exporter).
      const labs = {};
      for (const id in bucket.byTestId) {
        labs[id] = bucket.byTestId[id][0];
      }

      const yyyymm = drawDateIso ? drawDateIso.slice(0, 4) + drawDateIso.slice(5, 7) : '';
      draws.push({
        effectiveTime: bucket.effectiveTime,
        drawDate: drawDateIso,
        yyyymm,
        labs,
      });
    }

    draws.sort((a, b) => {
      const ka = a.effectiveTime || a.drawDate || '';
      const kb = b.effectiveTime || b.drawDate || '';
      return ka < kb ? -1 : ka > kb ? 1 : 0;
    });
    return draws;
  },

  // Reuses the same "earliest of the month wins" rule as dialysis so
  // multi-cluster months (e.g. patient drew labs twice in a month) export
  // as one row.
  pickEarliestPerMonth(draws) {
    const out = {};
    for (const d of (draws || [])) {
      if (!d.yyyymm) continue;
      const cur = out[d.yyyymm];
      if (!cur) { out[d.yyyymm] = d; continue; }
      const ka = cur.effectiveTime || cur.drawDate || '';
      const kb = d.effectiveTime   || d.drawDate   || '';
      if (kb < ka) out[d.yyyymm] = d;
    }
    return out;
  },

  // ─── Long-format CSV exporter (匯出csv 按鈕) ────────────────────────────
  // One row per (chartNo × YYYYMM). 4 cols per test (value/unit/lower/higher).
  // No URR/CaxP for CKD; the group's `computed` array is empty so the
  // computed-loop simply emits nothing.
  exporter: {
    interval: 'monthly',

    filename(today) {
      const t = today instanceof Date ? today : new Date();
      const yyyymmdd = `${t.getFullYear()}${String(t.getMonth() + 1).padStart(2, '0')}${String(t.getDate()).padStart(2, '0')}`;
      return `early-ckd_export_${yyyymmdd}.csv`;
    },

    formatAll(patients, allLabData, opts) {
      opts = opts || {};
      const catalog = opts.catalog || (typeof CATALOG !== 'undefined' ? CATALOG : []);
      const catById = new Map(catalog.map(e => [e.id, e]));
      const manifest = EARLY_CKD_GROUP.labManifest.map(resolveCkdManifestEntry);

      const labelOf = entry => entry.displayLabel
        || (catById.get(entry.id) && (catById.get(entry.id).shortLabel || catById.get(entry.id).displayName))
        || entry.id;
      const unitOf = id => {
        const c = catById.get(id);
        return c && c.unit ? c.unit : '';
      };
      const refLoOf = id => {
        const c = catById.get(id);
        if (!c) return '';
        if (c.lo != null) return c.lo;
        if (c.refLo != null) return c.refLo;
        return '';
      };
      const refHiOf = id => {
        const c = catById.get(id);
        if (!c) return '';
        if (c.hi != null) return c.hi;
        if (c.refHi != null) return c.refHi;
        return '';
      };
      const csvCell = v => {
        if (v == null) return '';
        const s = String(v);
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      };

      // Staging entries (2026-05-20): one value-only column per computed id.
      // No unit/lower/higher because the values are qualitative strings
      // (CKD3a / A2 / 高風險 / …). eGFR is the one numeric exception but
      // is also exported as a single column for consistency.
      const computedList   = EARLY_CKD_GROUP.computed || [];
      const computedTests  = (typeof COMPUTED_TESTS !== 'undefined') ? COMPUTED_TESTS : [];
      const compById       = new Map(computedTests.map(c => [c.id, c]));
      const computedLabel  = id => {
        const c = compById.get(id);
        return (c && c.label) ? c.label : id;
      };

      const header = ['id', 'YYYYMM'];
      for (const entry of manifest) {
        const lbl = labelOf(entry);
        header.push(`${lbl} value`, `${lbl} unit`, `${lbl} lower`, `${lbl} higher`);
      }
      for (const id of computedList) header.push(computedLabel(id));
      const lines = [header.map(csvCell).join(',')];

      const patientList = [...(patients || [])].sort((a, b) => {
        const ca = String(a.chartno || a.chartNo || '');
        const cb = String(b.chartno || b.chartNo || '');
        return ca.localeCompare(cb);
      });

      for (const p of patientList) {
        const cn = p.chartno || p.chartNo || '';
        if (!cn) continue;
        const labData = (allLabData && allLabData[cn]) || null;
        if (!labData) continue;
        const draws  = EARLY_CKD_GROUP.detectDrawsFromStored(labData);
        const byMonth = EARLY_CKD_GROUP.pickEarliestPerMonth(draws);
        const months = Object.keys(byMonth).sort();
        for (const yyyymm of months) {
          const draw = byMonth[yyyymm];
          const row = [cn, yyyymm];
          for (const entry of manifest) {
            const cell = draw.labs && draw.labs[entry.id];
            const val  = cell && cell.value != null ? cell.value : '';
            const unit = (cell && cell.unit) || unitOf(entry.id);
            row.push(val, unit, refLoOf(entry.id), refHiOf(entry.id));
          }
          for (const id of computedList) {
            const cell = draw.labs && draw.labs[id];
            row.push(cell && cell.value != null ? cell.value : '');
          }
          lines.push(row.map(csvCell).join(','));
        }
      }
      return lines.join('\n');
    },
  },
};

// ─── chart-format.js ───────────────────────────────────────────────
// formatChartNo (9-digit + 1-letter normalisation)
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// CHART NUMBER FORMATTING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Normalize chart number to 9-digit + 1-letter format (e.g. "810385G" -> "000810385G").
 */
function formatChartNo(raw) {
  const s = raw.trim();
  if (!s) throw new Error('請輸入病歷號');
  const last = s[s.length - 1];
  if (!/[a-zA-Z]/.test(last)) throw new Error('病歷號須以英文字母結尾 (如 810385G)');
  const letter = last.toUpperCase();
  const digitStr = s.slice(0, -1).replace(/\D/g, '');
  if (!digitStr) throw new Error('病歷號中未找到數字');
  if (digitStr.length > 9) throw new Error('數字部分最多 9 碼');
  return digitStr.padStart(9, '0') + letter;
}


// ─── core/date-utils.js ───────────────────────────────────────────────
// ─── date-utils.js ───────────────────────────────────────────────
// Taiwan / Gregorian / 民國 date helpers + todayStr
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Parse RESDTTM: "20260414203800" -> Date (with HH:MM:SS retained when present).
 * Step 2 needs the time-of-day suffix to sort BUN_pre vs BUN_post by report time.
 */
function parseDateResdttm(str) {
  if (!str || str.length < 8) return null;
  const y  = +str.slice(0, 4),
        m  = +str.slice(4, 6) - 1,
        d  = +str.slice(6, 8),
        hh = str.length >= 10 ? +str.slice(8, 10) : 0,
        mm = str.length >= 12 ? +str.slice(10, 12) : 0,
        ss = str.length >= 14 ? +str.slice(12, 14) : 0;
  return new Date(y, m, d, hh, mm, ss);
}

/**
 * Parse Taiwan calendar date: "115/04/14 19:36" -> Date (with HH:MM[:SS] retained).
 * Step 2 needs the time-of-day suffix when RESDTTM is missing.
 */
function parseDateTaiwan(str) {
  if (!str) return null;
  const match = str.match(/^(\d+)\/(\d+)\/(\d+)(?:\s+(\d+):(\d+)(?::(\d+))?)?/);
  if (!match) return null;
  return new Date(
    +match[1] + 1911,
    +match[2] - 1,
    +match[3],
    +(match[4] || 0),
    +(match[5] || 0),
    +(match[6] || 0)
  );
}

/** Format Date to Taiwan calendar string: "115/04/14" */
function toTaiwanDate(d) {
  if (!d) return '';
  const y = d.getFullYear() - 1911;
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}

/** Format Date to short display: "04/14" */
function toShortDate(d) {
  if (!d) return '';
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

/** Format Date as YYYY-MM-DD for sorting */
function toSortableDate(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/** YYYY-MM-DD → 民國年 7 碼 RRRMMDD (e.g. 2025-05-07 → "1140507"). */
function toMinguoDate(isoDate) {
  if (!isoDate) return '';
  const m = String(isoDate).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  const y = (parseInt(m[1], 10) - 1911);
  return `${y}${m[2]}${m[3]}`;
}

/** YYYYMMDD for filenames. */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}


// ─── core/fetch.js ────────────────────────────────────────────────────
// ─── fetch.js ───────────────────────────────────────────────
// ernode HTML scraping + stable-frontier incremental fetch
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// API FETCHING & HTML PARSING
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Parse patient info from the ernode HTML header.
 * Header text example: "全部醫囑 000123456A 王小明 M 51 歲"
 */
function parsePatientInfo(doc, chartno) {
  const headerText = doc.querySelector('table.Header')?.textContent || '';
  const rest = chartno ? headerText.split(chartno)[1] || '' : headerText;
  const m = rest.match(/\s+(.+?)\s+([MF])\s+(\d+)\s*歲/);
  if (!m) return null;
  return {
    chartno,
    name:   m[1].trim(),
    gender: m[2] === 'M' ? '男' : '女',
    genderCode: m[2],
    age:    m[3],
  };
}

/**
 * Parse a single page of order results from the ernode API HTML.
 * Returns { orders[], nextUrl, total, patientInfo }.
 */
function parseOrdersPage(html, chartno, baseUrl) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const grid = doc.querySelector('table.Grid');
  if (!grid) return { orders: [], nextUrl: null, total: 0, patientInfo: null };

  const patientInfo = parsePatientInfo(doc, chartno);
  const orders = [];

  grid.querySelectorAll('tr.Row').forEach(row => {
    if (row.cells.length < 6) return;
    const h = name => row.querySelector(`input[name="${name}"]`)?.value?.trim() || '';
    const orderDateRaw   = row.cells[4]?.textContent.trim() || '';   // 生效時間
    const receiveDateRaw = row.cells[5]?.textContent.trim() || '';   // 簽收時間
    const effectiveDt = parseDateTaiwan(orderDateRaw);
    const signOffDt   = parseDateTaiwan(receiveDateRaw);
    orders.push({
      ordseq:     h('ORDSEQ'),
      comKey:     h('COM_KEY'),
      ordapno:    h('ORDAPNO'),
      resdttm:    h('RESDTTM'),
      pfcode:     h('PFCODE'),
      ordType:    h('ORDTYPE'),
      orderName:  row.cells[0]?.textContent.trim() || '',
      status:     row.cells[1]?.textContent.trim() || '',
      reportText: row.cells[2]?.textContent.trim() || '',
      dept:       row.cells[3]?.textContent.trim() || '',
      orderDate:  orderDateRaw,
      receiveDate: receiveDateRaw,
      // Revision 1: explicit named fields per the lab-orders page columns.
      // effectiveTime = 生效時間 (cluster anchor for monthly draws);
      // signOffTime  = 簽收時間 (BUN pre/post sort key — pre signs off
      // mid-morning, post signs off afternoon/evening).
      effectiveTime: effectiveDt ? effectiveDt.toISOString() : null,
      signOffTime:   signOffDt   ? signOffDt.toISOString()   : null,
    });
  });

  // Pagination: find ">>" link
  let nextUrl = null;
  doc.querySelectorAll('a').forEach(a => {
    if (a.textContent.trim() === '>>' && !nextUrl) {
      const href = a.getAttribute('href');
      nextUrl = href ? baseUrl + href : null;
    }
  });

  const footerText = doc.querySelector('tr.Footer')?.textContent || '';
  const totalMatch = footerText.match(/總筆數：(\d+)/);
  const total = totalMatch ? +totalMatch[1] : 0;

  return { orders, nextUrl, total, patientInfo };
}

/**
 * Fetch all pages of lab orders for a given chart number.
 * @param {string} chartno - Formatted chart number (e.g. "000810385G")
 * @param {Function} onProgress - Callback(fetched, total)
 * @returns {Promise<{orders: Array, patientInfo: Object}>}
 */
async function fetchAllOrders(chartno, onProgress) {
  const settings = loadSettings();
  const baseUrl = settings.baseUrl;
  let url = `${baseUrl}/order/get_lab_orders?chartno=${chartno}&opsid=${settings.opsid}`;
  const all = [];
  let page = 0, total = 0, patientInfo = null;

  while (url) {
    page++;
    if (page > 50) break; // safety limit

    const resp = await fetch(url, { credentials: 'omit' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const html = await resp.text();

    const result = parseOrdersPage(html, chartno, baseUrl);
    if (page === 1) {
      if (result.total) total = result.total;
      if (result.patientInfo) patientInfo = result.patientInfo;
    }
    all.push(...result.orders);

    if (onProgress) onProgress(all.length, total || '?');
    if (!result.nextUrl || (total && all.length >= total)) break;
    url = result.nextUrl;
  }

  return { orders: all, patientInfo };
}

/**
 * Stable-frontier incremental fetch. ernode returns orders newest-first;
 * signed-off reports (正式報告/更正報告) are immutable, only 未執行 orders
 * can change (later get a report). So once we hit a page where every order
 * is known AND its status is unchanged, every page beyond is also unchanged.
 *
 * Common case (no new orders) = 1 API call instead of 5–15.
 *
 * @param {string} chartno
 * @param {Array}  cachedOrders - prior orders (will have status updates
 *                                applied in-place; clone before passing if
 *                                the caller needs to keep the original).
 * @param {Function} onProgress - (fetched, total) => void
 */
async function fetchIncremental(chartno, cachedOrders, onProgress) {
  const settings = loadSettings();
  const baseUrl = settings.baseUrl;

  const knownMap = new Map();
  cachedOrders.forEach((o, i) => knownMap.set(o.ordseq, { idx: i, status: o.status }));

  const newOrders = [];
  let url = `${baseUrl}/order/get_lab_orders?chartno=${chartno}&opsid=${settings.opsid}`;
  let page = 0, total = 0, patientInfo = null;

  while (url) {
    page++;
    if (page > 50) break;

    const resp = await fetch(url, { credentials: 'omit' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const html = await resp.text();
    const result = parseOrdersPage(html, chartno, baseUrl);
    if (page === 1) {
      if (result.total) total = result.total;
      if (result.patientInfo) patientInfo = result.patientInfo;
    }

    let allKnown = true;
    for (const order of result.orders) {
      const known = knownMap.get(order.ordseq);
      if (!known) {
        newOrders.push(order);
        allKnown = false;
      } else if (known.status !== order.status) {
        // Typically 未執行 → 正式報告 — overwrite cached entry with new data.
        cachedOrders[known.idx] = order;
        allKnown = false;
      }
      // else: known + unchanged → stable hit
    }

    if (onProgress) onProgress(cachedOrders.length + newOrders.length, total || '?');
    if (allKnown || !result.nextUrl) break;
    url = result.nextUrl;
  }

  // newOrders are newer (came from earlier pages) → prepend to keep newest-first.
  const merged = newOrders.concat(cachedOrders);
  return { orders: merged, patientInfo, pagesChecked: page };
}


// ─── core/indexeddb-cache.js ──────────────────────────────────────────
// ─── indexeddb-cache.js ───────────────────────────────────────────────
// IndexedDB-backed caches (LabReporterOrdersCache)
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// RAW ORDERS CACHE (for incremental fetch, 2026-05-08)
// LAB DATA CACHE (replaces localStorage labs_<group>, 2026-05-13)
// ═══════════════════════════════════════════════════════════════════════════════
// IndexedDB `LabReporterOrdersCache` 容納兩個 store：
//   orders   (keyPath=chartno) — incremental fetch baseline，
//                                { chartno, orders: [...], ts }
//   labData  (keyPath=chartno) — 解析後的 lab values（取代 localStorage
//                                labs_dialysis / labs_ckd / ...），單一 store
//                                跨 disease group 共用。Shape:
//                                { chartno, <testId>: [...], _lastUpdate }
//
// orders store 是 2026-05-08 從 localStorage 搬來的（quota 5MB 在 30 人就吃緊）。
// labData store 是 2026-05-13 搬來的（CKD UACR sub-page enrichment 後每人 ~250KB，
// 20 人就爆 quota，validation 期間實測過 QuotaExceededError）。
// enrichCache (sub-page text by ordapno) 維持在 localStorage — 體積小、cache 本身
// 已 disease-neutral，不在這次 migration 範圍。

const ORDERS_DB_NAME = 'LabReporterOrdersCache';
const ORDERS_DB_VER  = 2;
const ORDERS_STORE   = 'orders';
const LABDATA_STORE  = 'labData';
let _ordersDb = null;

function openOrdersDB() {
  if (_ordersDb) return Promise.resolve(_ordersDb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(ORDERS_DB_NAME, ORDERS_DB_VER);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(ORDERS_STORE)) {
        db.createObjectStore(ORDERS_STORE, { keyPath: 'chartno' });
      }
      if (!db.objectStoreNames.contains(LABDATA_STORE)) {
        db.createObjectStore(LABDATA_STORE, { keyPath: 'chartno' });
      }
    };
    req.onsuccess = () => { _ordersDb = req.result; res(_ordersDb); };
    req.onerror   = () => rej(req.error);
  });
}

async function ordersCacheGet(chartno) {
  if (!chartno) return null;
  const db = await openOrdersDB();
  return new Promise((res, rej) => {
    const r = db.transaction(ORDERS_STORE, 'readonly').objectStore(ORDERS_STORE).get(chartno);
    r.onsuccess = () => {
      const row = r.result;
      res(row ? { orders: row.orders || [], ts: row.ts || 0 } : null);
    };
    r.onerror = () => rej(r.error);
  });
}

async function ordersCachePut(chartno, orders) {
  if (!chartno) return;
  const db = await openOrdersDB();
  return new Promise((res, rej) => {
    const r = db.transaction(ORDERS_STORE, 'readwrite').objectStore(ORDERS_STORE)
                .put({ chartno, orders, ts: Date.now() });
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

async function ordersCacheDelete(chartno) {
  if (!chartno) return;
  const db = await openOrdersDB();
  return new Promise((res, rej) => {
    const r = db.transaction(ORDERS_STORE, 'readwrite').objectStore(ORDERS_STORE)
                .delete(chartno);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

// ─── labData CRUD ──────────────────────────────────────────────────────────
// 單一 store、跨 group 共用、keyPath=chartno。Stored record shape:
//   { chartno, <testId>: [{date, value, dateObj, ...}, ...], ..., _lastUpdate }

async function labDataGet(chartno) {
  if (!chartno) return null;
  const db = await openOrdersDB();
  return new Promise((res, rej) => {
    const r = db.transaction(LABDATA_STORE, 'readonly').objectStore(LABDATA_STORE).get(chartno);
    r.onsuccess = () => res(r.result || null);
    r.onerror   = () => rej(r.error);
  });
}

// 回傳 { [chartno]: labRecord }，取代舊 loadLabData() 的 in-memory map。
// labRecord 內的 chartno 屬性無害（call site 都是用 outer key 索引）。
async function labDataGetAll() {
  const db = await openOrdersDB();
  return new Promise((res, rej) => {
    const r = db.transaction(LABDATA_STORE, 'readonly').objectStore(LABDATA_STORE).getAll();
    r.onsuccess = () => {
      const out = {};
      for (const row of (r.result || [])) {
        if (row && row.chartno) out[row.chartno] = row;
      }
      res(out);
    };
    r.onerror = () => rej(r.error);
  });
}

async function labDataPut(chartno, lab) {
  if (!chartno) return;
  const db = await openOrdersDB();
  // 把 chartno 寫進 record（keyPath 必要）。
  // _lastUpdate：caller 通常已設好（saveLabData / migration newer-wins 都需要原值）；
  // 若 lab 沒帶 _lastUpdate，補一個 now 才不會破壞 UI 的「最後更新」欄。
  const record = Object.assign({}, lab, { chartno });
  if (record._lastUpdate == null) record._lastUpdate = Date.now();
  return new Promise((res, rej) => {
    const r = db.transaction(LABDATA_STORE, 'readwrite').objectStore(LABDATA_STORE).put(record);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

// confirmRemovePatient 呼叫：只在 chartno 不在任何 group 的 patient list
// 才實際從 IDB 刪除。同一病人若同時在 dialysis + ckd，刪 ckd 那邊不該
// 連帶清掉 dialysis 還在用的 lab record。掃 localStorage 所有
// patients_* key（reporter 兩個 HTML 共用同一 origin，localStorage 可見）。
async function labDataDelete(chartno) {
  if (!chartno) return;
  let stillInUse = false;
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('patients_')) continue;
      const raw = localStorage.getItem(key);
      if (!raw) continue;
      let list;
      try { list = JSON.parse(raw); } catch { continue; }
      if (!Array.isArray(list)) continue;
      if (list.some(p => p && (p.chartno === chartno || p.chartNo === chartno))) {
        stillInUse = true;
        break;
      }
    }
  } catch (e) {
    console.warn('[labDataDelete] cross-group scan failed:', e);
  }
  if (stillInUse) {
    console.log(`[labDataDelete] ${chartno} 仍在其他 group，保留 IDB record`);
    return;
  }
  const db = await openOrdersDB();
  return new Promise((res, rej) => {
    const r = db.transaction(LABDATA_STORE, 'readwrite').objectStore(LABDATA_STORE)
                .delete(chartno);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

// 2026-05-13：把 labs_<group> 從 localStorage 搬到 IDB labData store。
// 每個 disease HTML 各自跑一次；store 跨 group 共用，同一 chartno 若先被
// 另一個 group migrate 過，用 _lastUpdate newer-wins 決定要不要覆寫。
// 保留 labs_<group>_legacy 作 backup（給一個 release 的回退空間）。
(function migrateLabsToIDB() {
  const groupId = (typeof window !== 'undefined' && window.ACTIVE_GROUP_ID) || 'dialysis';
  const lsKey = `labs_${groupId}`;
  let lsData;
  try { lsData = localStorage.getItem(lsKey); } catch (_) { return; }
  if (!lsData) return;

  (async () => {
    try {
      const obj = JSON.parse(lsData);
      if (!obj || typeof obj !== 'object') return;
      let migrated = 0;
      for (const [cn, lab] of Object.entries(obj)) {
        if (!cn || !lab || typeof lab !== 'object') continue;
        const existing = await labDataGet(cn);
        const incomingTs = lab._lastUpdate || 0;
        const existingTs = existing ? (existing._lastUpdate || 0) : 0;
        if (!existing || incomingTs >= existingTs) {
          await labDataPut(cn, lab);
          migrated++;
        }
      }
      console.log(`[migration] migrated ${migrated} labs from ${lsKey} → IDB`);
      try {
        localStorage.setItem(lsKey + '_legacy', lsData);
        localStorage.removeItem(lsKey);
      } catch (e) {
        console.warn(`[migration] backup/cleanup failed for ${lsKey}:`, e);
      }
    } catch (e) {
      console.warn(`[migration] failed migrating ${lsKey}:`, e);
    }
  })();
})();


// ─── core/enrichment.js ───────────────────────────────────────────────
// ─── enrichment.js ───────────────────────────────────────────────
// Manifest-driven sub-page enrichment (opdweb 請 Click 正式報告)
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// SUB-PAGE ENRICHMENT (manifest-driven, two-pass)
// ═══════════════════════════════════════════════════════════════════════════════
// Some lab orders only show "請 Click「正式報告」" in the main reportText —
// the actual values live behind opdweb's OpdOrderReport.aspx sub-page. After
// the caller's normal extraction, this pass:
//   1. computes which manifest testIds are still missing,
//   2. fetches the sub-pages of candidate "請 Click" orders within cutoff,
//   3. splices any matched fragments back into order.reportText so the next
//      extractLabValues() call picks them up.
// Sub-page text is cached in localStorage by ordapno (lab reports are
// signed off and immutable, so no TTL). The cache is shared across disease
// HTMLs — same ordapno in dialysis vs CKD vs DM has identical sub-page
// content, so a per-disease key would just waste space + duplicate API calls.

const ENRICH_CACHE_KEY = 'enrichCache';

// One-time migration: legacy per-disease key → shared key. Runs once on load;
// merges if both keys somehow co-exist (the new key wins on collision since
// any newer fetch under the unified key is fresher).
(function migrateEnrichCache() {
  const OLD_KEY = 'enrichCache_dialysis';
  const NEW_KEY = 'enrichCache';
  try {
    const old = localStorage.getItem(OLD_KEY);
    if (!old) return;
    const cur = localStorage.getItem(NEW_KEY);
    if (!cur) {
      localStorage.setItem(NEW_KEY, old);
      localStorage.removeItem(OLD_KEY);
      console.log('[enrichCache] migrated enrichCache_dialysis → enrichCache');
    } else {
      const merged = Object.assign({}, JSON.parse(old), JSON.parse(cur));
      localStorage.setItem(NEW_KEY, JSON.stringify(merged));
      localStorage.removeItem(OLD_KEY);
      console.log('[enrichCache] merged enrichCache_dialysis into enrichCache');
    }
  } catch (e) {
    console.warn('[enrichCache] migration failed:', e);
  }
})();

function loadEnrichCache() {
  try { return JSON.parse(localStorage.getItem(ENRICH_CACHE_KEY)) || {}; }
  catch { return {}; }
}
function saveEnrichCache(cache) {
  try { localStorage.setItem(ENRICH_CACHE_KEY, JSON.stringify(cache)); }
  catch (e) { console.warn('[enrichCache] save failed (likely quota):', e); }
}
function enrichCacheGet(ordapno) {
  if (!ordapno) return null;
  const c = loadEnrichCache();
  const slot = c[String(ordapno)];
  return slot ? slot.text : null;
}
function enrichCachePut(ordapno, text) {
  if (!ordapno || !text) return;
  const c = loadEnrichCache();
  c[String(ordapno)] = { text, ts: Date.now() };
  saveEnrichCache(c);
}

// Derive opdweb URL from ernode base, e.g.
//   http://ernode.vghb12.vhtt.gov.tw:8000 → http://opdweb.vghb12.vhtt.gov.tw
function getOpdwebBase(ernodeBaseUrl) {
  try {
    const u = new URL(ernodeBaseUrl);
    u.hostname = u.hostname.replace(/^ernode\./, 'opdweb.');
    u.port = '';
    return u.origin;
  } catch { return null; }
}

function buildSubpageUrl(ordapno, chartno, ernodeBaseUrl, opsid) {
  const base = getOpdwebBase(ernodeBaseUrl);
  if (!base) return null;
  return `${base}/QueryReport/OpdOrderReport.aspx?OrdApNo=${ordapno}&hisnum=${chartno}&opid=${opsid}`;
}

async function fetchSubpageText(url) {
  const resp = await fetch(url, { credentials: 'omit' });
  if (!resp.ok) return '';
  const html = await resp.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  return doc.body?.textContent || '';
}

// Splice into order.reportText whatever the sub-page reveals about the
// missing tests. Returns true if anything was appended.
function applySubpageText(order, subpageText, missingTests) {
  if (!subpageText) return false;
  const additions = [];
  for (const t of missingTests) {
    if (!t.pattern) continue;
    // Phase A: sub-page already carries the main-page label.
    const mMain = subpageText.match(t.pattern);
    if (mMain && mMain[0]) {
      additions.push(mMain[0]);
      continue;
    }
    // Phase B: catalog `subpage` config — orderName-gated translation
    // (e.g. Aluminum sub-page only has "Result: N", no "Al鋁:").
    const sp = t.subpage;
    if (!sp || !sp.resultPattern) continue;
    if (sp.orderNameMatch && !sp.orderNameMatch.test(order.orderName || '')) continue;
    const mSub = subpageText.match(sp.resultPattern);
    if (mSub && mSub[1]) {
      additions.push(`${sp.synthLabel || t.id}: ${String(mSub[1]).trim()}`);
    }
  }
  if (!additions.length) return false;
  order.reportText = (order.reportText ? order.reportText + ' ; ' : '')
                   + additions.join(' ; ');
  return true;
}

// Per-test chase semantics:
//   - Tests WITHOUT a `subpage` config: chased only when the value is
//     entirely missing across every order's reportText (single-value style).
//   - Tests WITH a `subpage` config (e.g. Aluminum): chased per-order even
//     when one main-page value already exists. Annual lab tracking needs
//     ALL historical "請 Click" entries to fill the dialysis CSV column,
//     not just the most-recent visible value.
async function enrichMissingValues(labOrders, chartno, manifest, opts) {
  opts = opts || {};
  const onProgress = opts.onProgress;
  const maxFetches = opts.maxFetches != null ? opts.maxFetches : 15;

  const settings = loadSettings();
  if (!settings.baseUrl || !settings.opsid) return;

  const tests = (manifest || []).filter(t => t && t.pattern instanceof RegExp);
  if (!tests.length) return;

  // Pass 1: which testIds appear at least once in any order's reportText?
  const presentIds = new Set();
  for (const o of labOrders) {
    if (!o.reportText) continue;
    for (const t of tests) {
      if (presentIds.has(t.id)) continue;
      if (t.pattern.test(o.reportText)) presentIds.add(t.id);
    }
  }

  // Only chase tests that explicitly opt in via catalog `subpage.orderNameMatch`.
  // Without an orderName signal we'd brute-fetch every "missing" candidate
  // (verified blow-up 2026-05-07: queue=132 for a patient missing AntiHCV/AFP,
  // all CORS-blocked under file:// origin anyway). Tests opt in by adding
  // subpage.orderNameMatch (and optionally subpage.resultPattern for
  // sub-page label translation, e.g. Aluminum's "Result: N" → "Al鋁: N").
  const chaseTests = tests.filter(t => t.subpage && t.subpage.orderNameMatch);
  if (!chaseTests.length) return;

  function relevantTestsForOrder(o) {
    const out = [];
    for (const t of chaseTests) {
      if (t.pattern.test(o.reportText || '')) continue; // already on main page for this order
      if (t.subpage.orderNameMatch.test(o.orderName || '')) out.push(t);
    }
    return out;
  }

  const queue = [];
  for (const o of labOrders) {
    if (!o.ordapno) continue;
    const rel = relevantTestsForOrder(o);
    if (rel.length) queue.push({ order: o, tests: rel });
  }
  if (!queue.length) return;

  let fetched = 0;
  for (let i = 0; i < queue.length && fetched < maxFetches; i++) {
    const { order, tests: relTests } = queue[i];
    const url = buildSubpageUrl(order.ordapno, chartno, settings.baseUrl, settings.opsid);
    if (!url) continue;

    let text = enrichCacheGet(order.ordapno);
    if (!text) {
      if (onProgress) onProgress(`補抓子頁面 ${fetched + 1}/${maxFetches}（candidate ${i + 1}/${queue.length}）`);
      try {
        text = await fetchSubpageText(url);
        if (text) enrichCachePut(order.ordapno, text);
      } catch { continue; }
      fetched++;
    }
    if (!text) continue;

    applySubpageText(order, text, relTests);
  }
}


// ─── core/lab-extract.js ──────────────────────────────────────────────
// ─── lab-extract.js ───────────────────────────────────────────────
// extractLabValues + BUN A/B post-processing.
// computeDerivedValues was split out into core/compute.js (Phase 1 restructure).
//
// Extracted verbatim from hospital-lab-data.html (Phase 1 restructure,
// 2026-05-08). Functions stay top-level; the build concatenates every
// core/*.js into a single <script> block, so cross-module calls Just Work
// the way they did in the monolith.

// ═══════════════════════════════════════════════════════════════════════════════
// LAB VALUE EXTRACTION
// ═══════════════════════════════════════════════════════════════════════════════

/**
 * Extract lab values from fetched orders.
 * Returns { testId: [{date, value, dateObj, reportDateTime, orderName}, ...], ... }
 *
 * Step 2: BUN pre/post is no longer pre-classified at the parser layer. Both
 * BUN_pre and BUN_post testIds match every BUN occurrence; the dialysis
 * group's resolveBUN() re-derives pre/post from reportDateTime per cluster.
 * The legacy `composite` / `standalone_bun` filter strings (which never
 * matched the catalog's actual orderNameFilter regex anyway) have been
 * removed.
 */
function extractLabValues(orders) {
  const results = {};
  LAB_TESTS.forEach(t => { results[t.id] = []; });

  // Filter to LAB orders within last 12 months (except hepatitis/HIV/RPR: all-time)
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 12);
  cutoff.setHours(0, 0, 0, 0);

  const ALL_TIME_IDS = new Set(['HBsAg', 'AntiHBs', 'AntiHCV', 'HIV', 'RPR']);
  // Tests with sub-page enrichment chase historical values (e.g. annual
  // Aluminum). Give them all-time treatment too so the enriched older
  // entries don't get dropped by the 12-month cutoff downstream.
  LAB_TESTS.forEach(t => { if (t && t.subpage) ALL_TIME_IDS.add(t.id); });

  for (const order of orders) {
    if (order.ordType && order.ordType !== 'LAB') continue;
    if (!order.reportText) continue;

    const dateObj = parseDateResdttm(order.resdttm) || parseDateTaiwan(order.orderDate);
    if (!dateObj) continue;

    const text = order.reportText;
    const dateStr = toSortableDate(dateObj);
    const reportDateTime = dateObj.toISOString(); // full timestamp persisted for resolveBUN (legacy)
    const orderName     = order.orderName    || '';
    // Revision 1: persist explicit cluster anchor + BUN-sort key per entry.
    // effectiveTime = 生效時間 (monthly cluster key); signOffTime = 簽收時間 (BUN pre/post sort).
    const effectiveTime = order.effectiveTime || null;
    const signOffTime   = order.signOffTime   || null;

    for (const test of LAB_TESTS) {
      // Date filter: all-time for hepatitis/HIV/RPR, 12 months for everything else
      if (!ALL_TIME_IDS.has(test.id) && dateObj < cutoff) continue;

      const match = text.match(test.pattern);
      if (!match) continue;

      let value = match[1];
      if (!test.qualitative) {
        // Detection-limit markers: keep "<N" / ">N" as a normalised string
        // (e.g. "Al鋁: <2"). Downstream consumers naturally degrade — table
        // rendering parseFloat → NaN → renders as plain text without alarm
        // colour; URR/Ca×P guard with isFinite; CSV stringifies as-is.
        // Skipping normalize() for these is safe — the `<` / `>` markers
        // historically come from manual lab annotations, not unit-conversion
        // candidates (no test today applies normalize to such values).
        const trimmed = String(value).replace(/\s+/g, '');
        if (/^[<>]/.test(trimmed)) {
          value = trimmed;
        } else {
          value = parseFloat(value);
          if (isNaN(value)) continue;
          if (test.normalize) {
            // catalog references normalizers by string name (so it stays
            // JSON-serialisable); look up the function from the bundled
            // NORMALIZERS table. Tolerate function references too for
            // forward/backward compat.
            const fn = typeof test.normalize === 'function'
              ? test.normalize
              : (typeof NORMALIZERS !== 'undefined' && NORMALIZERS[test.normalize]);
            if (typeof fn === 'function') value = fn(value);
          }
        }
      }

      // Dedupe: prefer signOffTime as the discriminator (it's the most
      // unique per-draw timestamp), then reportDateTime, finally fall back
      // to date+value when neither timestamp is present.
      const existing = results[test.id];
      const dup = existing.find(e =>
        e.value === value &&
        ((e.signOffTime   && e.signOffTime   === signOffTime)   ||
         (e.reportDateTime && e.reportDateTime === reportDateTime) ||
         (!e.signOffTime && !e.reportDateTime && e.date === dateStr))
      );
      if (!dup) {
        existing.push({
          date: dateStr,
          value,
          dateObj,
          reportDateTime,
          effectiveTime,
          signOffTime,
          orderName,
        });
      }
    }
  }

  // Sort each test's results by date (newest first)
  for (const id in results) {
    results[id].sort((a, b) => b.date.localeCompare(a.date));
  }

  // Revision 1 hotfix (2026-05-05): rebuild BUN_pre[] / BUN_post[].
  // Both regexes match every BUN occurrence, so each entry was being stored
  // in BOTH arrays — leaving BUN(AD) effectively empty downstream.
  classifyBUNPrePost(results);

  return results;
}

/**
 * Post-processing pass for BUN_pre / BUN_post (revision 1 hotfix).
 *
 * Both BUN_pre and BUN_post share the same /BUN:\s*([\d.]+)/ regex, so every
 * BUN draw lands in BOTH arrays. This pass rebuilds the two arrays so each
 * physical draw appears exactly once in the correct bucket.
 *
 * Method A (primary, cross-hospital safe): sort same-date entries by
 * signOffTime / dateObj — earliest = pre (洗前), latest = post (洗後).
 * Method B (fallback): when A is ambiguous (missing timestamps or ties),
 * match orderName for 洗前 / 洗後 markers.
 */
function classifyBUNPrePost(results) {
  const pre  = results.BUN_pre  || [];
  const post = results.BUN_post || [];
  const all  = [...pre, ...post];
  if (all.length === 0) return results;

  // Dedupe: same physical draw in BUN_pre[] and BUN_post[].
  const seen = new Set();
  const dedup = [];
  for (const e of all) {
    const tsKey = e.signOffTime
      || (e.dateObj instanceof Date ? e.dateObj.toISOString() : '')
      || e.reportDateTime
      || e.date
      || '';
    const key = String(e.value) + '|' + tsKey + '|' + (e.orderName || '');
    if (seen.has(key)) continue;
    seen.add(key);
    dedup.push(e);
  }

  // Group by date (YYYY-MM-DD)
  const byDate = {};
  for (const e of dedup) {
    if (!e.date) continue;
    if (!byDate[e.date]) byDate[e.date] = [];
    byDate[e.date].push(e);
  }

  const newPre = [];
  const newPost = [];
  for (const date in byDate) {
    const { pre: p, post: q } = classifyBUNForDate(byDate[date], date);
    if (p) newPre.push(p);
    if (q) newPost.push(q);
  }

  newPre.sort((a, b) => b.date.localeCompare(a.date));
  newPost.sort((a, b) => b.date.localeCompare(a.date));
  results.BUN_pre  = newPre;
  results.BUN_post = newPost;
  return results;
}

function _bunEntryTime(e) {
  if (e.signOffTime) {
    const t = new Date(e.signOffTime).getTime();
    if (Number.isFinite(t)) return t;
  }
  if (e.dateObj instanceof Date) {
    const t = e.dateObj.getTime();
    if (Number.isFinite(t)) return t;
  }
  if (e.reportDateTime) {
    const t = new Date(e.reportDateTime).getTime();
    if (Number.isFinite(t)) return t;
  }
  return null;
}

function classifyBUNForDate(entries, date) {
  if (entries.length === 1) return { pre: entries[0], post: null };

  const times = entries.map(_bunEntryTime);
  const hasMissing = times.some(t => t == null);
  const present    = times.filter(t => t != null);
  const hasTie     = present.length !== new Set(present).size;

  // Method A — sort by timestamp; earliest = pre, latest = post.
  if (!hasMissing && !hasTie) {
    const sorted = [...entries].sort((a, b) => _bunEntryTime(a) - _bunEntryTime(b));
    if (sorted.length > 2) {
      try { console.warn(`[BUN] 3+ entries on date ${date} — taking earliest as pre, latest as post`, entries); } catch (_) {}
    }
    return { pre: sorted[0], post: sorted[sorted.length - 1] };
  }

  // Method B — fallback by orderName text.
  try { console.warn(`[BUN] classification fell back to orderName for date ${date}`, entries); } catch (_) {}
  let pre = null, post = null;
  const unmarked = [];
  for (const e of entries) {
    const name = e.orderName || '';
    if (name.includes('洗後')) {
      if (!post) post = e;
    } else if (name.includes('洗前')) {
      if (!pre) pre = e;
    } else {
      unmarked.push(e);
    }
  }
  if (!pre  && unmarked.length > 0) pre  = unmarked.shift();
  if (!post && unmarked.length > 0) post = unmarked.shift();
  if (unmarked.length > 0) {
    try { console.warn(`[BUN] ambiguous on date ${date} — extra unmarked entries dropped`, entries); } catch (_) {}
  }
  return { pre, post };
}
